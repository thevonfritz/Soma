<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A Lenda de Soma</title>
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  background:
    radial-gradient(ellipse at 50% 50%, #1a1612 0%, #0a0806 45%, #000 100%);
  display:flex;align-items:center;justify-content:center;
  width:100vw;height:100vh;user-select:none;font-family:monospace;
}
/* === RIG (the whole monitor + stand, scaled to viewport) === */
#rig{
  position:relative;
  width:1080px;height:822px;
  transform-origin:center center;
  display:flex;flex-direction:column;align-items:center;
}
/* === BEIGE CRT MONITOR === */
.monitor{
  position:relative;
  width:1080px;height:760px;
  padding:54px 70px 0 70px;
  background:
    linear-gradient(180deg,
      #f0e5c4 0%, #e8dcb6 6%,
      #d8c9a0 22%, #cdbb92 55%,
      #b8a37a 92%, #9a8866 100%);
  border-radius:42px 42px 28px 28px;
  box-shadow:
    inset 0 4px 0 rgba(255,250,228,.85),
    inset 0 -6px 0 rgba(80,60,30,.30),
    inset 8px 0 0 rgba(255,250,228,.20),
    inset -8px 0 0 rgba(80,60,30,.18),
    0 24px 50px rgba(0,0,0,.55),
    0 60px 120px rgba(0,0,0,.4);
  border:2px solid #6a5a3a;
}
/* Plastic highlight band + aging */
.monitor::before{
  content:'';position:absolute;inset:0;border-radius:42px 42px 28px 28px;pointer-events:none;
  background:
    linear-gradient(180deg,rgba(255,250,228,.4) 0%,rgba(255,250,228,0) 18%,rgba(0,0,0,0) 70%,rgba(60,40,15,.20) 100%),
    radial-gradient(ellipse at 80% 75%, rgba(120,90,40,.10), transparent 40%),
    radial-gradient(ellipse at 25% 18%, rgba(255,250,228,.18), transparent 30%);
}
/* Subtle dust/age speckle */
.monitor::after{
  content:'';position:absolute;inset:0;border-radius:42px 42px 28px 28px;pointer-events:none;opacity:.18;
  background-image:
    radial-gradient(circle at 12% 32%, #8a6a3a 0.5px, transparent 1px),
    radial-gradient(circle at 78% 12%, #8a6a3a 0.5px, transparent 1px),
    radial-gradient(circle at 45% 86%, #8a6a3a 0.5px, transparent 1px),
    radial-gradient(circle at 92% 64%, #8a6a3a 0.5px, transparent 1px);
  background-size:120px 120px,170px 170px,200px 200px,140px 140px;
}

/* === SCREEN BEZEL (square-corner CRT) === */
#crt{
  position:relative;
  width:940px;height:580px;
  background:#000;
  border-radius:4px;
  overflow:hidden;
  /* Deep recessed bezel rim */
  box-shadow:
    inset 0 0 0 6px #1a1612,
    inset 0 0 0 9px #6a5a3a,
    inset 0 0 0 13px #9a8866,
    inset 0 0 0 16px #2a221a,
    inset 0 0 28px rgba(0,0,0,.95),
    inset 0 0 80px rgba(0,0,0,.65),
    0 0 0 3px #4a3a22,
    0 6px 16px rgba(0,0,0,.6);
  margin-top:4px;
}
/* Screen content wrapper — what gets toggled on/off */
.screen-content{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  transition:transform .22s cubic-bezier(.65,0,.35,1), opacity .22s;
  transform-origin:center center;
}
#crt.off .screen-content{
  transform:scaleY(.004) scaleX(.6);
  opacity:.85;
}
#crt.off-final .screen-content{
  transform:scaleY(.004) scaleX(.001);
  opacity:0;
}
/* canvas display size */
#c{display:block;width:940px;height:580px;
  image-rendering:pixelated;image-rendering:crisp-edges;
  filter:brightness(1.06) contrast(1.14) saturate(1.05);
  touch-action:none;}
/* Glass reflection highlight (top-left curve) */
.screen-glare{position:absolute;left:30px;top:14px;width:50%;height:36%;
  border-radius:60% 80% 80% 60% / 80% 60% 60% 80%;
  background:linear-gradient(135deg,rgba(255,255,255,.08) 0%,rgba(255,255,255,.03) 40%,transparent 70%);
  pointer-events:none;z-index:14;mix-blend-mode:screen;}

/* === CONTROL PANEL (front bottom strip) === */
.control-panel{
  position:absolute;left:60px;right:60px;bottom:32px;height:72px;
  background:linear-gradient(180deg,#d4c498 0%,#c4b388 50%,#a89570 100%);
  border:2px solid #6a5a3a;border-radius:6px;
  box-shadow:
    inset 0 1px 0 rgba(255,250,228,.6),
    inset 0 -2px 0 rgba(80,60,30,.4),
    inset 0 0 14px rgba(80,60,30,.18);
  display:flex;align-items:center;padding:0 22px;gap:14px;
}
.cp-brand{font:bold 10px monospace;letter-spacing:4px;color:#4a3820;
  text-shadow:0 1px 0 rgba(255,250,228,.6),0 -1px 0 rgba(0,0,0,.15);
  padding-right:10px;border-right:1.5px solid #8a7848;height:44px;display:flex;flex-direction:column;justify-content:center;}
.cp-brand small{display:block;font-size:7px;letter-spacing:2px;color:#6a5a3a;margin-top:2px;}
.cp-ctrls{display:flex;gap:14px;flex:1;align-items:center;}

/* Mechanical switch group */
.sw-group{display:flex;flex-direction:column;align-items:center;gap:4px;}
.sw-label{font:bold 7px monospace;letter-spacing:2px;color:#3a2810;
  text-shadow:0 1px 0 rgba(255,250,228,.5);}
.sw-keys{display:flex;gap:5px;}

/* Mechanical key — monitor-plastic color, blue-switch feel */
.mkey{
  width:30px;height:26px;
  position:relative;cursor:pointer;user-select:none;
  /* keycap: mesma família de bege do corpo do monitor */
  background:linear-gradient(160deg,#e8ddb4 0%,#d0c090 50%,#b8a870 100%);
  border-radius:3px 3px 2px 2px;
  border-top:1.5px solid #f0e8c4;
  border-left:1.5px solid #ddd0a0;
  border-right:1.5px solid #8a7840;
  /* housing / travel abaixo do keycap */
  border-bottom:4px solid #5a4820;
  box-shadow:
    0 3px 5px rgba(0,0,0,.35),
    inset 0 1px 0 rgba(255,250,220,.6),
    inset 1px 0 0 rgba(255,245,200,.2);
  display:flex;align-items:center;justify-content:center;
  font:bold 13px monospace;
  color:#3a2810;
  transition:transform .05s ease,border-bottom .05s ease,box-shadow .05s ease;
}
.mkey:active{
  border-bottom:1px solid #5a4820;
  transform:translateY(3px);
  box-shadow:
    0 1px 2px rgba(0,0,0,.25),
    inset 0 2px 4px rgba(60,40,10,.45);
}
/* Reset button overlay on the game screen */
#resetBtn{
  position:absolute;top:9px;right:11px;z-index:25;
  font:bold 8px monospace;letter-spacing:2px;
  color:#9a7030;background:rgba(6,2,0,.80);
  border:1px solid #4a3010;border-radius:2px;
  padding:4px 10px;cursor:pointer;
  text-shadow:0 0 5px rgba(150,100,20,.5);
  opacity:.5;transition:opacity .15s,color .15s;
  user-select:none;}
#resetBtn:hover{opacity:1;color:#e8a840;border-color:#9a6020;}

.cp-meter{font:8px monospace;letter-spacing:.5px;
  background:#1a1410;padding:4px 8px;border-radius:2px;
  border:1px solid #4a3820;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.7);
  color:#80c050;text-shadow:0 0 4px rgba(120,220,80,.6);white-space:pre;}
.cp-divider{width:1.5px;height:34px;background:#8a7848;margin:0 2px;
  box-shadow:1px 0 0 rgba(255,250,228,.5);}
.cp-power{display:flex;align-items:center;gap:10px;margin-left:auto;}
.cp-led{width:7px;height:7px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#ff8060 0%,#c01010 50%,#400404 100%);
  box-shadow:0 0 10px rgba(255,40,40,.7),inset 0 1px 1px rgba(255,200,200,.4);
  transition:all .25s;}
.cp-led.off{background:radial-gradient(circle at 30% 30%,#5a3030 0%,#2a0808 60%,#100202 100%);
  box-shadow:inset 0 1px 1px rgba(0,0,0,.6);}
.cp-led-label{font:7px monospace;letter-spacing:1.5px;color:#5a4820;margin-right:4px;
  text-shadow:0 1px 0 rgba(255,250,228,.5);}
.cp-pwr-btn{width:38px;height:38px;border-radius:50%;cursor:pointer;
  background:radial-gradient(circle at 35% 30%,#f0e5c4 0%,#c8b88c 45%,#8a7848 100%);
  border:2.5px solid #5a4828;
  box-shadow:inset 0 2px 2px rgba(255,250,228,.6),inset 0 -3px 4px rgba(60,40,15,.5),0 2px 4px rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;position:relative;}
.cp-pwr-btn:active{
  box-shadow:inset 0 3px 4px rgba(60,40,15,.6),inset 0 -1px 2px rgba(255,250,228,.4);
  transform:translateY(1px);}
.cp-pwr-btn::before{content:'';position:absolute;width:14px;height:14px;
  border:2px solid #4a3820;border-radius:50%;border-top-color:transparent;}
.cp-pwr-btn::after{content:'';position:absolute;width:2px;height:9px;
  background:#4a3820;top:8px;left:50%;transform:translateX(-50%);}

/* === STAND === */
.stand-neck{width:340px;height:38px;margin-top:-4px;
  background:linear-gradient(180deg,#d4c498 0%,#b8a37a 60%,#9a8866 100%);
  border-radius:0 0 18px 18px;border:2px solid #6a5a3a;border-top:none;
  box-shadow:inset 0 -3px 0 rgba(80,60,30,.4),inset 0 1px 0 rgba(255,250,228,.4);}
.stand-base{width:460px;height:24px;margin-top:-4px;
  background:linear-gradient(180deg,#e0d2a8 0%,#c4b388 40%,#9a8866 100%);
  border-radius:8px 8px 12px 12px;border:2px solid #6a5a3a;
  box-shadow:
    inset 0 1px 0 rgba(255,250,228,.6),
    inset 0 -3px 0 rgba(80,60,30,.4),
    0 14px 30px rgba(0,0,0,.65),
    0 40px 80px rgba(0,0,0,.45);}

/* === CRT SCREEN OVERLAYS === */
#sl{position:absolute;inset:0;
  background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,.18) 2px,rgba(0,0,0,.18) 4px);
  pointer-events:none;z-index:10;}
#vg{position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 48%,transparent 50%,rgba(0,0,0,.55) 88%,rgba(0,0,0,.94) 100%);
  pointer-events:none;z-index:11;}
#gl{position:absolute;left:0;right:0;height:4px;background:linear-gradient(180deg,transparent,rgba(180,255,140,.07),transparent);
  pointer-events:none;z-index:12;animation:scan 9s linear infinite;}
#rgb{position:absolute;inset:0;pointer-events:none;z-index:13;
  background:repeating-linear-gradient(90deg,rgba(255,80,80,.022) 0 1px,rgba(80,255,80,.022) 1px 2px,rgba(80,80,255,.022) 2px 3px);
  mix-blend-mode:screen;opacity:.55;}
#mute{display:none;}

/* CRT off — center white line flash */
.crt-line{position:absolute;left:8%;right:8%;top:50%;height:0;
  background:linear-gradient(180deg,transparent,#fff,transparent);
  box-shadow:0 0 22px rgba(255,255,255,.9);
  pointer-events:none;z-index:40;opacity:0;
  transform:translateY(-50%);transition:height .12s ease-out,opacity .35s ease-out;}
#crt.off .crt-line{height:2px;opacity:1;}
#crt.off-final .crt-line{height:1px;opacity:0;}

@keyframes scan{from{top:-4px}to{top:calc(100% + 4px)}}
#rotate{display:none;position:fixed;inset:0;background:#000;z-index:50;
  align-items:center;justify-content:center;flex-direction:column;gap:12px;}
#rotate p{color:#80c050;font:16px monospace;text-align:center;padding:0 24px;text-shadow:0 0 6px rgba(120,220,80,.5);}
@media (max-width:700px) and (orientation:portrait){#rotate{display:flex;}}
</style>
</head>
<body>
<div id="rotate">
  <p style="font-size:28px">↻</p>
  <p>GIRE O DISPOSITIVO</p>
  <p style="font-size:11px;opacity:.6">SOMA requer modo paisagem</p>
</div>
<div id="rig">
  <div class="monitor">
    <div id="crt">
      <div class="screen-content">
        <canvas id="c" width="920" height="600"></canvas>
        <div id="sl"></div><div id="vg"></div><div id="gl"></div><div id="rgb"></div>
        <div id="resetBtn" title="Voltar à tela inicial" onclick="cpClick();goHome();">↺ RESET</div>
      </div>
      <div class="crt-line"></div>
      <div class="screen-glare"></div>
      <div id="mute"></div>
    </div>
    <div class="control-panel">
      <div class="cp-brand">CATHODE TERMINAL<small>MODEL  ·  S-1986</small></div>
      <div class="cp-ctrls">
        <div class="sw-group">
          <div class="sw-label">BRILHO</div>
          <div class="sw-keys">
            <span class="mkey" title="Diminuir brilho" onclick="cpClick();adjustDisplay('br',-1)">−</span>
            <span class="mkey" title="Aumentar brilho" onclick="cpClick();adjustDisplay('br',1)">+</span>
          </div>
        </div>
        <span class="cp-divider"></span>
        <div class="sw-group">
          <div class="sw-label">CONTR</div>
          <div class="sw-keys">
            <span class="mkey" title="Diminuir contraste" onclick="cpClick();adjustDisplay('co',-1)">−</span>
            <span class="mkey" title="Aumentar contraste" onclick="cpClick();adjustDisplay('co',1)">+</span>
          </div>
        </div>
        <span class="cp-divider"></span>
        <div class="sw-group">
          <div class="sw-label">SOM</div>
          <div class="sw-keys">
            <span class="mkey" id="sndBtn" title="Mudo/Som" onclick="cpClick();Aud.init();Aud.toggle();">♪</span>
          </div>
        </div>
        <span class="cp-meter" id="cpMeter">BR:███ CO:███</span>
      </div>
      <div class="cp-power">
        <span class="cp-led-label">PWR</span>
        <span class="cp-led" id="pwrLed"></span>
        <button class="cp-pwr-btn" id="pwrBtn" title="Liga/Desliga tela" onclick="togglePower()"></button>
      </div>
    </div>
  </div>
  <div class="stand-neck"></div>
  <div class="stand-base"></div>
</div>
<audio id="bootAudio" src="sounds/start.mp3" preload="auto"></audio>
<audio id="titleAudio" src="sounds/Gilt Dungeon Keys.mp3" loop preload="auto"></audio>
<script>'use strict';

// ── LAYOUT ────────────────────────────────────────────────────
const CW=920, CH=600;
const AW=360, AH=480;
const TX=AW+14, TW=CW-TX-10;
const HY=AH+2,  HH=CH-HY;
const FSIZE=14, LH=22;
const CHR=48; // choice row height

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=CW; canvas.height=CH;

// ── COVER IMAGE ───────────────────────────────────────────────
const coverImg=new Image();
coverImg.src='img/capa.png';

// ── CLICK DE SWITCH AZUL (bypassa mudo — sempre soa) ─────────
function cpClick(){
  Aud.init();
  const A=Aud.ctx; if(!A)return;
  const buf=A.createBuffer(1,Math.floor(A.sampleRate*.03),A.sampleRate);
  const d=buf.getChannelData(0);
  // Burst com decaimento exponencial rápido (click inicial)
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(A.sampleRate*.0025));
  // Segundo transiente: "bottom-out" 18ms depois
  const t2=Math.floor(A.sampleRate*.018);
  for(let i=0;i<Math.min(25,d.length-t2);i++) d[t2+i]+=(Math.random()*2-1)*Math.exp(-i/7)*.5;
  const src=A.createBufferSource(); src.buffer=buf;
  const hp=A.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=2400;
  const g=A.createGain(); g.gain.value=.20;
  src.connect(hp); hp.connect(g); g.connect(A.destination); // direto, sem mudo
  src.start();
}

// Rig scaling (fit monitor + stand to viewport)
const rig=document.getElementById('rig');
function fitRig(){
  const RW=1080,RH=822;
  const s=Math.min(window.innerWidth/(RW+40), window.innerHeight/(RH+40));
  const dw=Math.round(RW*(1-s)/2);
  const dh=Math.round(RH*(1-s)/2);
  rig.style.transform=`scale(${s})`;
  rig.style.margin=`-${dh}px -${dw}px`;
}
fitRig();
window.addEventListener('resize',fitRig);
const SC=1;

// ── PALETTE  (woodcut / dark-engraving) ──────────────────────
const P={
  void:'#000', ink:'#060200', paper:'#0c0702', paperL:'#1a1008',
  hatch:'#140d04',
  // Amber woodcut spectrum
  wa0:'#1a0c04',wa1:'#3a1c08',wa2:'#6a3610',wa3:'#9a5618',
  wa4:'#c87828',wa5:'#e8a840',wa6:'#f5cc70',waW:'#fff0c0',
  // Stone
  stone:'#181008',stoneLit:'#2e1e0e',stoneHL:'#4a3418',
  // Metal / armor
  met0:'#1e1810',met1:'#3a2e1c',met2:'#6a5830',met3:'#a89050',met4:'#d4c060',
  // Flame
  torch:'#d06810',torchY:'#ffe090',torchO:'#601000',torchW:'#fff8e0',
  // Blood
  blood:'#280606',bloodL:'#5a1010',
  // Fé (faith) — cool silver
  fe0:'#181828',fe1:'#4060c0',fe2:'#90a8e0',feW:'#d0e8ff',
  // Corrupção — deep violet/crimson
  cor0:'#180810',cor1:'#580838',cor2:'#a01060',corW:'#e040a0',
  // HUD
  hBg:'#070402',hBo:'#3a2210',hTx:'#c89040',hBr:'#e8c070',
  hDm:'#4a3018',hRd:'#b02020',
  // Gold ornament
  gold:'#9a7030',goldL:'#d4a850',goldD:'#4a3418',
  fog:'rgba(8,4,0,',
};

// ── UTILS ─────────────────────────────────────────────────────
const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const clp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;

function wrapText(text,maxW){
  ctx.font=FSIZE+'px monospace';
  const result=[];
  for(const para of text.split('\n')){
    if(!para){result.push('');continue;}
    let line='';
    for(const w of para.split(' ')){
      const test=line?line+' '+w:w;
      if(ctx.measureText(test).width>maxW&&line){result.push(line);line=w;}
      else line=test;
    }
    if(line)result.push(line);
  }
  return result;
}

function glow(text,x,y,col,gc,blur){
  ctx.shadowColor=gc||'#50a030'; ctx.shadowBlur=blur||6;
  ctx.fillStyle=col; ctx.fillText(text,x,y);
  ctx.shadowBlur=0;
}

// ── AUDIO ─────────────────────────────────────────────────────
const Aud={
  ctx:null,master:null,ambi:null,muted:false,tension:1,_ambiReady:false,
  init(){
    if(this.ctx)return;
    this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    this.master=this.ctx.createGain(); this.master.gain.value=0.6;
    this.master.connect(this.ctx.destination);
    if(G.scene==='title') this.playTitle();
  },
  playBoot(){
    const el=document.getElementById('bootAudio');
    if(el&&el.paused)el.play().catch(()=>{});
  },
  stopBoot(){
    const el=document.getElementById('bootAudio');
    if(el){el.pause();el.currentTime=0;}
  },
  playTitle(){
    this.stopBoot();
    const el=document.getElementById('titleAudio');
    if(el&&el.paused)el.play().catch(()=>{});
  },
  stopTitle(){
    const el=document.getElementById('titleAudio');
    if(el){el.pause();el.currentTime=0;}
  },
  startGameMusic(){
    this.stopTitle();
    if(!this._ambiReady){
      this._buildAmbi();
    } else if(this.ambi){
      const A=this.ctx;
      this.ambi.gain.cancelScheduledValues(A.currentTime);
      this.ambi.gain.linearRampToValueAtTime(this.tension,A.currentTime+3);
    }
  },
  pauseGameMusic(){
    if(this.ambi){
      const A=this.ctx;
      this.ambi.gain.cancelScheduledValues(A.currentTime);
      this.ambi.gain.linearRampToValueAtTime(0,A.currentTime+1.5);
    }
  },
  _buildAmbi(){
    if(this._ambiReady)return;
    this._ambiReady=true;
    const A=this.ctx;
    this.ambi=A.createGain(); this.ambi.gain.value=0;
    this.ambi.connect(this.master);
    this.ambi.gain.linearRampToValueAtTime(1,A.currentTime+5);

    // === HURDY-GURDY OPEN-FIFTH DRONE (D — A) ===
    this._drone(36.71,'sine',0.11,0);          // sub D1
    this._drone(73.42,'sawtooth',0.042,500);   // D2
    this._drone(73.95,'sawtooth',0.038,500);   // D2 detuned (chorus)
    this._drone(110.0,'sawtooth',0.032,650);   // A2 (fifth)
    this._drone(110.7,'sawtooth',0.028,650);   // A2 detuned
    this._drone(146.83,'triangle',0.020,1200); // D3 octave
    // Slow breathing pads
    this._pad(220,0.024,0.05);
    this._pad(293.66,0.016,0.08);

    // === MELODIC PHRASE — D PHRYGIAN (medieval dark mode) ===
    this._melodyLoop();

    // === CHORAL CHANT PAD ===
    this._sched(()=>this._chant(), 14,32);

    // === ATMOSPHERE ===
    this._sched(()=>this._ping(),   9,22);
    this._sched(()=>this._drip(),   6,18);
    this._sched(()=>this._creak(),  12,30);
    this._sched(()=>this._wind(),   10,28);
    this._sched(()=>this._distantToll(), 28,60);
  },
  _melodyLoop(){
    // D Phrygian — modal "dark medieval" — intervals 0 1 3 5 7 8 10 (semitones)
    // Played on a recorder/fiddle voice, monophonic, slow & mournful.
    const ratios={0:1,1:1.0595,3:1.1892,5:1.3348,7:1.4983,8:1.5874,10:1.7818,12:2.0};
    const root=146.83; // D3
    // [scaleDegree, dur, restAfter]
    const phrase=[
      [0,1.4,0],[1,1.1,0],[3,1.6,0],[1,1.0,0],[0,2.0,1.0],
      [3,1.0,0],[5,1.0,0],[7,1.5,0],[8,1.2,0],[5,1.0,0],[3,1.4,1.2],
      [7,1.6,0],[5,1.0,0],[3,1.2,0],[1,1.1,0],[0,2.6,2.4],
      [0,1.0,0],[-2,1.2,0],[-4,2.6,3.0], // descent below root
    ];
    const playPhrase=()=>{
      if(!this.ctx)return;
      let t=this.ctx.currentTime+0.4;
      phrase.forEach(([n,d,r])=>{
        let r2=ratios[n]||(n<0?(1/ratios[-n]||1):1);
        if(n===-2) r2=ratios[10]/2;       // C below
        if(n===-4) r2=ratios[8]/2;        // Bb below
        this._melodicNote(root*r2,t,d);
        t+=d+r;
      });
    };
    playPhrase();
    this._melodyTimer=setInterval(()=>playPhrase(), 38000);
  },
  _melodicNote(freq,when,dur){
    const A=this.ctx; if(!A)return;
    const o1=A.createOscillator(); o1.type='triangle'; o1.frequency.value=freq;
    const o2=A.createOscillator(); o2.type='sawtooth'; o2.frequency.value=freq;
    const fl=A.createBiquadFilter(); fl.type='lowpass'; fl.frequency.value=1900; fl.Q.value=1.2;
    // vibrato
    const lfo=A.createOscillator(); lfo.frequency.value=4.6;
    const lfoG=A.createGain(); lfoG.gain.value=freq*.008;
    lfo.connect(lfoG); lfoG.connect(o1.frequency); lfoG.connect(o2.frequency);
    const g1=A.createGain(); g1.gain.value=0.75; o1.connect(g1).connect(fl);
    const g2=A.createGain(); g2.gain.value=0.20; o2.connect(g2).connect(fl);
    const g=A.createGain();
    fl.connect(g); g.connect(this.ambi);
    const peak=0.075;
    g.gain.setValueAtTime(0,when);
    g.gain.linearRampToValueAtTime(peak,when+0.18);
    g.gain.linearRampToValueAtTime(peak*.6,when+dur*0.75);
    g.gain.exponentialRampToValueAtTime(0.0001,when+dur+0.5);
    o1.start(when); o2.start(when); lfo.start(when);
    o1.stop(when+dur+0.6); o2.stop(when+dur+0.6); lfo.stop(when+dur+0.6);
  },
  _chant(){
    const A=this.ctx; if(!A)return;
    // Sacred-feeling cluster: root + fifth + octave (perfect intervals)
    const roots=[73.42,82.41,98.00,110.00]; // D, E, G, A (low)
    const root=roots[Math.floor(Math.random()*roots.length)];
    const harms=[1,1.5,2,3]; // octave + fifth + octave + twelfth
    const dur=5+Math.random()*4;
    const t0=A.currentTime;
    harms.forEach((h,i)=>{
      const o=A.createOscillator(); o.type='sine'; o.frequency.value=root*h;
      const fl=A.createBiquadFilter(); fl.type='lowpass'; fl.frequency.value=900+h*150;
      const g=A.createGain();
      // formant-like detune for vox texture
      const lfo=A.createOscillator(); lfo.frequency.value=0.18+i*.04;
      const lfoG=A.createGain(); lfoG.gain.value=root*h*0.004;
      lfo.connect(lfoG); lfoG.connect(o.frequency);
      o.connect(fl); fl.connect(g); g.connect(this.ambi);
      const peak=0.022/Math.sqrt(h);
      g.gain.setValueAtTime(0,t0);
      g.gain.linearRampToValueAtTime(peak,t0+1.8);
      g.gain.linearRampToValueAtTime(peak,t0+dur-1.8);
      g.gain.exponentialRampToValueAtTime(0.0005,t0+dur);
      o.start(t0); lfo.start(t0);
      o.stop(t0+dur+0.3); lfo.stop(t0+dur+0.3);
    });
  },
  _wind(){
    const A=this.ctx; if(!A)return;
    const dur=4+Math.random()*4;
    const sz=Math.floor(A.sampleRate*dur);
    const buf=A.createBuffer(1,sz,A.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<sz;i++) d[i]=(Math.random()*2-1)*0.5;
    const src=A.createBufferSource(); src.buffer=buf;
    const fl=A.createBiquadFilter(); fl.type='bandpass';
    fl.frequency.value=260+Math.random()*180; fl.Q.value=1.3;
    const g=A.createGain();
    const t0=A.currentTime;
    g.gain.setValueAtTime(0,t0);
    g.gain.linearRampToValueAtTime(0.075,t0+dur*0.45);
    g.gain.exponentialRampToValueAtTime(0.0005,t0+dur);
    src.connect(fl); fl.connect(g); g.connect(this.ambi);
    src.start();
  },
  _distantToll(){
    const A=this.ctx; if(!A)return;
    // soft, distant church bell with strong harmonics
    const real=new Float32Array([0,1,.5,.35,.18,.08,.04]);
    const imag=new Float32Array(7);
    const f=55+Math.random()*15;
    const o=A.createOscillator();
    o.setPeriodicWave(A.createPeriodicWave(real,imag));
    o.frequency.value=f;
    const fl=A.createBiquadFilter(); fl.type='lowpass'; fl.frequency.value=900;
    const g=A.createGain();
    const t0=A.currentTime;
    g.gain.setValueAtTime(0.18,t0);
    g.gain.exponentialRampToValueAtTime(0.0005,t0+5.5);
    o.connect(fl); fl.connect(g); g.connect(this.ambi);
    o.start(t0); o.stop(t0+6);
  },
  _drone(f,type,vol,lp){
    const A=this.ctx;
    const o=A.createOscillator(); const g=A.createGain();
    o.type=type; o.frequency.value=f; g.gain.value=vol;
    if(lp){const fl=A.createBiquadFilter();fl.type='lowpass';fl.frequency.value=lp;o.connect(fl);fl.connect(g);}
    else o.connect(g);
    g.connect(this.ambi); o.start();
  },
  _pad(f,vol,lfoRate){
    const A=this.ctx;
    const o=A.createOscillator();const g=A.createGain();const lfo=A.createOscillator();const lg=A.createGain();
    o.type='sine';o.frequency.value=f;g.gain.value=vol*.2;
    lfo.frequency.value=lfoRate;lg.gain.value=vol*.8;
    lfo.connect(lg);lg.connect(g.gain);o.connect(g);g.connect(this.ambi);
    o.start();lfo.start();
  },
  _sched(fn,min,max){
    const d=min+Math.random()*(max-min);
    setTimeout(()=>{if(this.ctx){fn();this._sched(fn,min,max);}},d*1000);
  },
  _ping(){
    const A=this.ctx;
    const notes=[110,130.8,146.8,164.8,196,220,293.7,329.6];
    const f=notes[ri(0,notes.length-1)];
    const o=A.createOscillator();const g=A.createGain();
    const real=new Float32Array([0,1,.6,.3,.15,.07,.03]);const imag=new Float32Array(7);
    o.setPeriodicWave(A.createPeriodicWave(real,imag));
    o.frequency.value=f;
    g.gain.setValueAtTime(0.05,A.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,A.currentTime+2.8);
    o.connect(g);g.connect(this.ambi);o.start();o.stop(A.currentTime+2.8);
  },
  _drip(){
    const A=this.ctx; const f=900+Math.random()*700;
    const o=A.createOscillator();const g=A.createGain();
    o.type='sine';o.frequency.setValueAtTime(f,A.currentTime);
    o.frequency.exponentialRampToValueAtTime(f*.35,A.currentTime+.18);
    g.gain.setValueAtTime(0.055,A.currentTime);g.gain.exponentialRampToValueAtTime(0.001,A.currentTime+.35);
    o.connect(g);g.connect(this.ambi);o.start();o.stop(A.currentTime+.35);
  },
  _creak(){
    const A=this.ctx;
    const sz=Math.floor(A.sampleRate*.3);const buf=A.createBuffer(1,sz,A.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<sz;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/sz,2);
    const src=A.createBufferSource();src.buffer=buf;
    const fl=A.createBiquadFilter();fl.type='bandpass';fl.frequency.value=400+Math.random()*300;fl.Q.value=6;
    const g=A.createGain();g.gain.value=0.06;
    src.connect(fl);fl.connect(g);g.connect(this.ambi);src.start();
  },
  hover(){
    if(!this.ctx||this.muted)return;
    const A=this.ctx;const o=A.createOscillator();const g=A.createGain();
    o.type='sine';o.frequency.value=520;
    g.gain.setValueAtTime(0.035,A.currentTime);g.gain.exponentialRampToValueAtTime(0.001,A.currentTime+.055);
    o.connect(g);g.connect(this.master);o.start();o.stop(A.currentTime+.06);
  },
  select(){
    if(!this.ctx)return;
    const A=this.ctx;
    const sz=Math.floor(A.sampleRate*.2);const buf=A.createBuffer(1,sz,A.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<sz;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/sz,1.8);
    const src=A.createBufferSource();src.buffer=buf;
    const fl=A.createBiquadFilter();fl.type='bandpass';fl.frequency.value=520;fl.Q.value=5;
    const g=A.createGain();g.gain.value=0.28;
    src.connect(fl);fl.connect(g);g.connect(this.master);src.start();
    const o=A.createOscillator();const g2=A.createGain();
    o.type='sine';o.frequency.setValueAtTime(130,A.currentTime);
    o.frequency.exponentialRampToValueAtTime(36,A.currentTime+.2);
    g2.gain.setValueAtTime(0.38,A.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,A.currentTime+.24);
    o.connect(g2);g2.connect(this.master);o.start();o.stop(A.currentTime+.24);
  },
  whoosh(){
    if(!this.ctx)return;
    const A=this.ctx;
    const sz=Math.floor(A.sampleRate*.7);const buf=A.createBuffer(1,sz,A.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<sz;i++)d[i]=Math.random()*2-1;
    const src=A.createBufferSource();src.buffer=buf;
    const fl=A.createBiquadFilter();fl.type='lowpass';fl.frequency.value=700;
    const g=A.createGain();
    g.gain.setValueAtTime(0,A.currentTime);g.gain.linearRampToValueAtTime(0.1,A.currentTime+.18);
    g.gain.exponentialRampToValueAtTime(0.001,A.currentTime+.7);
    src.connect(fl);fl.connect(g);g.connect(this.master);src.start();
  },
  toll(){
    if(!this.ctx)return;
    const A=this.ctx;
    const real=new Float32Array([0,1,.55,.28,.14,.07,.035]);const imag=new Float32Array(7);
    const o=A.createOscillator();o.setPeriodicWave(A.createPeriodicWave(real,imag));
    o.frequency.value=40;
    const g=A.createGain();
    g.gain.setValueAtTime(0.65,A.currentTime);g.gain.exponentialRampToValueAtTime(0.001,A.currentTime+4.5);
    o.connect(g);g.connect(this.master);o.start();o.stop(A.currentTime+4.5);
  },
  setTension(v){
    if(!this.ambi)return;
    this.tension=v;
    this.ambi.gain.linearRampToValueAtTime(v,this.ctx.currentTime+2.5);
  },
  toggle(){
    this.muted=!this.muted;
    if(this.master)this.master.gain.value=this.muted?0:.6;
    ['bootAudio','titleAudio'].forEach(id=>{
      const el=document.getElementById(id);
      if(el)el.muted=this.muted;
    });
    const b=document.getElementById('sndBtn');
    if(b){
      b.classList.toggle('pressed',this.muted);
      b.textContent=this.muted?'✕':'♪';
    }
  }
};

let PT=[];
function spark(x,y,col,vscale){
  const vs=vscale||1;
  PT.push({x,y,vx:(Math.random()-.5)*1.2*vs,vy:(-Math.random()*.9-.3)*vs,
    life:1,col,r:Math.random()*2.2+.8});
}
function dust(x,y){
  PT.push({x,y,vx:(Math.random()-.5)*.25,vy:-Math.random()*.15-.05,
    life:1,col:'rgba(180,160,120,',r:.8,isDust:true});
}
function tickPT(){
  PT=PT.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy*=.96;p.life-=p.isDust?.008:.016;return p.life>0;});
}
function drawPT(){
  PT.forEach(p=>{
    ctx.globalAlpha=p.isDust?p.life*.4:p.life*.85;
    ctx.fillStyle=p.isDust?(p.col+p.life*.4+')'):p.col;
    ctx.fillRect(p.x-p.r,p.y-p.r,p.r*2,p.r*2);
  });ctx.globalAlpha=1;
}

    ]},
  elias_zareth:{title:'II.  ELIAS',art:'elias',
    text:'"Zareth desceu para negociar. Voltou diferente. Depois não voltou mais."\n\n"Encontramos o que restou semanas depois — não o corpo. A armadura. Vazia. Limpa. Como se a pessoa dentro tivesse simplesmente... evaporado."\n\n"O Diário ficou. Guardamos na câmara abaixo do templo. Perigoso demais para queimar — certas palavras não morrem no fogo."',
    ch:[
      {l:'Ir buscar o Diário.',n:'descent_gate',ef:{con:1}},
      {l:'Ir primeiro para as ruínas.',n:'ruins'},
    ]},
  elias_door:{title:'II.  ELIAS',art:'elias',
    text:'"O portão fica abaixo do templo de Vorthax. O sacerdote sabe o caminho — mas cobrará um preço."\n\n"O outro caminho é pelas ruínas de Aetherion. Mais longo. Mais honesto."\n\nEle te olha.\n\n"Cavaleiro de Aetherion, não é? Os últimos cavaleiros sempre voltam. Sem exceção. Não sei se isso é esperança ou tragédia."',
    ch:[
      {l:'Ir pelas ruínas.',n:'ruins'},
      {l:'Ir pelo templo.',n:'sacerdote_early',ef:{cor:1}},
    ]},
// ═══════════════════════════════════════════════════════════════
//  RUÍNAS DE AETHERION
// ═══════════════════════════════════════════════════════════════
  ruins:{title:'III.  AS RUÍNAS',art:'ruins',
    text:'O que restou de Aetherion não é ruína — é cicatriz.\n\nAs pedras não estão caídas. Estão fundidas. O calor de Vorthax as derreteu e depois esfriou, e o resultado são formas que nunca pertenceram a nenhuma arquitetura humana.\n\nEntre os escombros, algo brilha com luz que não deveria existir a essa hora.',
    ch:[
      {l:'Aproximar-se da luz.',n:'ruins_light',ef:{fe:1}},
      {l:'Examinar as pedras fundidas.',n:'ruins_examine',ef:{con:1}},
      {l:'Procurar a entrada para baixo.',n:'ruins_entrance'},
    ]},
  ruins_light:{title:'III.  A LÂMINA',art:'ruins',
    text:'Uma lâmina.\n\nA Lâmina de Aetherion — você a reconhece pelos desenhos no punho. Forjada com Fé, não dobra ante a Corrupção.\n\nEla está cravada em uma pedra como se alguém a tivesse colocado ali para aguardar. Como se alguém soubesse.\n\nQuando você toca o punho, algo quente sobe pelo braço. Não queima. Consola.',
    ch:[
      {l:'Pegar a Lâmina de Aetherion.',n:'ruins_relic',ef:{relic:'Lâmina de Aetherion',fe:1}},
      {l:'Deixar. Ela pertence a esse lugar.',n:'ruins_entrance'},
    ]},
  ruins_relic:{title:'III.  A LÂMINA',art:'ruins',
    text:'A Lâmina responde ao toque.\n\nÀ volta dela, nas pedras fundidas, há marcas de garra que você reconhece. Aqui Vorthax pousou. Aqui Aetherion terminou.\n\nMas a Lâmina não foi tocada. Em quatrocentos anos, nenhum dragão ou sombra tocou essa lâmina.\n\nIsso significa algo.',
    ch:[
      {l:'Descer pelas ruínas.',n:'ruins_entrance',ef:{con:1}},
      {l:'Voltar para Lira primeiro.',n:'lira_meet'},
    ]},
  ruins_examine:{title:'III.  AS PEDRAS',art:'ruins',
    text:'As pedras fundidas guardam impressões.\n\nAlgo foi esmagado com pressão suficiente para deixar marcas de escama no granito. As marcas formam um padrão — não aleatório. Intencional.\n\nParece escrita. Parece um nome partido ao meio.\n\nA outra metade está em outro lugar.',
    ch:[
      {l:'Procurar a Lâmina enquanto está aqui.',n:'ruins_light'},
      {l:'Guardar o padrão na memória e descer.',n:'ruins_entrance',ef:{con:1}},
    ]},
  ruins_entrance:{title:'III.  A ENTRADA',art:'ruins',
    text:'A entrada para baixo fica onde ficava o altar principal de Aetherion.\n\nO altar está partido ao meio. Ao fundo da fissura — escada. Fria. Profunda. Sem fim visível.\n\nO cheiro que sobe não é de pedra. É de algo mais velho que pedra.\n\nÉ de Vorthax.',
    ch:[
      {l:'Descer.',n:'descent_gate'},
      {l:'Procurar o Coração de Luminar antes.',n:'ruins_coracão'},
    ]},
  ruins_coracão:{title:'III.  O CORAÇÃO',art:'coracão',
    text:'Numa câmara lateral às ruínas — pequena, quase perdida — você encontra o Coração de Luminar.\n\nÉ um cristal vermelho que brilha com luz que não deveria existir aqui.\n\nQuando você o segura, o mundo ao redor fica quieto por um momento. As paredes param de pulsar. O calor diminui.\n\nO cristal pulsa no ritmo do seu coração.',
    ch:[
      {l:'Guardar e descer.',n:'descent_gate',ef:{relic:'Coração de Luminar',fe:2}},
    ]},
// ═══════════════════════════════════════════════════════════════
//  O TEMPLO / SACERDOTE
// ═══════════════════════════════════════════════════════════════
  sacerdote_early:{title:'II.  O TEMPLO',art:'sacerdote',
    text:'O templo de Vorthax é silencioso de um jeito que parece ensaiado.\n\nO sacerdote te recebe como se esperasse.\n\n"Cavaleiro de Aetherion." ele diz. Não com desprezo. Com algo parecido com piedade.\n\n"Vorthax sente sua presença desde que entrou na cidade. Ele já sabe que você veio."',
    ch:[
      {l:'"Mostre-me o caminho para baixo."',n:'sacerdote'},
      {l:'"O que Vorthax quer?"',n:'sacerdote_question'},
      {l:'Sair. Ir pelas ruínas.',n:'ruins'},
    ]},
  sacerdote_question:{title:'II.  O TEMPLO',art:'sacerdote',
    text:'"Vorthax quer o que todo fragmento quer — completude."\n\n"Malagar foi partido para ser aprisionado. Vorthax é um desses pedaços. Cada alma absorvida é um passo em direção ao todo."\n\n"Mas você não está aqui para ser absorvido, não é? Você acha que pode salvar o dragão."\n\nEle sorri. Não de crueldade. De quem viu isso antes.',
    ch:[
      {l:'"Isso é possível?"',n:'sacerdote',ef:{fe:1}},
      {l:'"Saia do meu caminho."',n:'sacerdote_force'},
    ]},
  sacerdote_force:{title:'II.  O TEMPLO',art:'sacerdote',
    text:'O sacerdote se afasta. Sem resistência.\n\n"Todos os que desceram pela força ficaram lá." ele diz.\n\n"A força de Vorthax não é física. É filosófica. Você não pode vencer com espada o que vive dentro de você."\n\nA porta abre. O cheiro de abismo sobe.',
    ch:[
      {l:'Descer.',n:'zareth_tomb',ef:{cor:1}},
    ]},
  sacerdote:{title:'IV.  O SACERDOTE',art:'sacerdote',
    text:'No fundo das escadas, antes do abismo — um altar menor. O sacerdote de Vorthax está aqui.\n\nEle não está orando. Está esperando.\n\n"Você chegou mais fundo que a maioria." ele diz. "Isso tem valor. Vorthax valorizará isso."\n\n"Posso mostrar o caminho final. Em troca de uma escolha."',
    ch:[
      {l:'"Qual escolha?"',n:'sacerdote_offer'},
      {l:'"Não preciso de você."',n:'sacerdote_refuse',ef:{fe:1}},
      {l:'Ignorar e passar.',n:'zareth_tomb'},
    ]},
  sacerdote_offer:{title:'IV.  A BÊNÇÃO',art:'sacerdote',
    text:'"A escolha é simples: aceite a bênção de Vorthax, e o dragão saberá de sua intenção — poderá recebê-lo com benevolência."\n\n"A bênção muda algo em você. Nem todos notam o que muda. Alguns preferem não notar."\n\nEle estende as mãos. A sombra atrás dele move-se de um jeito que não deveria.',
    ch:[
      {l:'Aceitar a bênção de Vorthax.',n:'sacerdote_join',ef:{cor:2}},
      {l:'Recusar educadamente.',n:'sacerdote_refuse',ef:{fe:1}},
    ]},
  sacerdote_join:{title:'IV.  A BÊNÇÃO',art:'sacerdote',
    text:'A bênção é fria.\n\nNão na temperatura — no significado. Como se algo em você soubesse que não deveria ter acontecido e protestasse em silêncio.\n\nO sacerdote sorri. "Vorthax espera."\n\nVocê sente a diferença ao descer. As sombras não parecem mais sombras. Parecem extensões de algo mais velho.',
    ch:[
      {l:'Continuar descendo.',n:'zareth_tomb',ef:{cor:1}},
    ]},
  sacerdote_refuse:{title:'IV.  O SACERDOTE',art:'sacerdote',
    text:'O sacerdote abaixa as mãos.\n\n"Esperava essa resposta." ele diz. Sem raiva. Com algo parecido com respeito.\n\n"Seis descenderam como você. Recusando. Com Fé. Nenhum voltou como o que era."\n\n"Mas dois voltaram. Isso é mais do que os outros podem dizer."\n\nEle se afasta. O caminho abaixo fica aberto.',
    ch:[
      {l:'Descer.',n:'zareth_tomb',ef:{fe:1}},
    ]},
// ═══════════════════════════════════════════════════════════════
//  ATO II — A DESCIDA
// ═══════════════════════════════════════════════════════════════
  descent_gate:{title:'III.  O PORTÃO',art:'descent',
    text:'O portão do abismo não é dramático.\n\nÉ uma abertura na pedra. Estreita. Com escadas que desaparecem no escuro.\n\nO ar que sobe é quente de um jeito específico — não como fogo, mas como a memória de fogo. Como se o calor tivesse queimado aqui tanto tempo que a pedra aprendeu a imitá-lo.\n\nAbaixo daqui, em algum lugar, está Vorthax.',
    ch:[
      {l:'Descer.',n:'zareth_tomb'},
      {l:'Fazer uma oração antes de descer.',n:'zareth_tomb',ef:{fe:1}},
    ]},
// ═══════════════════════════════════════════════════════════════
//  TUMBA DE ZARETH
// ═══════════════════════════════════════════════════════════════
  zareth_tomb:{title:'IV.  A TUMBA DE ZARETH',art:'tomb',
    text:'A câmara abaixo ainda tem inscrições nas paredes.\n\nOs nomes dos cavaleiros da Ordem. Quase todos riscados.\n\nNo centro — uma armadura vazia. Posta como um corpo seria posto, mas sem corpo dentro. A inscrição na base diz apenas: ZARETH. E abaixo:\n\n"Ele desceu. Não voltou. Isso era escolha."',
    ch:[
      {l:'Examinar a armadura.',n:'zareth_armor',ef:{con:1}},
      {l:'Procurar o Diário.',n:'zareth_diary_find'},
      {l:'Seguir em frente.',n:'abyss'},
    ]},
  zareth_armor:{title:'IV.  A ARMADURA',art:'tomb',
    text:'A armadura de Zareth está intacta. Sem arranhões. Sem marcas de queimadura.\n\nO que removeu o homem da armadura não foi violência. Foi algo mais silencioso.\n\nEntre as dobras do metal, você encontra um amuleto — de prata, com o símbolo de Aetherion.\n\nComo se Zareth tivesse deixado algo de si para trás. De propósito.',
    ch:[
      {l:'Pegar o Amuleto de Aether.',n:'zareth_diary_find',ef:{relic:'Amuleto de Aether',con:1}},
      {l:'Respeitar e deixar onde está.',n:'zareth_diary_find'},
    ]},
  zareth_diary_find:{title:'IV.  O DIÁRIO',art:'tomb',
    text:'Elias tinha razão. O Diário está aqui — enterrado sob uma pedra solta atrás da armadura.\n\nÉ um livro comum. Papel comum. Mas a tinta é escura de um jeito que não parece apenas tinta.\n\nA última entrada está manchada. Como se tivesse sido escrita com urgência. Ou medo.',
    ch:[
      {l:'Ler o Diário agora.',n:'zareth_diary'},
      {l:'Levar sem ler.',n:'abyss',ef:{relic:'Diário de Zareth',con:1}},
    ]},
  zareth_diary:{title:'IV.  O DIÁRIO DE ZARETH',art:'diary',
    text:'"Vorthax não é o inimigo que imaginei."\n\n"Ele é um fragmento em agonia. Cada alma que absorve é uma tentativa de aliviar uma dor que não tem fim. Malagar o criou para sofrer."\n\n"O nome verdadeiro de Vorthax está dividido. Metade nas pedras de Aetherion. A outra metade aqui, na última página deste diário:"\n\nVocê vira a página.',
    ch:[
      {l:'Ver o nome verdadeiro.',n:'zareth_name',ef:{relic:'Diário de Zareth',con:2}},
    ]},
  zareth_name:{title:'IV.  O NOME',art:'diary',
    text:'"VAETHORAX."\n\nO nome verdadeiro de Vorthax. O que ele era antes de ser fragmentado.\n\nZareth escreve:\n\n"Se alguém disser esse nome — o nome completo — Vorthax não pode absorver. A Corrupção recua diante da verdade de si mesmo."\n\n"Eu não tive coragem. Que você tenha."',
    ch:[
      {l:'Fechar o diário e descer.',n:'abyss',ef:{con:1}},
    ]},
// ═══════════════════════════════════════════════════════════════
//  O ABISMO
// ═══════════════════════════════════════════════════════════════
  abyss:{title:'V.  O ABISMO',art:'abyss',
    text:'O abismo não é escuridão.\n\nÉ presença.\n\nO ar aqui é denso, quente, carregado de uma vontade que não é sua mas que você reconhece como algo que poderia ter sido, se as escolhas tivessem sido outras.\n\nAs paredes pulsam em laranja fraco. Respiração. Rítmica. Viva.\n\nVorthax.',
    get ch(){
      const c=[
        {l:'Avançar para a presença.',n:'vorthax_shadow'},
        {l:'Procurar o Coração de Luminar antes.',n:'abyss_coracão',ef:{fe:1}},
      ];
      if(G.conhecimento>=2||hasRelic('Diário de Zareth'))
        c.push({l:'Consultar o que Zareth anotou sobre este lugar.',n:'zareth_abyss'});
      if(hasRelic('Espelho de Veritas'))
        c.push({l:'Usar o Espelho de Veritas.',n:'mirror_scene'});
      return c;
    }},
  abyss_coracão:{title:'V.  O CORAÇÃO',art:'coracão',
    text:'Numa câmara lateral — pequena, quase perdida — o Coração de Luminar.\n\nÉ um cristal vermelho que brilha com luz que não deveria existir aqui.\n\nQuando você o segura, o abismo ao redor fica quieto. As paredes param de pulsar. O calor diminui.\n\nO cristal pulsa no ritmo do seu coração. Ou você pulsa no ritmo dele.',
    ch:[
      {l:'Guardar e continuar.',n:'vorthax_shadow',ef:{relic:'Coração de Luminar',fe:2}},
    ]},
  zareth_abyss:{title:'V.  O DIÁRIO NO ABISMO',art:'diary',
    text:'Zareth escreveu:\n\n"No fundo, antes do confronto, haverá uma tentação de usar poder contra poder. Resistir a isso é metade da batalha."\n\n"Vorthax não pode ser vencido em combate direto. Pode apenas ser redimido ou aprisionado. E aprisionamento é apenas adiamento."\n\n"A terceira opção existe. Mas exige tudo."',
    ch:[
      {l:'Continuar para o confronto.',n:'vorthax_shadow',ef:{con:1}},
    ]},
  mirror_scene:{title:'V.  O ESPELHO',art:'mirror',
    text:'No centro da câmara há um espelho de metal negro — o Espelho de Veritas.\n\nVocê se aproxima. O reflexo não é você. Ou é você — mas antes. Antes das escolhas que te trouxeram aqui.\n\nO espelho mostra verdades, não futuros. E a verdade que você vê é:\n\nVorthax está sofrendo. Há quatrocentos anos.',
    ch:[
      {l:'Aceitar essa verdade.',n:'vorthax_shadow',ef:{fe:1,con:1}},
      {l:'Quebrar o espelho.',n:'vorthax_shadow',ef:{cor:1}},
    ]},
// ═══════════════════════════════════════════════════════════════
//  ATO III — O CONFRONTO FINAL
// ═══════════════════════════════════════════════════════════════
  vorthax_shadow:{title:'VI.  A PRESENÇA',art:'vorthax_shadow',
    text:'Você o sente antes de vê-lo.\n\nUma presença tão antiga que faz as pedras parecerem temporárias. Um calor que não é físico — é existencial.\n\n"Cavaleiro."\n\nA voz não vem do ar. Vem do chão, das paredes, de dentro do seu peito onde algo ressoa com ela.\n\n"Você veio com Fé ou com espada?"',
    get ch(){
      const c=[
        {l:'"Com Fé."',n:'vorthax_fe',ef:{fe:1}},
        {l:'"Com espada."',n:'vorthax_espada',ef:{cor:1}},
      ];
      if(G.conhecimento>=3||hasRelic('Diário de Zareth'))
        c.push({l:'"Com um nome. VAETHORAX."',n:'vorthax_nome'});
      return c;
    }},
  vorthax_fe:{title:'VI.  VORTHAX',art:'vorthax_shadow',
    text:'Uma pausa. O calor diminui levemente.\n\n"Há muito tempo não encontro esse tipo de resposta."\n\nVorthax se materializa — não completamente, mas o suficiente. Uma forma de escamas e fogo que é também um ser pensante, sofrendo, antigo.\n\n"Fé não derrota a Corrupção." ele diz. "Mas pode coexistir com ela. Por um tempo."\n\n"O que você propõe, cavaleiro?"',
    ch:[
      {l:'"Redenção."',n:'vorthax_redenção',ef:{fe:1}},
      {l:'"O fim do seu sofrimento."',n:'final_chamber',ef:{fe:1}},
    ]},
  vorthax_espada:{title:'VI.  VORTHAX',art:'vorthax_shadow',
    text:'"Claro." A voz não tem surpresa. Apenas cansaço.\n\n"Todos vêm com espada. A espada encontra escamas. O fogo encontra carne. E mais um cavaleiro fica nas profundezas."\n\nEle não ataca. Aguarda.\n\n"Mas você ainda está de pé. Isso é incomum. Isso merece um momento antes do fim."',
    ch:[
      {l:'"Não vim para morrer. Vim terminar isso."',n:'vorthax_redenção',ef:{cor:1}},
      {l:'"Talvez eu tenha vindo pela razão errada."',n:'vorthax_fe',ef:{fe:1}},
    ]},
  vorthax_nome:{title:'VI.  O NOME VERDADEIRO',art:'vorthax_final',
    text:'O silêncio que se segue é diferente de todos os silêncios.\n\nO chão para de tremer. O calor cai. As paredes param de pulsar.\n\nQuando Vorthax se materializa, não como sombra de fogo mas como forma — como ser — nos olhos dele há algo que você reconhece.\n\nReconhecimento.\n\n"Quatro séculos." ele diz. "Em quatrocentos anos, ninguém soube esse nome."',
    ch:[
      {l:'"Zareth te amava o suficiente para deixar um mapa."',n:'final_chamber',ef:{fe:2,con:1}},
    ]},
  vorthax_redenção:{title:'VI.  VORTHAX',art:'vorthax_shadow',
    text:'"Redenção." Vorthax repete a palavra como se a estivesse testando.\n\n"Sabe o que é preciso para redimir um fragmento de Malagar?"\n\nEle se aproxima.\n\n"É preciso que alguém aceite carregar a Corrupção ao invés dele. Para que ele se torne puro, alguém deve se tornar impuro."\n\n"Você se oferece, cavaleiro?"',
    get ch(){
      const c=[
        {l:'"Sim. Aceito a Corrupção."',n:'end_sombrio',ef:{cor:4}},
        {l:'"Não. Há outro caminho."',n:'final_chamber',ef:{fe:1}},
      ];
      if(G.conhecimento>=2||hasRelic('Espelho de Veritas'))
        c.push({l:'"Você está mentindo. O espelho mostrou a verdade."',n:'final_chamber',ef:{con:1,fe:1}});
      return c;
    }},
// ═══════════════════════════════════════════════════════════════
  final_chamber:{title:'VII.  A CÂMARA',art:'vorthax_final',
    text:'A câmara onde Vorthax existe em sua totalidade é enorme e impossível ao mesmo tempo.\n\nNo centro — ele. Completamente. Pela primeira vez você vê o que Zareth viu e não pôde salvar.\n\nVorthax é imenso e antigo e está, inequivocamente, em agonia.\n\nNão a agonia de um inimigo. A agonia de algo que não escolheu o que é e carrega o peso disso há quatrocentos anos.',
    get ch(){
      const c=[];
      if(G.fe>=6) c.push({l:'[FÉ] Oferecer redenção — Final da Luz.',n:'end_luz'});
      if(G.corrupcao>=6) c.push({l:'[CORRUPÇÃO] Absorver o poder — Final Sombrio.',n:'end_sombrio'});
      c.push({l:'Buscar equilíbrio entre os dois.',n:'end_equilíbrio'});
      if(hasRelic('Lâmina de Aetherion')&&G.fe>=4)
        c.push({l:'[LÂMINA] Usar a Lâmina de Aetherion.',n:'end_luz',ef:{fe:2}});
      return c;
    }},
// ═══════════════════════════════════════════════════════════════
//  FINS
// ═══════════════════════════════════════════════════════════════
  end_luz:{title:'FIM  —  A LUZ',art:'end_luz',
    text:'A Fé não é um escudo — é uma resposta.\n\nVorthax a vê e, pela primeira vez em quatrocentos anos, algo nele lembra o que era antes de ser fragmentado.\n\nVaethorax.\n\nO nome completo soa em você e soa nele. A Corrupção não desaparece — transforma-se. Em luz. Em energia que sobe pelas pedras de Eclipsia, pelos ossos de Aetherion, pelo ar de um mundo que finalmente respira.\n\nVorthax se dissolve. Não como morte. Como liberação.',
    ch:[{l:'Começar de novo.',n:'intro',restart:true}]},
  end_sombrio:{title:'FIM  —  A SOMBRA',art:'end_sombrio',
    text:'Você aceita.\n\nA Corrupção de Vorthax entra como frio que queima. Como escuridão que ilumina ao seu modo.\n\nVorthax se dissolve. Mas o fragmento de Malagar não — ele continua. Em você.\n\nVocê sobe de Eclipsia com poder que não sabia que era possível. As pessoas na rua desviam o olhar.\n\nElias te encontra na saída. Olha para você por um longo tempo.\n\n"Zareth era assim." ele diz. "No começo."',
    ch:[{l:'Começar de novo.',n:'intro',restart:true}]},
  end_equilíbrio:{title:'FIM  —  O EQUILÍBRIO',art:'end_equilíbrio',
    text:'Você não oferece redenção. Você não absorve o poder.\n\nVocê se senta.\n\nDiante de Vorthax, no centro da câmara mais profunda de Eclipsia, você simplesmente fica presente.\n\nE pergunta: "O que você precisa?"\n\nNinguém tinha perguntado isso antes. Em quatrocentos anos.\n\nVorthax demora. Então:\n\n"Para de doer."\n\nVocê passa a noite ali. Ouvindo. Até que o abismo, pela primeira vez, fica quieto.',
    ch:[{l:'Começar de novo.',n:'intro',restart:true}]},
  morte:{title:'FIM  —  O ABISMO',art:'morte',
    text:'A Corrupção te alcança.\n\nNão como morte — como transformação.\n\nVocê fica.\n\nEm algum lugar profundo de Eclipsia, há mais um cavaleiro que não voltou. E as paredes do abismo pulsam um pouco mais forte.',
    ch:[{l:'Recomeçar.',n:'intro',restart:true}]},
  entrance:{title:'A ENTRADA',art:'entrance',
    text:'Você está diante da boca de Soma.\n\nO ar frio sobe das pedras como respiração de uma coisa adormecida. A pedra ao redor é antiga — mais antiga que qualquer palavra que você conhece para dizer "antiga".',
    ch:[{l:'Entrar nas trevas',n:'corridor'},
        {l:'Examinar a inscrição na pedra',n:'inscription'},
        {l:'Olhar para trás',n:'turn_back'}]},
  inscription:{title:'A INSCRIÇÃO',art:'entrance',
    text:'"Aqui jazem aqueles que desceram.\nNenhum voltou.\nNenhum quis."\n\nA escrita está em algo que não é exatamente uma língua. Você entendeu assim mesmo.',

// ── WOODCUT ART HELPERS ───────────────────────────────────────
// Horizontal hatching
function wkH(x,y,w,h,gap,col,alpha){
  ctx.globalAlpha=alpha;ctx.fillStyle=col;
  for(let ry=Math.ceil(y);ry<y+h;ry+=gap)ctx.fillRect(x,ry,w,1);
  ctx.globalAlpha=1;
}
// Diagonal hatching
function wkD(x,y,w,h,gap,col,alpha){
  ctx.globalAlpha=alpha;ctx.fillStyle=col;
  for(let s=-h;s<w;s+=gap){
    for(let i=0;i<h;i++){const px=x+s+i;if(px>=x&&px<x+w)ctx.fillRect(px,y+i,1,1);}
  }
  ctx.globalAlpha=1;
}
// Random grain
function wkGrain(x,y,w,h,n,col,alpha){
  ctx.globalAlpha=alpha;ctx.fillStyle=col;
  for(let i=0;i<n;i++)ctx.fillRect(x+ri(0,w-1),y+ri(0,h-1),1,1);
  ctx.globalAlpha=1;
}
// Woodcut frame (ornate engraving border)
function wkFrame(){
  // Heavy ink border
  ctx.fillStyle=P.ink;
  ctx.fillRect(0,0,AW,4);ctx.fillRect(0,AH-4,AW,4);
  ctx.fillRect(0,0,4,AH);ctx.fillRect(AW-4,0,4,AH);
  // Inner gold rule
  ctx.fillStyle=P.gold;
  ctx.fillRect(6,6,AW-12,1);ctx.fillRect(6,AH-7,AW-12,1);
  ctx.fillRect(6,6,1,AH-12);ctx.fillRect(AW-7,6,1,AH-12);
  // Corner ornaments
  [[6,6],[AW-14,6],[6,AH-14],[AW-14,AH-14]].forEach(([cx,cy])=>{
    ctx.fillStyle=P.wa4;ctx.fillRect(cx,cy,8,8);
    ctx.fillStyle=P.ink;ctx.fillRect(cx+1,cy+1,6,6);
    ctx.fillStyle=P.wa5;ctx.fillRect(cx+3,cy+3,2,2);
  });
}
// Torch glow radial
function torchGlow(x,y,r,intensity,col){
  const g=ctx.createRadialGradient(x,y,2,x,y,r);
  g.addColorStop(0,col||`rgba(200,90,10,${intensity})`);
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(x-r,y-r,r*2,r*2);
}
// Torch flame widget
function torchFlame(x,y,t,i){
  const f=.72+.28*Math.sin(t*5.8+i*1.7);
  torchGlow(x,y,55+f*12,f*.45);
  ctx.fillStyle=P.stoneLit;ctx.fillRect(x-2,y,4,14);
  ctx.fillStyle=P.stone;ctx.fillRect(x-3,y-2,6,5);
  ctx.fillStyle=P.torchO;ctx.globalAlpha=f;ctx.fillRect(x-4,y-6,8,7);
  ctx.fillStyle=P.torch;ctx.globalAlpha=f;ctx.fillRect(x-3,y-11,6,7);
  ctx.fillStyle=P.torchY;ctx.globalAlpha=f*.9;ctx.fillRect(x-2,y-15,4,6);
  ctx.fillStyle=P.torchW;ctx.globalAlpha=f*.7;ctx.fillRect(x-1,y-17,2,4);
  ctx.globalAlpha=1;
  if(Math.random()<.12)spark(x+ri(-2,2),y-17,Math.random()<.5?P.torch:P.torchY);
}

// ── ART FUNCTIONS (woodcut / dark-engraving style) ───────────

// ─── KNIGHT / KAEL ───────────────────────────────────────────
function artKnight(t){
  // Background — dark parchment
  ctx.fillStyle=P.paper;ctx.fillRect(0,0,AW,AH);
  wkH(0,0,AW,AH,3,P.hatch,.65);
  wkD(0,0,AW,AH,9,P.wa0,.25);
  wkGrain(0,0,AW,AH,80,P.wa3,.12);
  // Ground
  ctx.fillStyle=P.stone;ctx.fillRect(0,Math.floor(AH*.76),AW,AH);
  wkH(0,Math.floor(AH*.76),AW,Math.ceil(AH*.24),2,P.ink,.5);
  // Torch glow from left
  torchGlow(30,AH*.7,180,.4,`rgba(200,90,10,0.4)`);
  torchFlame(30,Math.floor(AH*.68),t,0);
  // Knight standing — kx=195, feet at ky=AH*.78
  const kx=195,ky=Math.floor(AH*.78);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(kx-46,ky-4,92,10);
  // Sabatons (boots)
  ctx.fillStyle=P.met1;ctx.fillRect(kx-22,ky-8,18,8);ctx.fillRect(kx+4,ky-8,18,8);
  ctx.fillStyle=P.met2;ctx.fillRect(kx-20,ky-6,6,4);ctx.fillRect(kx+14,ky-6,6,4);
  // Greaves
  ctx.fillStyle=P.met1;ctx.fillRect(kx-20,ky-58,16,50);ctx.fillRect(kx+4,ky-58,16,50);
  ctx.fillStyle=P.met2;ctx.fillRect(kx-18,ky-56,5,46);ctx.fillRect(kx+13,ky-56,5,46);
  wkH(kx-20,ky-58,16,50,6,P.ink,.35);wkH(kx+4,ky-58,16,50,6,P.ink,.35);
  // Knee cops
  ctx.fillStyle=P.met2;ctx.fillRect(kx-22,ky-64,20,10);ctx.fillRect(kx+2,ky-64,20,10);
  ctx.fillStyle=P.met3;ctx.fillRect(kx-20,ky-63,7,5);ctx.fillRect(kx+13,ky-63,7,5);
  // Cuisses (upper legs)
  ctx.fillStyle=P.met1;ctx.fillRect(kx-20,ky-108,18,46);ctx.fillRect(kx+2,ky-108,18,46);
  ctx.fillStyle=P.met2;ctx.fillRect(kx-18,ky-106,6,42);ctx.fillRect(kx+12,ky-106,6,42);
  // Tassets (skirt armor)
  ctx.fillStyle=P.met1;ctx.fillRect(kx-24,ky-122,48,16);
  ctx.fillStyle=P.met2;
  for(let i=0;i<5;i++)ctx.fillRect(kx-22+i*9,ky-120,7,3);
  // Breastplate
  ctx.fillStyle=P.met1;ctx.fillRect(kx-22,ky-216,44,96);
  ctx.fillStyle=P.met2;ctx.fillRect(kx-20,ky-214,7,90);
  ctx.fillStyle=P.met3;ctx.fillRect(kx-2,ky-214,4,90);
  // Chest cross ornament
  ctx.fillStyle=P.wa4;ctx.fillRect(kx-8,ky-180,16,2);ctx.fillRect(kx-1,ky-186,2,14);
  // Breastplate etching
  wkH(kx-20,ky-214,40,88,10,P.ink,.3);
  // Pauldrons (shoulders)
  ctx.fillStyle=P.met1;ctx.fillRect(kx-44,ky-216,24,34);ctx.fillRect(kx+20,ky-216,24,34);
  ctx.fillStyle=P.met2;ctx.fillRect(kx-42,ky-214,8,30);ctx.fillRect(kx+34,ky-214,8,30);

function startType(text){ tLines=wrapText(text,TW-18); tChars=0; G.typeDone=false; }

function tickType(){
  if(G.typeDone)return;
  tChars+=tSpeed;
  let total=0; for(const l of tLines)total+=l.length+1;
  if(tChars>=total){G.typeDone=true;tChars=total;}
}

// ── RENDER ────────────────────────────────────────────────────
function drawArt(key,t){
  ctx.fillStyle=P.ink;ctx.fillRect(0,0,AW,AH);
  switch(key){
    case'knight':        artKnight(t);        break;
    case'eclipsia':      artEclipsia(t);      break;
    case'lira':          artLira(t);          break;
    case'elias':         artElias(t);         break;
    case'ruins':         artRuins(t);         break;
    case'descent':       artDescent(t);       break;
    case'tomb':          artTomb(t);          break;
    case'diary':         artDiary(t);         break;
    case'sacerdote':     artSacerdote(t);     break;
    case'abyss':         artAbyss(t);         break;
    case'coracão':       artCoracão(t);       break;
    case'mirror':        artMirror(t);        break;
    case'vorthax_shadow':artVorthaxShadow(t); break;
    case'vorthax_final': artVorthaxFinal(t);  break;
    case'end_luz':       artEndLuz(t);        break;
    case'end_sombrio':   artEndSombrio(t);    break;
    case'end_equilíbrio':artEndEquilíbrio(t); break;
    case'morte':         artMorte(t);         break;
    default: artAbyss(t); break;
  }
}

function drawText(scene){
  ctx.fillStyle=P.paper; ctx.fillRect(TX,0,CW-TX,AH);
  // Parchment grain
  ctx.fillStyle='rgba(200,140,60,.018)';
  for(let i=0;i<60;i++)ctx.fillRect(TX+ri(0,CW-TX-1),ri(0,AH-1),1,1);
  // Left border (gold rule)
  ctx.fillStyle=P.gold; ctx.fillRect(TX,0,2,AH);
  ctx.fillStyle=P.goldL; ctx.fillRect(TX,0,1,AH);
  ctx.fillStyle=P.goldD; ctx.fillRect(TX+3,0,1,AH);
  // Title
  ctx.font='bold 16px monospace'; ctx.textBaseline='top';
  glow(scene.title,TX+16,14,P.goldL,'#c08040',9);
  // Divider
  ctx.fillStyle=P.gold; ctx.fillRect(TX+16,36,TW-4,1);
  ctx.fillStyle=P.goldL; ctx.fillRect(TX+16,37,TW-4,1);
  ctx.fillStyle=P.goldD; ctx.fillRect(TX+16,38,TW-4,1);
  // Story text
  ctx.font=FSIZE+'px monospace'; ctx.textBaseline='top';
  let drawn=0;
  for(let i=0;i<tLines.length;i++){
    const line=tLines[i];
    const rem=Math.max(0,Math.min(line.length,tChars-drawn));
    if(rem<=0)break;
    const vis=line.substring(0,Math.floor(rem));
    ctx.shadowColor='rgba(200,140,40,.45)'; ctx.shadowBlur=4;
    ctx.fillStyle=P.hTx;
    ctx.fillText(vis,TX+16,46+i*LH);
    ctx.shadowBlur=0;
    drawn+=line.length+1;
  }
  if(!G.typeDone&&Math.floor(Date.now()/400)%2===0){
    ctx.fillStyle=P.hBr; ctx.fillRect(TX+16,46+tLines.length*LH-2,9,3);
  }
  // Choices
  const choices=typeof scene.ch==='function'?scene.ch():scene.ch;
  if(G.typeDone&&choices){
    const textH=tLines.length*LH+46;
    const chStart=Math.min(AH-choices.length*CHR-26,textH+22);
    ctx.fillStyle=P.gold; ctx.fillRect(TX+16,chStart-14,TW-4,1);
    ctx.fillStyle=P.goldL; ctx.font='bold 10px monospace';
    ctx.fillText('▼  ESCOLHA',TX+16,chStart-11);
    choices.forEach((c,i)=>{
      const cy=chStart+i*CHR;
      const hov=G.hover===i;
      // Box bg
      if(hov){ctx.shadowColor='rgba(100,220,60,.5)'; ctx.shadowBlur=14;}
      ctx.fillStyle=hov?'#162e16':'#0a1408';
      ctx.fillRect(TX+10,cy,CW-TX-14,CHR-5);
      ctx.shadowBlur=0;
      // Left accent bar
      ctx.fillStyle=hov?'#a8ff60':'#4a7028';
      ctx.fillRect(TX+10,cy,4,CHR-5);
      // Border
      ctx.strokeStyle=hov?'#80d040':'#3a5020';
      ctx.lineWidth=1; ctx.strokeRect(TX+10.5,cy+.5,CW-TX-15,CHR-6);
      // Number badge
      const bx=TX+19,by=cy+10;
      ctx.fillStyle=hov?'#50a030':'#1e3410';
      ctx.fillRect(bx,by,22,22);
      ctx.strokeStyle=hov?'#80d040':'#4a7028'; ctx.lineWidth=1;
      ctx.strokeRect(bx+.5,by+.5,22,22);
      ctx.font='bold 14px monospace'; ctx.textBaseline='top'; ctx.textAlign='center';
      ctx.fillStyle=hov?'#000':'#a8d870';
      ctx.fillText(i+1,bx+11,by+4);
      ctx.textAlign='left';
      // Label
      ctx.font=(hov?'bold ':'')+'14px monospace'; ctx.textBaseline='middle';
      if(hov){ctx.shadowColor='#a8ff60';ctx.shadowBlur=7;}
      ctx.fillStyle=hov?'#e8ffb0':'#b8e088';
      ctx.fillText(c.l,TX+50,cy+(CHR-5)/2);
      ctx.shadowBlur=0;
      // Arrow
      if(hov){
        ctx.fillStyle='#a8ff60'; ctx.font='bold 14px monospace'; ctx.textAlign='right';
        ctx.shadowColor='#60ff20'; ctx.shadowBlur=5;
        ctx.fillText('▶',CW-16,cy+(CHR-5)/2);
        ctx.shadowBlur=0;
        ctx.textAlign='left';
      }
    });
    ctx.fillStyle=P.hDm; ctx.font='10px monospace'; ctx.textBaseline='top';
    ctx.fillText('[1] [2] [3]  ou  clique',TX+16,AH-15);
  } else if(!G.typeDone){
    ctx.fillStyle=P.hDm; ctx.font='10px monospace'; ctx.textBaseline='top';
    ctx.fillText('[ESPAÇO] pular',TX+16,AH-15);
  }
}

function drawHUD(){
  // Fundo sólido visível
  ctx.fillStyle='#0e0b06';ctx.fillRect(0,HY,CW,HH);
  // Linha topo: âmbar brilhante + sombra
  ctx.fillStyle=P.wa4;ctx.fillRect(0,HY,CW,2);
  ctx.fillStyle='#2a1a08';ctx.fillRect(0,HY+2,CW,1);

  ctx.textBaseline='top';
  const BH=17; // altura das barras
  const row1=HY+10, row2=HY+44, row3=HY+78;

  // helper: label grande
  const lbl=(t,x,y)=>{
    ctx.font='bold 13px monospace';
    ctx.shadowColor=P.wa4;ctx.shadowBlur=8;
    ctx.fillStyle=P.wa5;ctx.fillText(t,x,y);
    ctx.shadowBlur=0;
  };

  // ─ FÉ ──────────────────────────────────────────────────────────
  lbl('FÉ',8,row1);
  ctx.fillStyle='#0c0c1e';ctx.fillRect(36,row1,130,BH);
  const ff=G.fe/10;
  const fc=ff>.6?'#80b8ff':ff>.3?'#5070d0':'#3050a0';
  ctx.fillStyle=fc;ctx.fillRect(36,row1,Math.floor(130*ff),BH);
  // brilho interno da barra
  ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(36,row1,Math.floor(130*ff),4);
  ctx.strokeStyle='#4060a0';ctx.lineWidth=1.5;ctx.strokeRect(36.5,row1+.5,130,BH);
  ctx.shadowColor=fc;ctx.shadowBlur=10;
  ctx.fillStyle='#e0f0ff';ctx.font='bold 11px monospace';
  ctx.fillText(G.fe+'/10',170,row1+3);
  ctx.shadowBlur=0;

  // ─ CORRUPÇÃO ───────────────────────────────────────────────────
  lbl('COR',8,row2);
  ctx.fillStyle='#120008';ctx.fillRect(42,row2,130,BH);
  const cf=G.corrupcao/10;
  const cc=cf>.6?'#ff50a0':cf>.3?'#a01860':'#601040';
  ctx.fillStyle=cc;ctx.fillRect(42,row2,Math.floor(130*cf),BH);
  ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(42,row2,Math.floor(130*cf),4);
  ctx.strokeStyle='#801040';ctx.lineWidth=1.5;ctx.strokeRect(42.5,row2+.5,130,BH);
  ctx.shadowColor=cc;ctx.shadowBlur=10;
  ctx.fillStyle='#ffd0e8';ctx.font='bold 11px monospace';
  ctx.fillText(G.corrupcao+'/10',176,row2+3);
  ctx.shadowBlur=0;

  // ─ CONHECIMENTO ────────────────────────────────────────────────
  lbl('CON',8,row3);
  for(let i=0;i<5;i++){
    const lit=i<G.conhecimento;
    ctx.fillStyle=lit?P.wa3:'#180e04';
    ctx.fillRect(42+i*24,row3,20,BH);
    if(lit){
      ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(42+i*24,row3,20,5);
      ctx.shadowColor=P.wa5;ctx.shadowBlur=8;
    }
    ctx.strokeStyle=lit?P.wa4:'#2a1a06';
    ctx.lineWidth=1.5;ctx.strokeRect(42.5+i*24,row3+.5,20,BH);
    ctx.shadowBlur=0;
  }
  ctx.shadowColor=P.wa4;ctx.shadowBlur=6;
  ctx.fillStyle=P.wa5;ctx.font='bold 11px monospace';
  ctx.fillText(G.conhecimento+'/5',170,row3+3);
  ctx.shadowBlur=0;

  // ─ Divisor central ─────────────────────────────────────────────
  ctx.fillStyle=P.wa2;ctx.fillRect(220,HY+6,1,HH-12);

  // ─ Relíquias ───────────────────────────────────────────────────
  ctx.shadowColor=P.wa3;ctx.shadowBlur=6;
  ctx.fillStyle=P.wa5;ctx.font='bold 11px monospace';
  ctx.fillText('RELÍQUIAS',228,HY+8);
  ctx.shadowBlur=0;
  if(G.relics.length===0){
    ctx.fillStyle='#3a2810';ctx.font='10px monospace';
    ctx.fillText('nenhuma',228,HY+26);
  } else {
    G.relics.forEach((r,i)=>{
      ctx.shadowColor=P.wa3;ctx.shadowBlur=4;
      ctx.fillStyle=P.wa4;ctx.font='10px monospace';
      ctx.fillText('✦ '+r,228,HY+26+i*15);
      ctx.shadowBlur=0;
    });
  }

  // ─ Divisor direito ─────────────────────────────────────────────
  ctx.fillStyle=P.wa2;ctx.fillRect(AW+2,HY+6,1,HH-12);

  // ─ Painel direito ──────────────────────────────────────────────
  ctx.shadowColor=P.wa3;ctx.shadowBlur=8;
  ctx.fillStyle=P.goldL;ctx.font='bold 12px monospace';
  ctx.fillText('A LENDA DE SOMA',TX+10,HY+8);
  ctx.shadowBlur=0;
  ctx.fillStyle='#6a5030';ctx.font='10px monospace';
  ctx.fillText('[1][2][3] ou clique',TX+10,HY+28);
  ctx.fillText('[ESPAÇO] pula · [M] muta',TX+10,HY+42);
  ctx.shadowColor=P.wa3;ctx.shadowBlur=5;
  ctx.fillStyle=P.wa4;
  ctx.fillText('[E] Inventário  ·  [C] Personagem',TX+10,HY+58);
  ctx.shadowBlur=0;
  if(G.deaths>0){
    ctx.shadowColor='#ff3030';ctx.shadowBlur=8;
    ctx.fillStyle='#ff4040';ctx.font='bold 11px monospace';
    ctx.fillText('✝ Mortes: '+G.deaths,TX+10,HY+76);
    ctx.shadowBlur=0;
  }
}

let bootT0=null;
function drawBoot(t){
  if(bootT0===null)bootT0=t;
  const el=t-bootT0;
  ctx.fillStyle='#000';ctx.fillRect(0,0,CW,CH);
  // CRT scanlines
  for(let y=0;y<CH;y+=2){ctx.fillStyle='rgba(0,0,0,.18)';ctx.fillRect(0,y,CW,1);}
  const lh=17,px=110,py=22;
  ctx.font='13px monospace';ctx.textBaseline='top';ctx.textAlign='left';ctx.shadowBlur=0;
  let lastVisIdx=-1;
  BOOT_LINES.forEach(([time,col,txt],i)=>{
    if(el<time)return;
    const y=py+i*lh;
    if(col==='__bar__'){
      const prog=Math.min(1,(el-time)/1.08);
      const bw=CW-px*2-80;
      ctx.fillStyle='#08140a';ctx.fillRect(px,y,bw,13);
      ctx.fillStyle='#1a6a20';ctx.fillRect(px,y,Math.floor(bw*prog),13);
      ctx.fillStyle='rgba(80,200,80,.22)';ctx.fillRect(px,y,Math.floor(bw*prog),5);
      ctx.fillStyle='#78aa78';ctx.font='11px monospace';
      ctx.fillText(Math.floor(prog*100)+'%',px+bw+6,y+1);
      if(prog>=1){ctx.shadowColor='#78aa78';ctx.shadowBlur=6;ctx.fillText('  OK',px+bw+40,y+1);ctx.shadowBlur=0;}
      ctx.font='13px monospace';
      return;
    }
    if(!txt)return;
    if(col==='#ffe060'){ctx.shadowColor='#c89830';ctx.shadowBlur=18;}
    else if(col==='#50c050'){
      const pulse=0.65+0.35*Math.sin(el*3.8);
      ctx.shadowColor='#30c040';ctx.shadowBlur=14*pulse;ctx.globalAlpha=0.75+0.25*pulse;
    }
    else if(col==='#ff7060'){ctx.shadowColor='#ff3030';ctx.shadowBlur=8;}
    else if(col==='#78aa78'){ctx.shadowColor=col;ctx.shadowBlur=3;}
    ctx.fillStyle=col;ctx.fillText(txt,px,y);
    ctx.globalAlpha=1;ctx.shadowBlur=0;
    if(col)lastVisIdx=i;
  });
  // Blinking block cursor after last visible line (while not done)
  const last=BOOT_LINES[BOOT_LINES.length-1];
  if(lastVisIdx>=0&&el<last[0]){
    const [,lc,lt]=BOOT_LINES[lastVisIdx];
    if(lc&&lc!=='__bar__'&&lt){
      if(Math.floor(el*2.8)%2===0){
        ctx.fillStyle='#c0c0c0';
        ctx.fillRect(px+ctx.measureText(lt).width+2,py+lastVisIdx*lh+1,8,12);
      }
    }
  }
  // Dim skip hint bottom
  if(el>0.8){
    ctx.fillStyle='#242424';ctx.font='11px monospace';ctx.textAlign='center';
    ctx.fillText('[ ENTER ] pular',CW/2,CH-15);
    ctx.textAlign='left';
  }
  // Auto-advance after prompt has been visible 3.5s
  if(el>=6.0){bootT0=null;G.scene='title';Aud.playTitle();}
}

// ── SELEÇÃO DE PERSONAGEM ─────────────────────────────────────
function drawCharSelect(t){
  ctx.fillStyle='#000';ctx.fillRect(0,0,CW,CH);
  wkH(0,0,CW,CH,3,P.hatch,.55);
  wkGrain(0,0,CW,CH,120,P.wa2,.1);
  // Vinheta
  const vg=ctx.createRadialGradient(CW/2,CH/2,80,CW/2,CH/2,500);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.75)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,CW,CH);

  // Título
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.font='bold 13px "Cinzel",serif';
  ctx.shadowColor=P.wa3;ctx.shadowBlur=12;
  ctx.fillStyle=P.wa5;ctx.fillText('ESCOLHA SEU PERSONAGEM',CW/2,18);
  ctx.shadowBlur=0;
  ctx.fillStyle=P.wa2;ctx.fillRect(60,38,CW-120,1);

  // 3 cards
  const CRW=240,CRH=380,gap=20;
  const totalW=CHARS.length*CRW+(CHARS.length-1)*gap;
  const startX=(CW-totalW)/2;

  CHARS.forEach((ch,i)=>{
    const hov=G.charHov===i;
    const cx=startX+i*(CRW+gap), cy=46;
    const pulse=hov?(.04*Math.sin(t*3)):0;

    // Sombra do card
    if(hov){ctx.shadowColor=ch.col;ctx.shadowBlur=22;}
    // Card bg
    ctx.fillStyle=hov?'#1a1208':'#0e0a04';
    ctx.fillRect(cx,cy,CRW,CRH);
    ctx.shadowBlur=0;
    // Borda
    ctx.strokeStyle=hov?ch.col:P.wa1;
    ctx.lineWidth=hov?2:1;ctx.strokeRect(cx+.5,cy+.5,CRW-1,CRH-1);
    ctx.strokeStyle=hov?P.wa2:'#1a1008';
    ctx.lineWidth=1;ctx.strokeRect(cx+4.5,cy+4.5,CRW-9,CRH-9);

    // Arte mini (usando drawArt em offscreen seria complexo — usamos ícone grande)
    const icons=['⚔','📜','☠'];
    ctx.font=`${54+pulse*100}px monospace`;
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.shadowColor=ch.col;ctx.shadowBlur=hov?20:8;
    ctx.fillStyle=hov?P.wa5:P.wa3;
    ctx.fillText(icons[i],cx+CRW/2,cy+18);
    ctx.shadowBlur=0;

    // Nome
    ctx.font=`bold ${hov?16:14}px "Cinzel",serif`;
    ctx.shadowColor=hov?ch.col:'transparent';ctx.shadowBlur=hov?10:0;
    ctx.fillStyle=hov?P.wa6:P.wa4;
    ctx.fillText(ch.name,cx+CRW/2,cy+84);
    ctx.shadowBlur=0;

    // Título do personagem
    ctx.font='10px "Cinzel",serif';
    ctx.fillStyle=hov?P.wa4:P.wa2;
    ctx.fillText(ch.title,cx+CRW/2,cy+104);

    // Separador
    ctx.fillStyle=hov?ch.col:P.wa1;
    ctx.fillRect(cx+20,cy+122,CRW-40,1);

    // Stats
    const sx=cx+16,bw=CRW-32;
    // Fé
    ctx.font='bold 9px monospace';ctx.textAlign='left';ctx.fillStyle=P.feW;
    ctx.fillText('FÉ',sx,cy+130);
    ctx.fillStyle='#1a1828';ctx.fillRect(sx+28,cy+130,bw-30,10);
    ctx.fillStyle='#5070d0';ctx.fillRect(sx+28,cy+130,Math.floor((bw-30)*(ch.fe/10)),10);
    ctx.fillStyle=P.corW;
    ctx.fillText('COR',sx,cy+146);
    ctx.fillStyle='#180810';ctx.fillRect(sx+30,cy+146,bw-32,10);
    ctx.fillStyle='#801040';ctx.fillRect(sx+30,cy+146,Math.floor((bw-32)*(ch.cor/10)),10);
    ctx.fillStyle=P.wa5;
    ctx.fillText('CON',sx,cy+162);
    for(let d=0;d<5;d++){
      ctx.fillStyle=d<ch.con?P.wa4:'#1a0c04';
      ctx.fillRect(sx+30+d*18,cy+162,14,10);
      ctx.strokeStyle=d<ch.con?P.wa3:'#2a1408';
      ctx.lineWidth=1;ctx.strokeRect(sx+30.5+d*18,cy+162.5,14,10);
    }

    // Separador
    ctx.fillStyle=hov?ch.col:P.wa1;
    ctx.fillRect(cx+20,cy+180,CRW-40,1);

    // Descrição
    ctx.font='9px monospace';ctx.textAlign='left';ctx.fillStyle=hov?P.hTx:P.wa2;
    const dls=ch.desc.split('\n');
    dls.forEach((dl,di)=>ctx.fillText(dl,cx+12,cy+188+di*14));

    // Traço especial
    ctx.fillStyle=hov?ch.col:P.wa2;
    ctx.fillRect(cx+12,cy+235,CRW-24,1);
    ctx.font='italic 9px monospace';
    ctx.fillStyle=hov?P.wa5:P.wa2;
    const tls=ch.trait.split('—');
    ctx.font='bold 9px monospace';ctx.fillStyle=hov?ch.col:P.wa2;ctx.fillText(tls[0]+'—',cx+12,cy+242);
    ctx.font='italic 9px monospace';ctx.fillStyle=hov?P.wa4:P.wa2;
    if(tls[1])ctx.fillText(tls[1],cx+12,cy+255);

    // Botão selecionar
    if(hov){
      ctx.fillStyle=ch.col;ctx.fillRect(cx+20,cy+CRH-44,CRW-40,28);
      ctx.strokeStyle=P.wa5;ctx.lineWidth=1;ctx.strokeRect(cx+20.5,cy+CRH-43.5,CRW-41,27);
      ctx.font='bold 12px monospace';ctx.textAlign='center';
      ctx.fillStyle='#000';ctx.fillText('CONFIRMAR  [ENTER]',cx+CRW/2,cy+CRH-34);
    } else {
      ctx.strokeStyle=P.wa1;ctx.lineWidth=1;ctx.strokeRect(cx+20.5,cy+CRH-43.5,CRW-41,27);
      ctx.font='10px monospace';ctx.textAlign='center';
      ctx.fillStyle=P.wa2;ctx.fillText('← → para navegar',cx+CRW/2,cy+CRH-34);
    }
  });

  // Dica inferior
  ctx.textAlign='center';ctx.font='10px monospace';ctx.fillStyle='#3a2810';
  ctx.fillText('[←][→] navegar  ·  [ENTER] confirmar  ·  [ESC] voltar',CW/2,CH-14);
  ctx.textAlign='left';ctx.textBaseline='top';
}

function drawCharSheet(){
  ctx.fillStyle='rgba(0,0,0,.85)';ctx.fillRect(0,0,CW,CH);
  const ch=CHARS[G.selectedChar]||CHARS[0];
  const px=80,py=40,pw=CW-160,ph=CH-80;
  ctx.fillStyle='#0a0702';ctx.fillRect(px,py,pw,ph);
  ctx.strokeStyle=ch.col;ctx.lineWidth=2;ctx.strokeRect(px+1,py+1,pw-2,ph-2);
  ctx.strokeStyle=P.wa1;ctx.lineWidth=1;ctx.strokeRect(px+5,py+5,pw-10,ph-10);
  wkGrain(px,py,pw,ph,80,P.wa2,.07);

  const icons=['⚔','📜','☠'];
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.font='52px monospace';ctx.shadowColor=ch.col;ctx.shadowBlur=20;
  ctx.fillStyle=P.wa5;ctx.fillText(icons[G.selectedChar],CW/2,py+16);
  ctx.shadowBlur=0;

  ctx.font='bold 20px "Cinzel",serif';
  ctx.shadowColor=ch.col;ctx.shadowBlur=12;
  ctx.fillStyle=P.wa6;ctx.fillText(ch.name,CW/2,py+78);
  ctx.shadowBlur=0;
  ctx.font='12px "Cinzel",serif';
  ctx.fillStyle=ch.col;ctx.fillText(ch.title,CW/2,py+102);

  ctx.fillStyle=P.wa2;ctx.fillRect(px+30,py+122,pw-60,1);

  // Stats
  ctx.textAlign='left';ctx.font='bold 12px monospace';
  const sx=px+30,bw=pw-60,sy=py+132;
  [[G.fe,'FÉ','#5070d0',P.feW],[G.corrupcao,'CORRUPÇÃO','#801040',P.corW]].forEach(([v,n,bc,tc],i)=>{
    ctx.fillStyle=tc;ctx.fillText(n,sx,sy+i*28);
    ctx.fillStyle='#111';ctx.fillRect(sx+100,sy+i*28,bw-104,16);
    ctx.fillStyle=bc;ctx.fillRect(sx+100,sy+i*28,Math.floor((bw-104)*(v/10)),16);
    ctx.strokeStyle=bc;ctx.lineWidth=1;ctx.strokeRect(sx+100,sy+i*28,bw-104,16);
    ctx.shadowColor=bc;ctx.shadowBlur=8;ctx.fillStyle='#fff';ctx.font='bold 10px monospace';
    ctx.fillText(v+'/10',sx+bw-50,sy+i*28+3);ctx.shadowBlur=0;ctx.font='bold 12px monospace';
  });
  ctx.fillStyle=P.wa5;ctx.fillText('CONHECIMENTO',sx,sy+62);
  for(let d=0;d<5;d++){
    ctx.fillStyle=d<G.conhecimento?P.wa4:'#1a0c04';
    ctx.fillRect(sx+130+d*26,sy+62,20,16);
    ctx.strokeStyle=d<G.conhecimento?P.wa4:'#2a1408';
    ctx.lineWidth=1;ctx.strokeRect(sx+130.5+d*26,sy+62.5,20,16);
  }

  ctx.fillStyle=P.wa2;ctx.fillRect(px+30,py+208,pw-60,1);

  // Traço
  ctx.font='bold 11px monospace';ctx.fillStyle=ch.col;
  ctx.fillText('HABILIDADE ESPECIAL',sx,py+218);
  ctx.font='10px monospace';ctx.fillStyle=P.wa4;ctx.fillText(ch.trait,sx,py+236);

  ctx.fillStyle=P.wa2;ctx.fillRect(px+30,py+254,pw-60,1);

  // Relíquias
  ctx.font='bold 11px monospace';ctx.fillStyle=P.wa5;ctx.fillText('RELÍQUIAS ('+G.relics.length+')',sx,py+264);
  if(!G.relics.length){ctx.fillStyle='#3a2810';ctx.font='10px monospace';ctx.fillText('nenhuma',sx,py+282);}
  else G.relics.forEach((r,i)=>{
    ctx.fillStyle=P.wa4;ctx.font='10px monospace';ctx.fillText('✦ '+r,sx,py+282+i*16);
  });

  ctx.textAlign='center';ctx.font='10px monospace';ctx.fillStyle='#4a3818';
  ctx.fillText('[C]  ou  [ESC]  para fechar',CW/2,py+ph-16);
  ctx.textAlign='left';ctx.textBaseline='top';
}

  // Conhecimento
  ctx.fillStyle=P.wa5;ctx.font='bold 11px monospace';
  ctx.fillText('CONHECIMENTO: '+G.conhecimento+'/5',sx,sy+18);

      const col=i%cols, row=Math.floor(i/cols);
      const rx=px+20+col*(cardW+10);
      const ry=py+102+row*(cardH+8);
      // Card bg
      ctx.fillStyle='#130e06';ctx.fillRect(rx,ry,cardW,cardH);
      ctx.strokeStyle=P.wa2;ctx.lineWidth=1;ctx.strokeRect(rx+.5,ry+.5,cardW-1,cardH-1);
      ctx.strokeStyle=P.wa1;ctx.strokeRect(rx+3.5,ry+3.5,cardW-7,cardH-7);

      ctx.font='28px monospace';ctx.textAlign='center';
      ctx.shadowColor=P.wa4;ctx.shadowBlur=10;

      // Nome

      // Efeito
      if(info.stat){
        ctx.fillStyle=P.wa3;ctx.font='italic 9px monospace';
