function drawSplash(t){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,CW,CH);
  for(let y=0;y<CH;y+=2){ctx.fillStyle='rgba(0,0,0,.18)';ctx.fillRect(0,y,CW,1);}
  const pulse=0.65+0.35*Math.sin(t*2.2);
  ctx.globalAlpha=0.55+0.45*pulse;
  ctx.fillStyle='#50c050'; ctx.font='bold 13px monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='#30c040'; ctx.shadowBlur=12*pulse;
  ctx.fillText('[ CLIQUE OU PRESSIONE ENTER ]',CW/2,CH/2);
  ctx.shadowBlur=0; ctx.globalAlpha=1;
  ctx.textAlign='left'; ctx.textBaseline='top';
}
function drawTitle(t){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,CW,CH);

  if(coverImg.complete && coverImg.naturalWidth>0){
    // Modo cover: preenche o canvas sem distorção, corta se necessário
    const iw=coverImg.naturalWidth, ih=coverImg.naturalHeight;
    const scale=Math.max(CW/iw, CH/ih);
    const dw=iw*scale, dh=ih*scale;
    ctx.drawImage(coverImg,(CW-dw)/2,(CH-dh)/2,dw,dh);
  } else {
    // Fallback enquanto carrega
    ctx.fillStyle=P.paper; ctx.fillRect(0,0,CW,CH);
    wkH(0,0,CW,CH,3,P.hatch,.65);
    wkGrain(0,0,CW,CH,160,P.wa3,.14);
    glow('A LENDA DE SOMA',CW/2,CH/2-20,P.wa4,P.wa2,18);
  }

  // Vinheta sutil sobre a imagem
  const vg=ctx.createRadialGradient(CW/2,CH*.5,80,CW/2,CH*.5,CW*.65);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(.65,'rgba(0,0,0,.15)');
  vg.addColorStop(1,'rgba(0,0,0,.72)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,CW,CH);

  // ── TÍTULO ──────────────────────────────────────────────────
  ctx.textAlign='center'; ctx.textBaseline='top';

  // "A Lenda de" — Cinzel, pequeno, âmbar claro
  ctx.font='700 26px "Cinzel", serif';
  ctx.shadowColor='rgba(0,0,0,1)'; ctx.shadowBlur=18;
  ctx.fillStyle=P.wa4;
  ctx.fillText('A  Lenda  de', CW/2, 80);

  // "SOMA" — Pirata One, grande
  ctx.font='130px "Pirata One", serif';
  ctx.shadowColor='rgba(0,0,0,1)'; ctx.shadowBlur=32;
  ctx.fillStyle=P.wa6;
  ctx.fillText('SOMA', CW/2, 106);
  // Segundo passe: brilho âmbar pulsante
  ctx.font='130px "Pirata One", serif';
  ctx.shadowColor=P.wa3; ctx.shadowBlur=24;
  ctx.fillStyle=P.waW;
  ctx.globalAlpha=0.14+0.10*Math.sin(t*1.4);
  ctx.fillText('SOMA', CW/2, 106);
  ctx.globalAlpha=1; ctx.shadowBlur=0;


  // Prompt piscando
  if(Math.floor(t*1.8)%2===0){
    ctx.font='bold 11px monospace';
    ctx.textBaseline='bottom';
    ctx.shadowColor='rgba(200,140,30,.9)'; ctx.shadowBlur=10;
    ctx.fillStyle=P.wa5;
    ctx.fillText('[ PRESSIONE  ENTER  PARA  COMEÇAR ]', CW/2, CH-14);
    ctx.shadowBlur=0;
  }
  ctx.textAlign='left'; ctx.textBaseline='top';
}

// ── TRANSITION ────────────────────────────────────────────────
const TENSION={
  abyss:1.4, vorthax_shadow:1.6, vorthax_final:1.8,
  sacerdote:1.3, sacerdote_join:1.5,
  zareth_tomb:1.2, descent_gate:1.2,
  end_sombrio:1.7, morte:1.8,
  end_luz:0.6, end_equilíbrio:0.7,
};
function goTo(id,ef){
  applyEf(ef);
  Aud.whoosh();
  G.fade=1;G.fadeIn=false;G.nextScene=id;
}
function loadScene(id){
  G.scene=id;G.hover=-1;PT=[];
  const s=SC2[id];if(s)startType(s.text);
  const tn=TENSION[id]||1;Aud.setTension(tn);
}

// ── LOOP ──────────────────────────────────────────────────────
function render(ts){
  requestAnimationFrame(render);
  const t=ts*.001;
  if(G.scene==='splash'){drawSplash(t);return;}
  if(G.scene==='boot'){drawBoot(t);return;}
  if(G.scene==='title'){drawTitle(t);return;}
  if(G.scene==='char_select'){drawCharSelect(t);return;}
  tickPT();tickType();
  if(G.charView){drawArt(SC2[G.scene]?.art||'abyss',t);drawHUD();drawCharSheet();return;}
  if(G.inv){drawArt(SC2[G.scene]?.art||'abyss',t);drawHUD();drawInventory();return;}
  // Fade
  if(!G.fadeIn&&G.fade>0){G.fade-=.055;if(G.fade<=0){G.fadeIn=true;loadScene(G.nextScene);}}
  else if(G.fadeIn&&G.fade<1)G.fade=Math.min(1,G.fade+.055);
  const scene=SC2[G.scene];if(!scene)return;
  // Shake offset
  let sx2=0,sy2=0;
  if(shakeFrames>0){sx2=(Math.random()-.5)*shakeMag*2;sy2=(Math.random()-.5)*shakeMag*2;shakeFrames--;}
  ctx.save();ctx.translate(sx2,sy2);
  drawArt(scene.art,t);
  drawPT();
  drawText(scene);
  drawHUD();
  // Divider art|text
  ctx.fillStyle=P.gold; ctx.fillRect(AW,0,2,AH);
  ctx.fillStyle=P.stone; ctx.fillRect(AW+2,0,1,AH);
  ctx.restore();
  // Fade overlay
  if(G.fade<1){ctx.fillStyle=`rgba(0,0,0,${1-G.fade})`;ctx.fillRect(0,0,CW,CH);}
}

// ── INPUT ─────────────────────────────────────────────────────
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(CW/rect.width),my=(e.clientY-rect.top)*(CH/rect.height);
  if(G.scene==='char_select'){
    const CRW=240,CRH=380,gap=20;
    const startX=(CW-(CHARS.length*CRW+(CHARS.length-1)*gap))/2;
    CHARS.forEach((_,i)=>{
      const cx=startX+i*(CRW+gap);
      if(mx>=cx&&mx<cx+CRW&&my>=46&&my<46+CRH&&G.charHov!==i){G.charHov=i;Aud.hover();}
    });
    return;
  }
  if(G.scene==='title'||!G.typeDone)return;
  const scene=SC2[G.scene];if(!scene)return;
  const choices=typeof scene.ch==='function'?scene.ch():scene.ch;if(!choices)return;
  if(mx<TX){G.hover=-1;return;}
  const textH=tLines.length*LH+40;
  const chStart=Math.min(AH-choices.length*CHR-22,textH+20);
  let found=-1;
  choices.forEach((c,i)=>{const cy=chStart+i*CHR;if(my>=cy&&my<cy+CHR-5)found=i;});
  if(found!==G.hover){
    G.hover=found;
    if(found>=0)Aud.hover();
  }
});
canvas.addEventListener('click',e=>{
  Aud.init();
  if(G.scene==='splash'){G.scene='boot';document.getElementById('bootAudio').play().catch(()=>{});return;}
  if(G.scene==='boot'){bootT0=null;G.scene='title';Aud.playTitle();return;}
  if(G.scene==='title'){startGame();return;}
  if(G.scene==='char_select'){
    const rect=canvas.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*(CW/rect.width),my=(e.clientY-rect.top)*(CH/rect.height);
    const CRW=240,CRH=380,gap=20;
    const startX=(CW-(CHARS.length*CRW+(CHARS.length-1)*gap))/2;
    CHARS.forEach((_,i)=>{
      const cx=startX+i*(CRW+gap),cy=46;
      if(mx>=cx&&mx<cx+CRW&&my>=cy&&my<cy+CRH){
        if(G.charHov===i&&my>=cy+CRH-44&&my<cy+CRH-16){confirmChar();}
        else{G.charHov=i;}
      }
    });
    return;
  }
  if(!G.typeDone){skipType();return;}
  if(G.hover>=0)pick(G.hover);
});
document.addEventListener('keydown',e=>{
  Aud.init();
  if(e.key==='m'||e.key==='M'){Aud.toggle();return;}
  // R: resetar para título
  if(e.key==='r'||e.key==='R'){goHome();return;}
  // Inventário: E abre/fecha
  if(e.key==='e'||e.key==='E'){
    if(G.scene!=='title'&&G.scene!=='char_select'){G.inv=!G.inv;G.charView=false;Aud.select();}
    return;
  }
  // C: ficha do personagem
  if(e.key==='c'||e.key==='C'){
    if(G.scene!=='title'&&G.scene!=='char_select'){G.charView=!G.charView;G.inv=false;}
    return;
  }
  // ESC: fecha overlays ou volta ao título na seleção
  if(e.key==='Escape'){
    if(G.scene==='char_select'){G.scene='title';return;}
    G.inv=false;G.charView=false;return;
  }
  if(G.inv||G.charView)return; // bloqueia input de jogo com overlay aberto
  if(G.scene==='splash'){G.scene='boot';document.getElementById('bootAudio').play().catch(()=>{});return;}
  if(G.scene==='boot'){if(e.key==='Enter'||e.key===' '){bootT0=null;G.scene='title';Aud.playTitle();}return;}
  if(G.scene==='title'){if(e.key==='Enter')startGame();return;}
  // Navegação na seleção de personagem
  if(G.scene==='char_select'){
    if(e.key==='ArrowLeft'){G.charHov=Math.max(0,G.charHov-1);Aud.hover();}
    if(e.key==='ArrowRight'){G.charHov=Math.min(CHARS.length-1,G.charHov+1);Aud.hover();}
    if(e.key==='Enter')confirmChar();
    return;
  }
  if(e.key===' '){e.preventDefault();if(!G.typeDone)skipType();return;}
  const scene=SC2[G.scene];if(!scene)return;
  const choices=typeof scene.ch==='function'?scene.ch():scene.ch;
  if(!choices||!G.typeDone)return;
  const n=parseInt(e.key);
  if(n>=1&&n<=choices.length)pick(n-1);
});
function pick(i){
  const scene=SC2[G.scene];
  const choices=typeof scene.ch==='function'?scene.ch():scene.ch;
  if(!choices||i>=choices.length)return;
  Aud.select();
  const c=choices[i];
  if(c.restart)resetStats();
  goTo(c.n,c.ef);
}
function startGame(){
  Aud.init();
  G.scene='char_select';G.charHov=0;G.inv=false;G.charView=false;
}
function confirmChar(){
  G.selectedChar=G.charHov;
  resetStats();G.deaths=0;G.fade=0;G.fadeIn=true;
  Aud.startGameMusic();
  G.scene='_';loadScene('intro');setTimeout(()=>{G.fade=1;},80);
}
function goHome(){
  Aud.init();Aud.whoosh();Aud.pauseGameMusic();
  G.fade=0;G.fadeIn=false;G.nextScene='title';
  G.scene='_';
  setTimeout(()=>{G.scene='title';G.fade=1;Aud.playTitle();},300);
}

// ── POWER (toggles screen visuals only, game keeps running) ───
let __power=true, __powerBusy=false;

// ── DISPLAY ADJUST (brightness + contrast) ────────────────────
let __br=3, __co=3;
function applyDisplay(){
  const brV=(0.55+__br*0.18).toFixed(2);  // 0.73 .. 1.45
  const coV=(0.7+__co*0.13).toFixed(2);   // 0.83 .. 1.35
  document.getElementById('c').style.filter=
    `brightness(${brV}) contrast(${coV}) saturate(1.05)`;
  const m=document.getElementById('cpMeter');
  if(m){
    const bar=(n)=>'█'.repeat(n)+'·'.repeat(5-n);
    m.textContent=`BR:${bar(__br)}  CO:${bar(__co)}`;
  }
}
function adjustDisplay(kind,dir){
  if(kind==='br') __br=Math.max(1,Math.min(5,__br+dir));
  if(kind==='co') __co=Math.max(1,Math.min(5,__co+dir));
  applyDisplay();
  // click sound
  Aud.init();
  if(Aud.ctx){
    const A=Aud.ctx;
    const o=A.createOscillator(); const g=A.createGain();
    o.type='square'; o.frequency.value=dir>0?720:560;
    g.gain.setValueAtTime(.07,A.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,A.currentTime+.04);
    o.connect(g); g.connect(Aud.master||A.destination);
    o.start(); o.stop(A.currentTime+.05);
  }
}
applyDisplay();

function togglePower(){
  if(__powerBusy)return; __powerBusy=true;
  const crt=document.getElementById('crt');
  const led=document.getElementById('pwrLed');
  // power-off click sound
  Aud.init();
  if(Aud.ctx){
    const A=Aud.ctx;
    const o=A.createOscillator(); const g=A.createGain();
    o.type='square'; o.frequency.value=__power?180:60;
    g.gain.setValueAtTime(.18,A.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,A.currentTime+.06);
    o.connect(g); g.connect(A.destination); // bypass master — power click sempre audível
    o.start(); o.stop(A.currentTime+.07);
  }
  if(__power){
    // turning OFF
    crt.classList.add('off');
    led.classList.add('off');
    setTimeout(()=>{ crt.classList.add('off-final'); __powerBusy=false; }, 200);
    __power=false;
  } else {
    // turning ON
    crt.classList.remove('off-final');
    led.classList.remove('off');
    // brief flash
    setTimeout(()=>{ crt.classList.remove('off'); __powerBusy=false; }, 60);
    __power=true;
  }
}

G.scene='splash';
requestAnimationFrame(render);
</script>
</body>
</html>
