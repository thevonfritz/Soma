function drawPrologue(t){
  // Fundo escuro com vinheta
  ctx.fillStyle='#06040a';ctx.fillRect(0,0,CW,CH);
  wkH(0,0,CW,CH,5,P.hatch,.35);
  wkGrain(0,0,CW,CH,100,P.wa2,.07);
  const vg=ctx.createRadialGradient(CW/2,CH/2,140,CW/2,CH/2,600);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.82)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,CW,CH);

  // Título: PRÓLOGO (mais compacto)
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.font='bold 9px "Cinzel",serif';
  ctx.fillStyle=P.wa2;ctx.fillText('CAPÍTULO ZERO',CW/2,10);
  ctx.font='bold 22px "Cinzel",serif';
  ctx.shadowColor=P.wa4;ctx.shadowBlur=18;
  ctx.fillStyle=P.wa6;ctx.fillText('PRÓLOGO',CW/2,22);
  ctx.shadowBlur=0;
  ctx.fillStyle=P.gold;ctx.fillRect(CW/2-70,52,140,1);
  ctx.fillStyle=P.goldL;ctx.fillRect(CW/2-70,53,140,1);

  // === TEXTO ===
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.font='13px monospace';
  const PAD_X = 80;
  const START_Y = 72;
  const LH2 = 18;
  const FOOTER_Y = CH - 26;
  const MAX_Y = FOOTER_Y - 12;

  // descobrir quantas linhas cabem; se o total exceder, fazer auto-scroll
  const visibleLines = Math.floor((MAX_Y - START_Y) / LH2);
  let scrollOffset = 0;
  // achar a linha atual onde o cursor está digitando
  let curLineIdx = 0, accChars = 0;
  for(let i=0;i<tLines.length;i++){
    if(accChars + tLines[i].length + 1 > tChars){
      curLineIdx = i; break;
    }
    accChars += tLines[i].length + 1;
    curLineIdx = i;
  }
  // só rola se ultrapassou as linhas visíveis
  if(curLineIdx >= visibleLines - 4){
    scrollOffset = curLineIdx - (visibleLines - 4);
    if(G.typeDone){
      // quando terminar, mostra as Últimas linhas inteiras
      scrollOffset = Math.max(0, tLines.length - visibleLines);
    }
  }

  let drawn = 0;
  for(let i=0;i<tLines.length;i++){
    const line = tLines[i];
    const rem = Math.max(0, Math.min(line.length, tChars - drawn));
    const y = START_Y + (i - scrollOffset) * LH2;
    if(y >= START_Y && y < MAX_Y && rem > 0){
      const vis = line.substring(0, Math.floor(rem));
      // sombra suave
      ctx.shadowColor='rgba(200,140,40,.4)';ctx.shadowBlur=4;
      ctx.fillStyle = P.hTx;
      ctx.fillText(vis, PAD_X, y);
      ctx.shadowBlur = 0;
    }
    drawn += line.length + 1;
    if(drawn > tChars) break;
  }

  // cursor piscando na linha que está sendo digitada
  if(!G.typeDone && Math.floor(Date.now()/350)%2===0){
    let drawnSoFar = 0, lineIdx = 0, charsInLine = 0;
    for(let i=0;i<tLines.length;i++){
      if(drawnSoFar + tLines[i].length + 1 > tChars){
        lineIdx = i;
        charsInLine = tChars - drawnSoFar;
        break;
      }
      drawnSoFar += tLines[i].length + 1;
    }
    const ly = START_Y + (lineIdx - scrollOffset) * LH2;
    if(ly >= START_Y && ly < MAX_Y){
      ctx.font='13px monospace';
      const cw = ctx.measureText(tLines[lineIdx].substring(0, charsInLine)).width;
      ctx.fillStyle = P.wa5;
      ctx.fillRect(PAD_X + cw + 1, ly + 2, 7, 13);
    }
  }

  // Rodapé: hint
  if(!G.typeDone){
    const pulse = 0.55 + 0.45 * Math.sin(t * 4.5);
    ctx.globalAlpha = pulse;
    ctx.shadowColor = '#80d040'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#a8ff60'; ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('▶  CLIQUE  ou  [ESPAÇO / ENTER]  para acelerar', CW/2, FOOTER_Y);
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  } else {
    const pulse = 0.6 + 0.4 * Math.sin(t * 3);
    ctx.globalAlpha = pulse;
    ctx.shadowColor = '#e8b850'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#f5cc70'; ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('▼  CLIQUE  ou  [ENTER]  para continuar', CW/2, FOOTER_Y);
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  }
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
}

function drawNameInput(t){
  // Fundo escuro com vinheta
  ctx.fillStyle='#08050a';ctx.fillRect(0,0,CW,CH);
  wkH(0,0,CW,CH,5,P.hatch,.4);
  wkGrain(0,0,CW,CH,120,P.wa2,.09);

  ctx.fillStyle=vg;ctx.fillRect(0,0,CW,CH);

let tLines=[], tChars=0, tT0=0, tTotal=0, tDoneAt=0, tChoiceFade=0;
const CPS_BASE = 40;      // caracteres por segundo (bem lento, leitura confortável)
const CPS_ACCEL = 1.0;    // sem aceleração — ritmo constante
const MAX_TYPE_TIME = 30000; // teto máximo (6.5s)
function startType(text, customWidth){
  // Substitui placeholders {NOME} -> nome do jogador
  const resolved = (text||'').replace(/\{NOME\}/g, G.playerName || 'Soma');
  tLines = wrapText(resolved, customWidth || (TW-32));
  tTotal = tLines.reduce((s,l)=>s+l.length+1,0);
  tChars = 0;
  tT0 = performance.now();
  tDoneAt = 0;
  tChoiceFade = 0;
  G.typeDone = (tTotal===0);
  if(G.typeDone){ tDoneAt = performance.now(); tChoiceFade = 1; }
}
function tickType(){
  if(G.typeDone){
    if(tChoiceFade < 1){
      tChoiceFade = Math.min(1, (performance.now()-tDoneAt)/280);
    }
    return;
  }
  const elapsed = performance.now() - tT0;
  // === prólogo: velocidade lenta, sem cap ===
  if(G.scene==='prologue'){
    const cps = 55; // lento, atmosférico
    tChars = Math.min(tTotal, Math.floor(elapsed * cps / 1000));
    if(tChars >= tTotal){ G.typeDone = true; tDoneAt = performance.now(); }
    return;
  }
  // === cenas normais ===
  if(elapsed >= MAX_TYPE_TIME){
    tChars = tTotal; G.typeDone = true;
    tDoneAt = performance.now();
    return;
  }
  const progress = tChars / Math.max(1, tTotal);
  const cps = CPS_BASE * (1 + (CPS_ACCEL - 1) * progress);
  tChars = Math.min(tTotal, Math.floor(elapsed * cps / 1000));
  if(tChars >= tTotal){ G.typeDone = true; tDoneAt = performance.now(); }
}
function skipType(){
  tChars = tTotal; G.typeDone = true;
  tDoneAt = performance.now(); tChoiceFade = 1;
}

function render(ts){
  requestAnimationFrame(render);
  const t=ts*.001;
  if(G.scene==='splash'){drawSplash(t);return;}
  if(G.scene==='boot'){drawBoot(t);return;}
  if(G.scene==='title'){drawTitle(t);return;}
  if(G.scene==='flesh_choice'){drawFleshChoice(t);return;}
  if(G.scene==='char_select'){drawCharSelect(t);return;}
  if(G.scene==='prologue'){tickType();drawPrologue(t);return;}
  if(G.scene==='name_input'){drawNameInput(t);return;}
  tickType();
  if(G.charView){drawArt((SC2[G.scene] && SC2[G.scene].art) || 'ruins',t);drawHUD();drawCharSheet();return;}
  if(G.inv){drawArt((SC2[G.scene] && SC2[G.scene].art) || 'ruins',t);drawHUD();drawInventory();return;}
  // Fade
  if(!G.fadeIn&&G.fade>0){G.fade-=.055;if(G.fade<=0){G.fadeIn=true;loadScene(G.nextScene);}}
  else if(G.fadeIn&&G.fade<1)G.fade=Math.min(1,G.fade+.055);
  const scene=SC2[G.scene];if(!scene)return;
  // Shake offset
  let sx2=0,sy2=0;
  if(shakeFrames>0){sx2=(Math.random()-.5)*shakeMag*2;sy2=(Math.random()-.5)*shakeMag*2;shakeFrames--;}
  ctx.save();ctx.translate(sx2,sy2);
  drawArt(scene.art,t);
    drawText(scene);
  drawHUD();
  // Divider art|text
  ctx.fillStyle=P.gold; ctx.fillRect(AW,0,2,AH);
  ctx.fillStyle=P.stone; ctx.fillRect(AW+2,0,1,AH);
  ctx.restore();
  // Fade overlay
  if(G.fade<1){ctx.fillStyle=`rgba(0,0,0,${1-G.fade})`;ctx.fillRect(0,0,CW,CH);}
}

// Wheel: scroll do texto narrativo
canvas.addEventListener('wheel', e => {
  // Aplicar apenas em cenas de narrativa
  const inGame = !['splash','boot','title','flesh_choice','char_select','prologue','name_input'].includes(G.scene);
  if(!inGame || G.inv || G.charView) return;
  if(!tLines || tLines.length === 0) return;
  e.preventDefault();
  const step = e.deltaY > 0 ? 2 : -2;
  // Inicializa scroll com valor atual de auto se ainda em -1
  if(G.textScroll < 0){
    // calcula posição auto atual
    let cur = 0, acc = 0;
    for(let i=0;i<tLines.length;i++){
      if(acc + tLines[i].length + 1 > tChars){ cur = i; break; }
      acc += tLines[i].length + 1;
      cur = i;
    }
    const _choices = SC2[G.scene] && (typeof SC2[G.scene].ch==='function' ? SC2[G.scene].ch() : SC2[G.scene].ch);
    const choicesH = (_choices ? _choices.length*CHR + 32 : 30);
    const visLines = Math.floor((AH - 46 - choicesH) / LH);
    const maxScr = Math.max(0, tLines.length - visLines);
    let autoScr = 0;
    if(cur >= visLines - 3) autoScr = cur - (visLines - 3);
    if(G.typeDone) autoScr = maxScr;
    G.textScroll = autoScr;
  }
  G.textScroll += step;
  if(G.textScroll < 0) G.textScroll = 0;
  // Se rolou até o fim, volta ao auto-follow
}, {passive: false});

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(CW/rect.width),my=(e.clientY-rect.top)*(CH/rect.height);
  if(G.scene==='flesh_choice'){
    const CRW=390,CRH=440,gap=24;
    const startX=(CW-(2*CRW+gap))/2;
    FLESH_OPTIONS.forEach((_,i)=>{
      const cx=startX+i*(CRW+gap);
      if(mx>=cx&&mx<cx+CRW&&my>=74&&my<74+CRH&&G.fleshHov!==i){G.fleshHov=i;Aud.hover();}
    });
    return;
  }
  if(G.scene==='char_select'){
    const CRW=240,CRH=380,gap=20;
    const startX=(CW-(CHARS.length*CRW+(CHARS.length-1)*gap))/2;
    CHARS.forEach((_,i)=>{
      const cx=startX+i*(CRW+gap);
      if(mx>=cx&&mx<cx+CRW&&my>=46&&my<46+CRH&&G.charHov!==i){G.charHov=i;Aud.hover();}
    });
    return;
  }
  if(G.scene==='title'||!G.typeDone)return;
  const scene=SC2[G.scene];if(!scene)return;
  const choices=typeof scene.ch==='function'?scene.ch():scene.ch;if(!choices)return;
  if(mx<TX){G.hover=-1;return;}
  const textH=tLines.length*LH+40;
  const chStart=Math.min(AH-choices.length*CHR-22,textH+20);
  let found=-1;
  choices.forEach((c,i)=>{const cy=chStart+i*CHR;if(my>=cy&&my<cy+CHR-5)found=i;});
  if(found!==G.hover){
    G.hover=found;
    if(found>=0)Aud.hover();
  }
});
canvas.addEventListener('click',e=>{

document.addEventListener('keydown',e=>{
  Aud.init();
  if(e.key==='m'||e.key==='M'){Aud.toggle();return;}
  // Setas / Wheel: scroll do texto narrativo
  const _inGame = !['splash','boot','title','flesh_choice','char_select','prologue','name_input'].includes(G.scene);
  if(_inGame && (e.key==='ArrowUp' || e.key==='ArrowDown' || e.key==='PageUp' || e.key==='PageDown')){
    if(tLines && tLines.length > 0){
      e.preventDefault();
      // calcula scroll atual se ainda em modo auto (-1)
      if(G.textScroll < 0){
        const _sc = SC2[G.scene];
        const _ch = _sc && (typeof _sc.ch==='function' ? _sc.ch() : _sc.ch);
        const _chH = (_ch ? _ch.length*CHR + 32 : 30);
        const _vis = Math.floor((AH - 46 - _chH) / LH);
        const _max = Math.max(0, tLines.length - _vis);
        let _auto = 0, _cur = 0, _acc = 0;
        for(let i=0;i<tLines.length;i++){
          if(_acc + tLines[i].length + 1 > tChars){ _cur = i; break; }
          _acc += tLines[i].length + 1;
          _cur = i;
        }
        if(_cur >= _vis - 3) _auto = _cur - (_vis - 3);
        if(G.typeDone) _auto = _max;
        G.textScroll = _auto;
      }
      const _delta = (e.key==='ArrowUp') ? -1 : (e.key==='ArrowDown') ? 1 : (e.key==='PageUp') ? -8 : 8;
      G.textScroll = Math.max(0, G.textScroll + _delta);
      return;
    }
  }
  // R: resetar para título
  if(e.key==='r'||e.key==='R'){goHome();return;}
  // Inventário: E abre/fecha
  if(e.key==='e'||e.key==='E'){
    const blocked=['title','flesh_choice','char_select'];
    if(!blocked.includes(G.scene)){G.inv=!G.inv;G.charView=false;Aud.select();}
    return;
  }
  // C: ficha do personagem
  if(e.key==='c'||e.key==='C'){
    const blocked=['title','flesh_choice','char_select'];
    if(!blocked.includes(G.scene)){G.charView=!G.charView;G.inv=false;}
    return;
  }
  // ESC: fecha overlays ou volta ao título / passo anterior
  if(e.key==='Escape'){
    if(G.scene==='char_select'){G.scene='flesh_choice';G.fleshHov=G.fleshChoice;return;}
    if(G.scene==='flesh_choice'){G.scene='title';return;}
    G.inv=false;G.charView=false;return;
  }
  if(G.inv||G.charView)return; // bloqueia input de jogo com overlay aberto
  if(G.scene==='splash'){G.scene='boot';document.getElementById('bootAudio').play().catch(()=>{});return;}
  if(G.scene==='boot'){if(e.key==='Enter'||e.key===' '){bootT0=null;G.scene='title';Aud.playTitle();}return;}
  if(G.scene==='title'){if(e.key==='Enter')startGame();return;}
  // Navegação na escolha da carne
  if(G.scene==='flesh_choice'){
    if(e.key==='ArrowLeft'){G.fleshHov=Math.max(0,G.fleshHov-1);Aud.hover();}
    if(e.key==='ArrowRight'){G.fleshHov=Math.min(FLESH_OPTIONS.length-1,G.fleshHov+1);Aud.hover();}
    if(e.key==='Enter')confirmFlesh();
    return;
  }
  // Navegação na seleção de personagem
  if(G.scene==='char_select'){
    if(e.key==='ArrowLeft'){G.charHov=Math.max(0,G.charHov-1);Aud.hover();}
    if(e.key==='ArrowRight'){G.charHov=Math.min(CHARS.length-1,G.charHov+1);Aud.hover();}
    if(e.key==='Enter')confirmChar();
    return;
  }
  if(G.scene==='prologue'){
    if(e.key==='Enter' || e.key===' '){
      if(!G.typeDone){ e.preventDefault(); skipType(); return; }
      e.preventDefault(); enterNameInput(); return;
    }
    return;
  }
  if(G.scene==='name_input'){
    // O input HTML lida com Enter; ESC -> usar default
    if(e.key==='Escape'){ confirmName(true); return; }
    return;
  }
  if(e.key===' '||e.key==='Enter'){
    if(!G.typeDone){e.preventDefault();skipType();return;}
    // se acabou de digitar, ENTER seleciona a opção em hover
    if(e.key==='Enter' && G.hover>=0){pick(G.hover);return;}
    if(e.key===' '){e.preventDefault();return;}
  }
  const scene=SC2[G.scene];if(!scene)return;
  const choices=typeof scene.ch==='function'?scene.ch():scene.ch;
  if(!choices||!G.typeDone)return;
  const n=parseInt(e.key);
  if(n>=1&&n<=choices.length)pick(n-1);
});
function pick(i){
  const scene=SC2[G.scene];
  const choices=typeof scene.ch==='function'?scene.ch():scene.ch;
  if(!choices||i>=choices.length)return;
  Aud.select();
  const c=choices[i];
  if(c.restart)resetStats();
  // Handle flag assignments (e.g. {councilAsked_padre:true} => G.councilAsked.padre=true)
  if(c.flag){
    for(const k of Object.keys(c.flag)){
      const m = k.match(/^councilAsked_(\w+)$/);
      if(m){
        G.councilAsked = G.councilAsked || {};
        G.councilAsked[m[1]] = c.flag[k];
      } else {
        G[k] = c.flag[k];
      }
    }
  }
  goTo(c.n,c.ef);
}
function startGame(){
  Aud.init();

}
function confirmFlesh(){
  G.fleshChoice=G.fleshHov;

  G.scene='char_select';G.charHov=0;
}
function confirmChar(){
  G.selectedChar=G.charHov;
  resetStats();G.fade=0;G.fadeIn=true;
  // Música do título continua tocando através do prólogo e nomeie sua carne
  // (startGameMusic só é chamado em confirmName, quando entra em ruins_wake)
  G.scene='prologue';
  startType(PROLOGUE_TEXT, CW-160);
  setTimeout(()=>{G.fade=1;},80);
}
function enterNameInput(){

    inp.style.display='block';
    inp.value = G.playerName || 'Soma';

function confirmName(useDefault){
  const inp=document.getElementById('nameInput');
  let name = inp ? inp.value.trim() : '';
  if(useDefault || !name) name = 'Soma';
  G.playerName = name.slice(0,20);
  if(inp) inp.style.display='none';
  Aud.select();
  // Só troca para a música de jogo agora — título tocou até aqui

function goHome(){

function applyDisplay(){

  const coV=(0.7+__co*0.13).toFixed(2);   // 0.83 .. 1.35
  document.getElementById('c').style.filter=
    `brightness(${brV}) contrast(${coV}) saturate(1.05)`;
  const m=document.getElementById('cpMeter');
  if(m){
    const bar=(n)=>'█'.repeat(n)+'·'.repeat(5-n);
    m.textContent=`BR:${bar(__br)}  CO:${bar(__co)}`;
  }
}
function adjustDisplay(kind,dir){
  if(kind==='br') __br=Math.max(1,Math.min(5,__br+dir));
  if(kind==='co') __co=Math.max(1,Math.min(5,__co+dir));
  applyDisplay();
  // click sound
  Aud.init();
  if(Aud.ctx){
    const A=Aud.ctx;
    const o=A.createOscillator(); const g=A.createGain();
    o.type='square'; o.frequency.value=dir>0?720:560;
    g.gain.setValueAtTime(.07,A.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,A.currentTime+.04);
    o.connect(g); g.connect(Aud.master||A.destination);
    o.start(); o.stop(A.currentTime+.05);
  }
}
applyDisplay();

function togglePower(){
  if(__powerBusy)return; __powerBusy=true;
  const crt=document.getElementById('crt');
  const led=document.getElementById('pwrLed');
  // power-off click sound
  Aud.init();
  if(Aud.ctx){
    const A=Aud.ctx;
    const o=A.createOscillator(); const g=A.createGain();
    o.type='square'; o.frequency.value=__power?180:60;
    g.gain.setValueAtTime(.18,A.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,A.currentTime+.06);
    o.connect(g); g.connect(A.destination); // bypass master — power click sempre audível
    o.start(); o.stop(A.currentTime+.07);
  }
  if(__power){
    // turning OFF
    crt.classList.add('off');
    led.classList.add('off');
    setTimeout(()=>{ crt.classList.add('off-final'); __powerBusy=false; }, 200);
    __power=false;
  } else {
    // turning ON
    crt.classList.remove('off-final');
    led.classList.remove('off');
    // brief flash
    setTimeout(()=>{ crt.classList.remove('off'); __powerBusy=false; }, 60);
    __power=true;
  }
}

// Bind input Enter -> confirmName
const _nameInp = document.getElementById('nameInput');
if(_nameInp){
  _nameInp.addEventListener('keydown', (e)=>{
    e.stopPropagation();
    if(e.key==='Enter'){ e.preventDefault(); confirmName(false); }
    if(e.key==='Escape'){ e.preventDefault(); confirmName(true); }
  });
}
G.scene='splash';
requestAnimationFrame(render);
</script>
