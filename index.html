<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A Lenda de Soma</title>
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  background:
    radial-gradient(ellipse at 50% 50%, #1a1612 0%, #0a0806 45%, #000 100%);
  display:flex;align-items:center;justify-content:center;
  width:100vw;height:100vh;user-select:none;font-family:monospace;
}
/* === RIG (the whole monitor + stand, scaled to viewport) === */
#rig{
  position:relative;
  width:1080px;height:822px;
  transform-origin:center center;
  display:flex;flex-direction:column;align-items:center;
}
/* === BEIGE CRT MONITOR === */
.monitor{
  position:relative;
  width:1080px;height:760px;
  padding:54px 70px 0 70px;
  background:
    linear-gradient(180deg,
      #f0e5c4 0%, #e8dcb6 6%,
      #d8c9a0 22%, #cdbb92 55%,
      #b8a37a 92%, #9a8866 100%);
  border-radius:42px 42px 28px 28px;
  box-shadow:
    inset 0 4px 0 rgba(255,250,228,.85),
    inset 0 -6px 0 rgba(80,60,30,.30),
    inset 8px 0 0 rgba(255,250,228,.20),
    inset -8px 0 0 rgba(80,60,30,.18),
    0 24px 50px rgba(0,0,0,.55),
    0 60px 120px rgba(0,0,0,.4);
  border:2px solid #6a5a3a;
}
/* Plastic highlight band + aging */
.monitor::before{
  content:'';position:absolute;inset:0;border-radius:42px 42px 28px 28px;pointer-events:none;
  background:
    linear-gradient(180deg,rgba(255,250,228,.4) 0%,rgba(255,250,228,0) 18%,rgba(0,0,0,0) 70%,rgba(60,40,15,.20) 100%),
    radial-gradient(ellipse at 80% 75%, rgba(120,90,40,.10), transparent 40%),
    radial-gradient(ellipse at 25% 18%, rgba(255,250,228,.18), transparent 30%);
}
/* Subtle dust/age speckle */
.monitor::after{
  content:'';position:absolute;inset:0;border-radius:42px 42px 28px 28px;pointer-events:none;opacity:.18;
  background-image:
    radial-gradient(circle at 12% 32%, #8a6a3a 0.5px, transparent 1px),
    radial-gradient(circle at 78% 12%, #8a6a3a 0.5px, transparent 1px),
    radial-gradient(circle at 45% 86%, #8a6a3a 0.5px, transparent 1px),
    radial-gradient(circle at 92% 64%, #8a6a3a 0.5px, transparent 1px);
  background-size:120px 120px,170px 170px,200px 200px,140px 140px;
}

/* === SCREEN BEZEL (square-corner CRT) === */
#crt{
  position:relative;
  width:940px;height:580px;
  background:#000;
  border-radius:4px;
  overflow:hidden;
  /* Deep recessed bezel rim */
  box-shadow:
    inset 0 0 0 6px #1a1612,
    inset 0 0 0 9px #6a5a3a,
    inset 0 0 0 13px #9a8866,
    inset 0 0 0 16px #2a221a,
    inset 0 0 28px rgba(0,0,0,.95),
    inset 0 0 80px rgba(0,0,0,.65),
    0 0 0 3px #4a3a22,
    0 6px 16px rgba(0,0,0,.6);
  margin-top:4px;
}
/* Screen content wrapper — what gets toggled on/off */
.screen-content{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  transition:transform .22s cubic-bezier(.65,0,.35,1), opacity .22s;
  transform-origin:center center;
}
#crt.off .screen-content{
  transform:scaleY(.004) scaleX(.6);
  opacity:.85;
}
#crt.off-final .screen-content{
  transform:scaleY(.004) scaleX(.001);
  opacity:0;
}
/* canvas display size */
#c{display:block;width:940px;height:580px;
  image-rendering:pixelated;image-rendering:crisp-edges;
  filter:brightness(1.06) contrast(1.14) saturate(1.05);
  touch-action:none;}
/* Glass reflection highlight (top-left curve) */
.screen-glare{position:absolute;left:30px;top:14px;width:50%;height:36%;
  border-radius:60% 80% 80% 60% / 80% 60% 60% 80%;
  background:linear-gradient(135deg,rgba(255,255,255,.08) 0%,rgba(255,255,255,.03) 40%,transparent 70%);
  pointer-events:none;z-index:14;mix-blend-mode:screen;}

/* === CONTROL PANEL (front bottom strip) === */
.control-panel{
  position:absolute;left:60px;right:60px;bottom:32px;height:72px;
  background:linear-gradient(180deg,#d4c498 0%,#c4b388 50%,#a89570 100%);
  border:2px solid #6a5a3a;border-radius:6px;
  box-shadow:
    inset 0 1px 0 rgba(255,250,228,.6),
    inset 0 -2px 0 rgba(80,60,30,.4),
    inset 0 0 14px rgba(80,60,30,.18);
  display:flex;align-items:center;padding:0 22px;gap:14px;
}
.cp-brand{font:bold 10px monospace;letter-spacing:4px;color:#4a3820;
  text-shadow:0 1px 0 rgba(255,250,228,.6),0 -1px 0 rgba(0,0,0,.15);
  padding-right:10px;border-right:1.5px solid #8a7848;height:44px;display:flex;flex-direction:column;justify-content:center;}
.cp-brand small{display:block;font-size:7px;letter-spacing:2px;color:#6a5a3a;margin-top:2px;}
.cp-ctrls{display:flex;gap:14px;flex:1;align-items:center;}

/* Mechanical switch group */
.sw-group{display:flex;flex-direction:column;align-items:center;gap:4px;}
.sw-label{font:bold 7px monospace;letter-spacing:2px;color:#3a2810;
  text-shadow:0 1px 0 rgba(255,250,228,.5);}
.sw-keys{display:flex;gap:5px;}

/* Mechanical key — monitor-plastic color, blue-switch feel */
.mkey{
  width:30px;height:26px;
  position:relative;cursor:pointer;user-select:none;
  /* keycap: mesma família de bege do corpo do monitor */
  background:linear-gradient(160deg,#e8ddb4 0%,#d0c090 50%,#b8a870 100%);
  border-radius:3px 3px 2px 2px;
  border-top:1.5px solid #f0e8c4;
  border-left:1.5px solid #ddd0a0;
  border-right:1.5px solid #8a7840;
  /* housing / travel abaixo do keycap */
  border-bottom:4px solid #5a4820;
  box-shadow:
    0 3px 5px rgba(0,0,0,.35),
    inset 0 1px 0 rgba(255,250,220,.6),
    inset 1px 0 0 rgba(255,245,200,.2);
  display:flex;align-items:center;justify-content:center;
  font:bold 13px monospace;
  color:#3a2810;
  transition:transform .05s ease,border-bottom .05s ease,box-shadow .05s ease;
}
.mkey:active{
  border-bottom:1px solid #5a4820;
  transform:translateY(3px);
  box-shadow:
    0 1px 2px rgba(0,0,0,.25),
    inset 0 2px 4px rgba(60,40,10,.45);
}
/* Reset button overlay on the game screen */
#resetBtn{
  position:absolute;top:9px;right:11px;z-index:25;
  font:bold 8px monospace;letter-spacing:2px;
  color:#9a7030;background:rgba(6,2,0,.80);
  border:1px solid #4a3010;border-radius:2px;
  padding:4px 10px;cursor:pointer;
  text-shadow:0 0 5px rgba(150,100,20,.5);
  opacity:.5;transition:opacity .15s,color .15s;
  user-select:none;}
#resetBtn:hover{opacity:1;color:#e8a840;border-color:#9a6020;}

.cp-meter{font:8px monospace;letter-spacing:.5px;
  background:#1a1410;padding:4px 8px;border-radius:2px;
  border:1px solid #4a3820;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.7);
  color:#80c050;text-shadow:0 0 4px rgba(120,220,80,.6);white-space:pre;}
.cp-divider{width:1.5px;height:34px;background:#8a7848;margin:0 2px;
  box-shadow:1px 0 0 rgba(255,250,228,.5);}
.cp-power{display:flex;align-items:center;gap:10px;margin-left:auto;}
.cp-led{width:7px;height:7px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#ff8060 0%,#c01010 50%,#400404 100%);
  box-shadow:0 0 10px rgba(255,40,40,.7),inset 0 1px 1px rgba(255,200,200,.4);
  transition:all .25s;}
.cp-led.off{background:radial-gradient(circle at 30% 30%,#5a3030 0%,#2a0808 60%,#100202 100%);
  box-shadow:inset 0 1px 1px rgba(0,0,0,.6);}
.cp-led-label{font:7px monospace;letter-spacing:1.5px;color:#5a4820;margin-right:4px;
  text-shadow:0 1px 0 rgba(255,250,228,.5);}
.cp-pwr-btn{width:38px;height:38px;border-radius:50%;cursor:pointer;
  background:radial-gradient(circle at 35% 30%,#f0e5c4 0%,#c8b88c 45%,#8a7848 100%);
  border:2.5px solid #5a4828;
  box-shadow:inset 0 2px 2px rgba(255,250,228,.6),inset 0 -3px 4px rgba(60,40,15,.5),0 2px 4px rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;position:relative;}
.cp-pwr-btn:active{
  box-shadow:inset 0 3px 4px rgba(60,40,15,.6),inset 0 -1px 2px rgba(255,250,228,.4);
  transform:translateY(1px);}
.cp-pwr-btn::before{content:'';position:absolute;width:14px;height:14px;
  border:2px solid #4a3820;border-radius:50%;border-top-color:transparent;}
.cp-pwr-btn::after{content:'';position:absolute;width:2px;height:9px;
  background:#4a3820;top:8px;left:50%;transform:translateX(-50%);}

/* === STAND === */
.stand-neck{width:340px;height:38px;margin-top:-4px;
  background:linear-gradient(180deg,#d4c498 0%,#b8a37a 60%,#9a8866 100%);
  border-radius:0 0 18px 18px;border:2px solid #6a5a3a;border-top:none;
  box-shadow:inset 0 -3px 0 rgba(80,60,30,.4),inset 0 1px 0 rgba(255,250,228,.4);}
.stand-base{width:460px;height:24px;margin-top:-4px;
  background:linear-gradient(180deg,#e0d2a8 0%,#c4b388 40%,#9a8866 100%);
  border-radius:8px 8px 12px 12px;border:2px solid #6a5a3a;
  box-shadow:
    inset 0 1px 0 rgba(255,250,228,.6),
    inset 0 -3px 0 rgba(80,60,30,.4),
    0 14px 30px rgba(0,0,0,.65),
    0 40px 80px rgba(0,0,0,.45);}

/* === CRT SCREEN OVERLAYS === */
#sl{position:absolute;inset:0;
  background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,.18) 2px,rgba(0,0,0,.18) 4px);
  pointer-events:none;z-index:10;}
#vg{position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 48%,transparent 50%,rgba(0,0,0,.55) 88%,rgba(0,0,0,.94) 100%);
  pointer-events:none;z-index:11;}
#gl{position:absolute;left:0;right:0;height:4px;background:linear-gradient(180deg,transparent,rgba(180,255,140,.07),transparent);
  pointer-events:none;z-index:12;animation:scan 9s linear infinite;}
#rgb{position:absolute;inset:0;pointer-events:none;z-index:13;
  background:repeating-linear-gradient(90deg,rgba(255,80,80,.022) 0 1px,rgba(80,255,80,.022) 1px 2px,rgba(80,80,255,.022) 2px 3px);
  mix-blend-mode:screen;opacity:.55;}
#mute{display:none;}
#nameInput{
  position:absolute;
  /* Centrado em #crt (940×580 CSS). Centro Y do frame canvas está
     em (CH/2-20+23)*580/600 = 293 ≈ 50.5%. Usamos 50% por simplicidade. */
  left:50%; top:50%;
  transform:translate(-50%, -50%);
  /* Frame canvas é 360×46px @ 920×600 → escalado para 940×580 vira ~367.8×44.5 CSS */
  width:368px; height:44px;
  background:#0a0702; color:#f5cc70;
  border:2px solid #9a7030;
  font:bold 22px "Cinzel",serif;
  text-align:center;
  outline:none;
  letter-spacing:2px;
  caret-color:#e8b850;
  z-index:30; display:none;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.7), 0 0 18px rgba(200,140,40,.35);
  text-shadow:0 0 8px rgba(232,184,80,.55);
  letter-spacing:3px;
  padding:0 10px;
}
#nameInput:focus{ border-color:#e8b850; box-shadow:inset 0 1px 2px rgba(0,0,0,.7), 0 0 26px rgba(232,184,80,.6); }
#nameInput::placeholder{ color:#5a3a18; font-style:italic; letter-spacing:1px; }

/* CRT off — center white line flash */
.crt-line{position:absolute;left:8%;right:8%;top:50%;height:0;
  background:linear-gradient(180deg,transparent,#fff,transparent);
  box-shadow:0 0 22px rgba(255,255,255,.9);
  pointer-events:none;z-index:40;opacity:0;
  transform:translateY(-50%);transition:height .12s ease-out,opacity .35s ease-out;}
#crt.off .crt-line{height:2px;opacity:1;}
#crt.off-final .crt-line{height:1px;opacity:0;}

@keyframes scan{from{top:-4px}to{top:calc(100% + 4px)}}
#rotate{display:none;position:fixed;inset:0;background:#000;z-index:50;
  align-items:center;justify-content:center;flex-direction:column;gap:12px;}
#rotate p{color:#80c050;font:16px monospace;text-align:center;padding:0 24px;text-shadow:0 0 6px rgba(120,220,80,.5);}
@media (max-width:700px) and (orientation:portrait){#rotate{display:flex;}}
</style>
</head>
<body>
<div id="rotate">
  <p style="font-size:28px">↻</p>
  <p>GIRE O DISPOSITIVO</p>
  <p style="font-size:11px;opacity:.6">SOMA requer modo paisagem</p>
</div>
<div id="rig">
  <div class="monitor">
    <div id="crt">
      <div class="screen-content">
        <canvas id="c" width="920" height="600"></canvas>
        <div id="sl"></div><div id="vg"></div><div id="gl"></div><div id="rgb"></div>
        <div id="resetBtn" title="Voltar à tela inicial" onclick="cpClick();goHome();">↺ RESET</div>
      <input id="nameInput" type="text" maxlength="20" placeholder="seu nome" autocomplete="off" spellcheck="false" />
      </div>
      <div class="crt-line"></div>
      <div class="screen-glare"></div>
      <div id="mute"></div>
    </div>
    <div class="control-panel">
      <div class="cp-brand">CATHODE TERMINAL<small>MODEL  ·  S-1986</small></div>
      <div class="cp-ctrls">
        <div class="sw-group">
          <div class="sw-label">BRILHO</div>
          <div class="sw-keys">
            <span class="mkey" title="Diminuir brilho" onclick="cpClick();adjustDisplay('br',-1)">−</span>
            <span class="mkey" title="Aumentar brilho" onclick="cpClick();adjustDisplay('br',1)">+</span>
          </div>
        </div>
        <span class="cp-divider"></span>
        <div class="sw-group">
          <div class="sw-label">CONTR</div>
          <div class="sw-keys">
            <span class="mkey" title="Diminuir contraste" onclick="cpClick();adjustDisplay('co',-1)">−</span>
            <span class="mkey" title="Aumentar contraste" onclick="cpClick();adjustDisplay('co',1)">+</span>
          </div>
        </div>
        <span class="cp-divider"></span>
        <div class="sw-group">
          <div class="sw-label">SOM</div>
          <div class="sw-keys">
            <span class="mkey" id="sndBtn" title="Mudo/Som" onclick="cpClick();Aud.init();Aud.toggle();">♪</span>
          </div>
        </div>
        <span class="cp-meter" id="cpMeter">BR:███ CO:███</span>
      </div>
      <div class="cp-power">
        <span class="cp-led-label">PWR</span>
        <span class="cp-led" id="pwrLed"></span>
        <button class="cp-pwr-btn" id="pwrBtn" title="Liga/Desliga tela" onclick="togglePower()"></button>
      </div>
    </div>
  </div>
  <div class="stand-neck"></div>
  <div class="stand-base"></div>
</div>
<audio id="bootAudio" src="sounds/start.mp3" preload="auto"></audio>
<audio id="titleAudio" src="sounds/Gilt Dungeon Keys.mp3" loop preload="auto"></audio>
<script>'use strict';

// ── LAYOUT ────────────────────────────────────────────────────
const CW=920, CH=600;
const AW=360, AH=480;
const TX=AW+14, TW=CW-TX-10;
const HY=AH+2,  HH=CH-HY;
const FSIZE=14, LH=22;
const CHR=48; // choice row height

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=CW; canvas.height=CH;

// ── COVER IMAGE ───────────────────────────────────────────────
const coverImg=new Image();
coverImg.src='img/capa.png';

// ── CLICK DE SWITCH AZUL (bypassa mudo — sempre soa) ─────────
function cpClick(){
  Aud.init();
  const A=Aud.ctx; if(!A)return;
  const buf=A.createBuffer(1,Math.floor(A.sampleRate*.03),A.sampleRate);
  const d=buf.getChannelData(0);
  // Burst com decaimento exponencial rápido (click inicial)
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(A.sampleRate*.0025));
  // Segundo transiente: "bottom-out" 18ms depois
  const t2=Math.floor(A.sampleRate*.018);
  for(let i=0;i<Math.min(25,d.length-t2);i++) d[t2+i]+=(Math.random()*2-1)*Math.exp(-i/7)*.5;
  const src=A.createBufferSource(); src.buffer=buf;
  const hp=A.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=2400;
  const g=A.createGain(); g.gain.value=.20;
  src.connect(hp); hp.connect(g); g.connect(A.destination); // direto, sem mudo
  src.start();
}

// Rig scaling (fit monitor + stand to viewport)
const rig=document.getElementById('rig');
function fitRig(){
  const RW=1080,RH=822;
  const s=Math.min(window.innerWidth/(RW+40), window.innerHeight/(RH+40));
  const dw=Math.round(RW*(1-s)/2);
  const dh=Math.round(RH*(1-s)/2);
  rig.style.transform=`scale(${s})`;
  rig.style.margin=`-${dh}px -${dw}px`;
}
fitRig();
window.addEventListener('resize',fitRig);
const SC=1;

// ── PALETTE  (woodcut / dark-engraving) ──────────────────────
const P={
  void:'#000', ink:'#060200', paper:'#0c0702', paperL:'#1a1008',
  hatch:'#140d04',
  // Amber woodcut spectrum
  wa0:'#1a0c04',wa1:'#3a1c08',wa2:'#6a3610',wa3:'#9a5618',
  wa4:'#c87828',wa5:'#e8a840',wa6:'#f5cc70',waW:'#fff0c0',
  // Stone
  stone:'#181008',stoneLit:'#2e1e0e',stoneHL:'#4a3418',
  // Metal / armor
  met0:'#1e1810',met1:'#3a2e1c',met2:'#6a5830',met3:'#a89050',met4:'#d4c060',
  // Flame
  torch:'#d06810',torchY:'#ffe090',torchO:'#601000',torchW:'#fff8e0',
  // Blood
  blood:'#280606',bloodL:'#5a1010',
  // Fé (faith) — cool silver
  fe0:'#181828',fe1:'#4060c0',fe2:'#90a8e0',feW:'#d0e8ff',
  // Corrupção — deep violet/crimson
  cor0:'#180810',cor1:'#580838',cor2:'#a01060',corW:'#e040a0',
  // HUD
  hBg:'#070402',hBo:'#3a2210',hTx:'#c89040',hBr:'#e8c070',
  hDm:'#4a3018',hRd:'#b02020',
  // Gold ornament
  gold:'#9a7030',goldL:'#d4a850',goldD:'#4a3418',
  fog:'rgba(8,4,0,',
};

// ── UTILS ─────────────────────────────────────────────────────
const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const clp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;

function wrapText(text,maxW){
  ctx.font=FSIZE+'px monospace';
  const result=[];
  for(const para of text.split('\n')){
    if(!para){result.push('');continue;}
    let line='';
    for(const w of para.split(' ')){
      const test=line?line+' '+w:w;
      if(ctx.measureText(test).width>maxW&&line){result.push(line);line=w;}
      else line=test;
    }
    if(line)result.push(line);
  }
  return result;
}

function glow(text,x,y,col,gc,blur){
  ctx.shadowColor=gc||'#50a030'; ctx.shadowBlur=blur||6;
  ctx.fillStyle=col; ctx.fillText(text,x,y);
  ctx.shadowBlur=0;
}

// ── AUDIO ─────────────────────────────────────────────────────
const Aud={
  ctx:null,master:null,ambi:null,muted:false,tension:1,_ambiReady:false,
  init(){
    if(this.ctx)return;
    this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    this.master=this.ctx.createGain(); this.master.gain.value=0.32;
    this.master.connect(this.ctx.destination);
    if(G.scene==='title') this.playTitle();
  },
  playBoot(){
    const el=document.getElementById('bootAudio');
    if(el){ el.volume=0.45; if(el.paused) el.play().catch(()=>{}); }
  },
  stopBoot(){
    const el=document.getElementById('bootAudio');
    if(el){el.pause();el.currentTime=0;}
  },
  playTitle(){
    this.stopBoot();
    const el=document.getElementById('titleAudio');
    if(!el) return;
    // fade-in suave de 0 → 0.4 em 2.5s
    el.volume = 0;
    if(el.paused) el.play().catch(()=>{});
    if(this._titleFadeIn) clearInterval(this._titleFadeIn);
    let v = 0; const target = 0.40;
    this._titleFadeIn = setInterval(()=>{
      v += 0.025;
      el.volume = Math.min(target, v);
      if(v >= target){ clearInterval(this._titleFadeIn); this._titleFadeIn = null; }
    }, 50);
  },
  stopTitle(){
    const el=document.getElementById('titleAudio');
    if(!el) return;
    if(this._titleFadeIn){ clearInterval(this._titleFadeIn); this._titleFadeIn = null; }
    // fade-out de ~1.5s, depois pause
    if(this._titleFadeOut) clearInterval(this._titleFadeOut);
    let v = el.volume;
    this._titleFadeOut = setInterval(()=>{
      v -= 0.018;
      el.volume = Math.max(0, v);
      if(v <= 0){
        el.pause(); el.currentTime = 0;
        clearInterval(this._titleFadeOut); this._titleFadeOut = null;
      }
    }, 50);
  },
  startGameMusic(){
    this.stopTitle();
    if(!this._ambiReady){
      this._buildAmbi();
    } else if(this.ambi){
      const A=this.ctx;
      this.ambi.gain.cancelScheduledValues(A.currentTime);
      // fade-in de 5s — mais suave
      this.ambi.gain.linearRampToValueAtTime(this.tension*0.6,A.currentTime+5);
    }
  },
  pauseGameMusic(){
    if(this.ambi){
      const A=this.ctx;
      this.ambi.gain.cancelScheduledValues(A.currentTime);
      this.ambi.gain.linearRampToValueAtTime(0,A.currentTime+1.5);
    }
  },
  _buildAmbi(){
    if(this._ambiReady)return;
    this._ambiReady=true;
    const A=this.ctx;
    this.ambi=A.createGain(); this.ambi.gain.value=0;
    this.ambi.connect(this.master);
    this.ambi.gain.linearRampToValueAtTime(0.6,A.currentTime+8);  // entrada mais lenta e quieta

    // === HURDY-GURDY OPEN-FIFTH DRONE (D — A) ===
    this._drone(36.71,'sine',0.11,0);          // sub D1
    this._drone(73.42,'sawtooth',0.042,500);   // D2
    this._drone(73.95,'sawtooth',0.038,500);   // D2 detuned (chorus)
    this._drone(110.0,'sawtooth',0.032,650);   // A2 (fifth)
    this._drone(110.7,'sawtooth',0.028,650);   // A2 detuned
    this._drone(146.83,'triangle',0.020,1200); // D3 octave
    // Slow breathing pads
    this._pad(220,0.024,0.05);
    this._pad(293.66,0.016,0.08);

    // === MELODIC PHRASE — D PHRYGIAN (medieval dark mode) ===
    this._melodyLoop();

    // === CHORAL CHANT PAD ===
    this._sched(()=>this._chant(), 14,32);

    // === ATMOSPHERE ===
    this._sched(()=>this._ping(),   9,22);
    this._sched(()=>this._drip(),   6,18);
    this._sched(()=>this._creak(),  12,30);
    this._sched(()=>this._wind(),   10,28);
    this._sched(()=>this._distantToll(), 28,60);
  },
  _melodyLoop(){
    // D Phrygian — modal "dark medieval" — intervals 0 1 3 5 7 8 10 (semitones)
    // Played on a recorder/fiddle voice, monophonic, slow & mournful.
    const ratios={0:1,1:1.0595,3:1.1892,5:1.3348,7:1.4983,8:1.5874,10:1.7818,12:2.0};
    const root=146.83; // D3
    // [scaleDegree, dur, restAfter]
    const phrase=[
      [0,1.4,0],[1,1.1,0],[3,1.6,0],[1,1.0,0],[0,2.0,1.0],
      [3,1.0,0],[5,1.0,0],[7,1.5,0],[8,1.2,0],[5,1.0,0],[3,1.4,1.2],
      [7,1.6,0],[5,1.0,0],[3,1.2,0],[1,1.1,0],[0,2.6,2.4],
      [0,1.0,0],[-2,1.2,0],[-4,2.6,3.0], // descent below root
    ];
    const playPhrase=()=>{
      if(!this.ctx)return;
      let t=this.ctx.currentTime+0.4;
      phrase.forEach(([n,d,r])=>{
        let r2=ratios[n]||(n<0?(1/ratios[-n]||1):1);
        if(n===-2) r2=ratios[10]/2;       // C below
        if(n===-4) r2=ratios[8]/2;        // Bb below
        this._melodicNote(root*r2,t,d);
        t+=d+r;
      });
    };
    playPhrase();
    this._melodyTimer=setInterval(()=>playPhrase(), 38000);
  },
  _melodicNote(freq,when,dur){
    const A=this.ctx; if(!A)return;
    const o1=A.createOscillator(); o1.type='triangle'; o1.frequency.value=freq;
    const o2=A.createOscillator(); o2.type='sawtooth'; o2.frequency.value=freq;
    const fl=A.createBiquadFilter(); fl.type='lowpass'; fl.frequency.value=1900; fl.Q.value=1.2;
    // vibrato
    const lfo=A.createOscillator(); lfo.frequency.value=4.6;
    const lfoG=A.createGain(); lfoG.gain.value=freq*.008;
    lfo.connect(lfoG); lfoG.connect(o1.frequency); lfoG.connect(o2.frequency);
    const g1=A.createGain(); g1.gain.value=0.75; o1.connect(g1).connect(fl);
    const g2=A.createGain(); g2.gain.value=0.20; o2.connect(g2).connect(fl);
    const g=A.createGain();
    fl.connect(g); g.connect(this.ambi);
    const peak=0.075;
    g.gain.setValueAtTime(0,when);
    g.gain.linearRampToValueAtTime(peak,when+0.18);
    g.gain.linearRampToValueAtTime(peak*.6,when+dur*0.75);
    g.gain.exponentialRampToValueAtTime(0.0001,when+dur+0.5);
    o1.start(when); o2.start(when); lfo.start(when);
    o1.stop(when+dur+0.6); o2.stop(when+dur+0.6); lfo.stop(when+dur+0.6);
  },
  _chant(){
    const A=this.ctx; if(!A)return;
    // Sacred-feeling cluster: root + fifth + octave (perfect intervals)
    const roots=[73.42,82.41,98.00,110.00]; // D, E, G, A (low)
    const root=roots[Math.floor(Math.random()*roots.length)];
    const harms=[1,1.5,2,3]; // octave + fifth + octave + twelfth
    const dur=5+Math.random()*4;
    const t0=A.currentTime;
    harms.forEach((h,i)=>{
      const o=A.createOscillator(); o.type='sine'; o.frequency.value=root*h;
      const fl=A.createBiquadFilter(); fl.type='lowpass'; fl.frequency.value=900+h*150;
      const g=A.createGain();
      // formant-like detune for vox texture
      const lfo=A.createOscillator(); lfo.frequency.value=0.18+i*.04;
      const lfoG=A.createGain(); lfoG.gain.value=root*h*0.004;
      lfo.connect(lfoG); lfoG.connect(o.frequency);
      o.connect(fl); fl.connect(g); g.connect(this.ambi);
      const peak=0.022/Math.sqrt(h);
      g.gain.setValueAtTime(0,t0);
      g.gain.linearRampToValueAtTime(peak,t0+1.8);
      g.gain.linearRampToValueAtTime(peak,t0+dur-1.8);
      g.gain.exponentialRampToValueAtTime(0.0005,t0+dur);
      o.start(t0); lfo.start(t0);
      o.stop(t0+dur+0.3); lfo.stop(t0+dur+0.3);
    });
  },
  _wind(){
    const A=this.ctx; if(!A)return;
    const dur=4+Math.random()*4;
    const sz=Math.floor(A.sampleRate*dur);
    const buf=A.createBuffer(1,sz,A.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<sz;i++) d[i]=(Math.random()*2-1)*0.5;
    const src=A.createBufferSource(); src.buffer=buf;
    const fl=A.createBiquadFilter(); fl.type='bandpass';
    fl.frequency.value=260+Math.random()*180; fl.Q.value=1.3;
    const g=A.createGain();
    const t0=A.currentTime;
    g.gain.setValueAtTime(0,t0);
    g.gain.linearRampToValueAtTime(0.075,t0+dur*0.45);
    g.gain.exponentialRampToValueAtTime(0.0005,t0+dur);
    src.connect(fl); fl.connect(g); g.connect(this.ambi);
    src.start();
  },
  _distantToll(){
    const A=this.ctx; if(!A)return;
    // soft, distant church bell with strong harmonics
    const real=new Float32Array([0,1,.5,.35,.18,.08,.04]);
    const imag=new Float32Array(7);
    const f=55+Math.random()*15;
    const o=A.createOscillator();
    o.setPeriodicWave(A.createPeriodicWave(real,imag));
    o.frequency.value=f;
    const fl=A.createBiquadFilter(); fl.type='lowpass'; fl.frequency.value=900;
    const g=A.createGain();
    const t0=A.currentTime;
    g.gain.setValueAtTime(0.18,t0);
    g.gain.exponentialRampToValueAtTime(0.0005,t0+5.5);
    o.connect(fl); fl.connect(g); g.connect(this.ambi);
    o.start(t0); o.stop(t0+6);
  },
  _drone(f,type,vol,lp){
    const A=this.ctx;
    const o=A.createOscillator(); const g=A.createGain();
    o.type=type; o.frequency.value=f; g.gain.value=vol;
    if(lp){const fl=A.createBiquadFilter();fl.type='lowpass';fl.frequency.value=lp;o.connect(fl);fl.connect(g);}
    else o.connect(g);
    g.connect(this.ambi); o.start();
  },
  _pad(f,vol,lfoRate){
    const A=this.ctx;
    const o=A.createOscillator();const g=A.createGain();const lfo=A.createOscillator();const lg=A.createGain();
    o.type='sine';o.frequency.value=f;g.gain.value=vol*.2;
    lfo.frequency.value=lfoRate;lg.gain.value=vol*.8;
    lfo.connect(lg);lg.connect(g.gain);o.connect(g);g.connect(this.ambi);
    o.start();lfo.start();
  },
  _sched(fn,min,max){
    const d=min+Math.random()*(max-min);
    setTimeout(()=>{if(this.ctx){fn();this._sched(fn,min,max);}},d*1000);
  },
  _ping(){
    const A=this.ctx;
    const notes=[110,130.8,146.8,164.8,196,220,293.7,329.6];
    const f=notes[ri(0,notes.length-1)];
    const o=A.createOscillator();const g=A.createGain();
    const real=new Float32Array([0,1,.6,.3,.15,.07,.03]);const imag=new Float32Array(7);
    o.setPeriodicWave(A.createPeriodicWave(real,imag));
    o.frequency.value=f;
    g.gain.setValueAtTime(0.05,A.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,A.currentTime+2.8);
    o.connect(g);g.connect(this.ambi);o.start();o.stop(A.currentTime+2.8);
  },
  _drip(){
    const A=this.ctx; const f=900+Math.random()*700;
    const o=A.createOscillator();const g=A.createGain();
    o.type='sine';o.frequency.setValueAtTime(f,A.currentTime);
    o.frequency.exponentialRampToValueAtTime(f*.35,A.currentTime+.18);
    g.gain.setValueAtTime(0.055,A.currentTime);g.gain.exponentialRampToValueAtTime(0.001,A.currentTime+.35);
    o.connect(g);g.connect(this.ambi);o.start();o.stop(A.currentTime+.35);
  },
  _creak(){
    const A=this.ctx;
    const sz=Math.floor(A.sampleRate*.3);const buf=A.createBuffer(1,sz,A.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<sz;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/sz,2);
    const src=A.createBufferSource();src.buffer=buf;
    const fl=A.createBiquadFilter();fl.type='bandpass';fl.frequency.value=400+Math.random()*300;fl.Q.value=6;
    const g=A.createGain();g.gain.value=0.06;
    src.connect(fl);fl.connect(g);g.connect(this.ambi);src.start();
  },
  hover(){
    if(!this.ctx||this.muted)return;
    const A=this.ctx;const o=A.createOscillator();const g=A.createGain();
    o.type='sine';o.frequency.value=520;
    g.gain.setValueAtTime(0.035,A.currentTime);g.gain.exponentialRampToValueAtTime(0.001,A.currentTime+.055);
    o.connect(g);g.connect(this.master);o.start();o.stop(A.currentTime+.06);
  },
  select(){
    if(!this.ctx)return;
    const A=this.ctx;
    const sz=Math.floor(A.sampleRate*.2);const buf=A.createBuffer(1,sz,A.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<sz;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/sz,1.8);
    const src=A.createBufferSource();src.buffer=buf;
    const fl=A.createBiquadFilter();fl.type='bandpass';fl.frequency.value=520;fl.Q.value=5;
    const g=A.createGain();g.gain.value=0.28;
    src.connect(fl);fl.connect(g);g.connect(this.master);src.start();
    const o=A.createOscillator();const g2=A.createGain();
    o.type='sine';o.frequency.setValueAtTime(130,A.currentTime);
    o.frequency.exponentialRampToValueAtTime(36,A.currentTime+.2);
    g2.gain.setValueAtTime(0.38,A.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,A.currentTime+.24);
    o.connect(g2);g2.connect(this.master);o.start();o.stop(A.currentTime+.24);
  },
  whoosh(){
    if(!this.ctx)return;
    const A=this.ctx;
    const sz=Math.floor(A.sampleRate*.7);const buf=A.createBuffer(1,sz,A.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<sz;i++)d[i]=Math.random()*2-1;
    const src=A.createBufferSource();src.buffer=buf;
    const fl=A.createBiquadFilter();fl.type='lowpass';fl.frequency.value=700;
    const g=A.createGain();
    g.gain.setValueAtTime(0,A.currentTime);g.gain.linearRampToValueAtTime(0.1,A.currentTime+.18);
    g.gain.exponentialRampToValueAtTime(0.001,A.currentTime+.7);
    src.connect(fl);fl.connect(g);g.connect(this.master);src.start();
  },
  toll(){
    if(!this.ctx)return;
    const A=this.ctx;
    const real=new Float32Array([0,1,.55,.28,.14,.07,.035]);const imag=new Float32Array(7);
    const o=A.createOscillator();o.setPeriodicWave(A.createPeriodicWave(real,imag));
    o.frequency.value=40;
    const g=A.createGain();
    g.gain.setValueAtTime(0.65,A.currentTime);g.gain.exponentialRampToValueAtTime(0.001,A.currentTime+4.5);
    o.connect(g);g.connect(this.master);o.start();o.stop(A.currentTime+4.5);
  },
  setTension(v){
    if(!this.ambi)return;
    this.tension=v;
    this.ambi.gain.linearRampToValueAtTime(v,this.ctx.currentTime+2.5);
  },
  toggle(){
    this.muted=!this.muted;
    if(this.master)this.master.gain.value=this.muted?0:.32;
    ['bootAudio','titleAudio'].forEach(id=>{
      const el=document.getElementById(id);
      if(el)el.muted=this.muted;
    });
    const b=document.getElementById('sndBtn');
    if(b){
      b.classList.toggle('pressed',this.muted);
      b.textContent=this.muted?'✕':'♪';
    }
  }
};

    text:'Um frio agradável. A sombra pintada inclinou-se sobre o duplo ajoelhado. {NOME} compreendeu, pela primeira vez, que ser escolhido pode ser uma forma de descanso.\n\nA figura acendeu-se breve. Apagou. O corredor descia.',
    ch:[{l:'Descer.',n:'scribe_approach'}]},
  trip_right:{title:'I.  O FUGITIVO',art:'triptych',
    text:'Vazio. Por um instante, não soube se a mão ainda estava na parede. Ouviu passos correndo, sem saber se eram os seus.\n\nA figura acendeu-se breve. Apagou. O corredor descia.',
    ch:[{l:'Descer.',n:'scribe_approach'}]},
  scribe_approach:{title:'I.  O ESCRIBA',art:'descent',
    text:'A descida foi longa. As paredes tinham, em baixo-relevo, cenas que pareciam crônicas: navios saindo de Iugono, mercadores cruzando de Pucra para Otorco, crianças correndo pela praça de Slini sob um céu de estrelas. Era o arquipélago antes do sussurro.\n\nNuma curva, {NOME} viu o escriba.\n\nEra uma estátua. Sentado em um banco de pedra, dobrado sobre uma laje, um homem esculpido batia um cinzel contra a superfície. Tap. Tap. Tap. A cada batida, um pedaço de pedra caía no chão e virava pó.\n\nQuando {NOME} se aproximou, o escriba ergueu a cabeça. Os olhos eram dois buracos. Dentro deles, atenção.\n\n— Você é o sétimo, disse. — Os outros seis também passaram. Alguns subiram. Alguns desceram. Alguns ficaram, e agora são parte das paredes.\n\n{NOME} olhou as paredes. As figuras esculpidas tinham, todas, o seu rosto.\n\n— Posso lhe dar uma coisa. Mas tudo que dou tem peso. E todo peso, em algum momento, se paga.',
    ch:[{l:'"Quero um nome verdadeiro."',n:'scribe_name',ef:{fe:3,cor:-1,relic:'Nome Verdadeiro'}},
        {l:'"Quero um pacto."',n:'scribe_pact',ef:{cor:3,fe:-1,relic:'Marca do Pacto'}},
        {l:'"Quero o silêncio."',n:'scribe_silence',ef:{duv:3,relic:'Silêncio Interno'}}]},
  scribe_name:{title:'I.  O NOME',art:'scribe',
    text:'O escriba inclinou-se, soprou na laje, e o pó formou uma palavra que {NOME} leu e esqueceu no mesmo instante. Mas algo endureceu nele. Pertencia a alguém — a uma mãe, a uma terra, a uma promessa anterior ao seu nascimento. Isso lhe deu raiva. A raiva talvez seja a forma mais útil de fé.\n\nO corredor desceu mais. As crônicas misturaram-se. As figuras se ajoelhavam diante de algo grande, carregavam outras nas costas, dividiam-se ao meio. O baixo-relevo virou marca. A marca virou parede sem nada.\n\nFoi quando a pedra começou a respirar.',
    ch:[{l:'Continuar descendo.',n:'flesh_enter'}]},
  scribe_pact:{title:'I.  O PACTO',art:'scribe',
    text:'O escriba sorriu — algo que estátuas fazem quando sorriem — e cravou o cinzel na própria mão. Caiu pó. {NOME} estendeu a sua. Um sinal arde por um segundo na palma, e some. Mas continua lá. "Quando precisar, chame."\n\nO corredor desceu mais. As crônicas misturaram-se. As figuras se ajoelhavam diante de algo grande, carregavam outras nas costas, dividiam-se ao meio. O baixo-relevo virou marca. A marca virou parede sem nada.\n\nFoi quando a pedra começou a respirar.',
    ch:[{l:'Continuar descendo.',n:'flesh_enter'}]},
  scribe_silence:{title:'I.  O SILÊNCIO',art:'scribe',
    text:'O escriba não respondeu. Bateu o cinzel, com força, contra a própria boca. A boca se fechou. Quando {NOME} deu as costas, percebeu que algo dentro dele havia emudecido. Uma voz que o acompanhava desde o despertar não estava mais ali. Não soube se sentia saudade ou alívio.\n\nO corredor desceu mais. As crônicas misturaram-se. As figuras se ajoelhavam diante de algo grande, carregavam outras nas costas, dividiam-se ao meio. O baixo-relevo virou marca. A marca virou parede sem nada.\n\nFoi quando a pedra começou a respirar.',
    ch:[{l:'Continuar descendo.',n:'flesh_enter'}]},

// ═══════════════════════════════════════════
//  CAPÍTULO II — A CARNE
// ═══════════════════════════════════════════
  flesh_enter:{title:'II.  A CARNE',art:'flesh',
    text:'A transição foi tão suave que {NOME} só percebeu tarde. Em algum ponto, as paredes deixaram de ser ásperas. Tornaram-se úmidas. Mornas. Cediam um pouco sob a pressão dos dedos e empurravam de volta.\n\nA caverna estava viva.\n\nQuando ele encostou a palma, sentiu um pulso. Lento. Fundo. Irregular. O coração de algo grande demais para ser visto inteiro. O chão não tinha mais lajes — agora era um tapete de fibras escuras e flexíveis, que prendiam os pés a cada passo e se soltavam com um som molhado. O ar cheirava a ferro e mel.\n\n{NOME} quis voltar. Olhou para trás. O corredor não estava mais lá.',
    ch:[{l:'Continuar.',n:'maroqia_fall'}]},
  maroqia_fall:{title:'II.  MAROQIA',art:'maroqia',
    text:'À frente, o caminho desembocava numa câmara enorme. Do teto pendia, translúcido, do tamanho de um homem, um casulo. Dentro, algo se mexia.\n\nA voz voltou. Vinha de dentro dele.\n\n"Ela espera há muito tempo."\n\n{NOME} deu um passo. O casulo tremeu. Rasgou-se. De dentro caiu, com um baque, uma mulher.\n\nNão era espectro. Era de carne. Jovem. Pele branca, quase translúcida. Cabelos longos colados ao corpo molhado. Olhos sem pupila, brancos como leite.\n\n— {NOME}, disse ela. A voz era a voz que ele tinha ouvido a vida inteira, em sonhos que esquecia ao acordar. — Eu sou Maroqia. Sou o que sobrou de mim quando o sussurro chegou.\n\nErgueu-se. Cambaleou. Tinha porte de rainha e olhar de criança.\n\n— Antes de Ignarion eu governava daqui. A caverna não existia. O arquipélago era inteiro. Quando ele acordou, desci para contê-lo. Não consegui. Mas também não morri.\n\nEstendeu a mão. Os dedos eram demais. Sete, talvez oito, finos como agulhas.\n\n— Decida o que fazer comigo antes de continuar. Eu não posso ir com você. Posso lhe dar algo. Ou tirar.',
    ch:[{l:'Oferecer-lhe o que carrega.',n:'c4_give',ef:{fe:4,cor:-2}},
        {l:'Tomar dela uma coisa.',n:'c4_take',ef:{cor:4,fe:-2}},
        {l:'Recuar sem tocá-la.',n:'c4_retreat',ef:{duv:4}}]},
  c4_give:{title:'II.  A ENTREGA',art:'maroqia',
    text:'Ela aceitou com as duas mãos. Os dedos extras dobraram-se em torno do objeto. Por um instante era apenas uma mulher cansada segurando uma coisa que importava.\n\n"Obrigada." Tocou a testa de {NOME}. Uma água fria desceu pela coluna, lavando algo que ele não sabia estar sujo. "Quando o encontrar, lembre-se. Ele também já foi pequeno."\n\nA câmara contraiu-se. Uma nova passagem abriu-se, mais baixa, mais úmida. {NOME} curvou-se para entrar. Atrás dele, a parede fechou-se com um suspiro.',
    ch:[{l:'Prosseguir.',n:'veins_walk'}]},
  c4_take:{title:'II.  O QUE SE TOMA',art:'maroqia',
    text:'{NOME} estendeu a mão. Os dedos dela se separaram, hesitantes. Escolheu o mais fino. Quebrou. Não houve sangue — um fio de luz escapou, e ele o engoliu sem pensar. Sabor de mel velho.\n\nMaroqia não gritou. Olhou-o com uma tristeza tão antiga que parecia carinho.\n\n"Você vai longe. Não vai voltar inteiro."\n\nA câmara contraiu-se. Uma nova passagem abriu-se, mais baixa, mais úmida. {NOME} curvou-se para entrar. Atrás dele, a parede fechou-se com um suspiro.',
    ch:[{l:'Prosseguir.',n:'veins_walk'}]},
  c4_retreat:{title:'II.  O QUE SE EVITA',art:'maroqia',
    text:'{NOME} deu um passo atrás. Outro. Maroqia não se moveu.\n\nQuando ele virou as costas, ouviu, baixinho:\n\n"Eu queria que alguém ficasse, só uma vez."\n\nO som o acompanhou pelo resto da descida.\n\nA câmara contraiu-se. Uma nova passagem abriu-se, mais baixa, mais úmida. {NOME} curvou-se para entrar. Atrás dele, a parede fechou-se com um suspiro.',
    ch:[{l:'Prosseguir.',n:'veins_walk'}]},
  veins_walk:{title:'II.  AS VEIAS',art:'veins',
    text:'A passagem virou veia. As paredes tinham agora vasos — feixes finos que corriam pelas laterais como cordas de violino, levando um líquido escuro que brilhava. O ar ficou denso. Cada passo afundava um pouco.\n\n{NOME} começou a ouvir vozes.\n\nNão eram suas. Eram muitas. Sussurros sobrepostos, em línguas diferentes, dizendo coisas pequenas: receitas de pão, nomes de filhos, pedidos de perdão, declarações de amor sussurradas tarde demais. O murmúrio acumulado de todos os mortos do arquipélago.\n\nUm sussurro destacou-se:\n\n"{NOME}. Não passe daqui."\n\nEra voz de criança.',
    ch:[{l:'Seguir a voz.',n:'child_meet'}]},
  child_meet:{title:'II.  A MENINA',art:'child',
    text:'À frente, onde a veia da parede se abria como uma boca, uma figura pequena estava sentada no chão. Uma menina, talvez de oito anos, vestido cinzento, pés descalços. Olhou para ele com olhos completamente humanos, o que, naquela altura da descida, foi a coisa mais assustadora que ele já tinha visto.\n\n— Eu sou a parte de você que ainda tem medo, disse. — Vim porque você estava me esquecendo lá em cima. Você não pode descer o resto sem mim. Mas também não pode descer comigo. Decida.',
    ch:[{l:'Pegá-la no colo.',n:'c5_carry',ef:{fe:3,cor:-1,duv:-1}},
        {l:'Puxá-la pela mão.',n:'c5_drag',ef:{cor:3,fe:-1}},
        {l:'Passar por ela sem tocá-la.',n:'c5_pass',ef:{duv:3}}]},
  c5_carry:{title:'II.  O QUE SE CARREGA',art:'child',
    text:'Era leve. Mais leve do que devia. Enroscou os braços no pescoço dele, escondeu o rosto no ombro. {NOME} sentiu, de repente, uma vontade absurda de chorar. Não chorava desde antes do despertar. Seguiu carregando-a.\n\n"Você vai me ver de novo. No fim."\n\nO caminho continuou. As veias da parede engrossaram. O líquido brilhou mais forte. Em algum momento — {NOME} perdeu a conta — o túnel desembocou numa câmara nova.\n\nTudo mudou de novo.',
    ch:[{l:'Continuar descendo.',n:'dream_chamber'}]},
  c5_drag:{title:'II.  O QUE SE ARRASTA',art:'child',
    text:'Ela cravou os pezinhos no chão. Gritou — um grito agudo, infantil, real. Ele continuou puxando.\n\nEm algum momento, ela parou de gritar. Em algum momento, ele percebeu que arrastava apenas o vestido vazio. Continuou.\n\n"Boa escolha", disse uma voz que já não era a dela.\n\nO caminho continuou. As veias da parede engrossaram. O líquido brilhou mais forte. Em algum momento — {NOME} perdeu a conta — o túnel desembocou numa câmara nova.\n\nTudo mudou de novo.',
    ch:[{l:'Continuar descendo.',n:'dream_chamber'}]},
  c5_pass:{title:'II.  O QUE SE DEIXA',art:'child',
    text:'{NOME} desviou. Ela não chorou. Não pediu de novo. Baixou o rosto.\n\nAlguns metros adiante, ele olhou para trás. Ela ainda estava lá, sentada, esperando. {NOME} entendeu que ela esperaria para sempre, e que essa espera era, de alguma forma, sua culpa.\n\nO caminho continuou. As veias da parede engrossaram. O líquido brilhou mais forte. Em algum momento — {NOME} perdeu a conta — o túnel desembocou numa câmara nova.\n\nTudo mudou de novo.',
    ch:[{l:'Continuar descendo.',n:'dream_chamber'}]},

// ═══════════════════════════════════════════
//  CAPÍTULO III — O SONHO
// ═══════════════════════════════════════════
  dream_chamber:{title:'III.  O SONHO',art:'dream',
    text:'A câmara era impossível.\n\nNão havia paredes — ou havia, mas estavam longe demais para serem paredes de uma caverna. No alto, em vez de teto, um céu. Um céu real: nuvens, a lua de Cloto crescente, vento com cheiro de mar.\n\nSoma olhou para baixo. Sob seus pés estava desenhado o mapa do arquipélago. Cada ilha em escala. Lúmen ardia num ponto pequeno perto da costa de Evrak. Sandor estava ao sul. Hingisi pulsava em vermelho-sangue.\n\nEle estava em pé sobre o próprio mundo.\n\nÀ sua frente, três figuras sentadas em tronos de pedra dispostos em semicírculo.',
    ch:[{l:'Aproximar-se.',n:'council_meet'}]},
  council_meet:{title:'III.  OS CONSELHEIROS',art:'council',
    text:'A câmara era impossível.\n\nNão havia paredes — ou havia, mas estavam longe demais para serem paredes de uma caverna. Havia um chão de pedra negra polida. Acima, em vez de teto, um céu. Um céu real: nuvens, a lua de Cloto crescente, vento morno com cheiro de mar.\n\n{NOME} olhou para baixo. Sob seus pés estava desenhado o mapa do arquipélago. Cada ilha em escala. Cada província nomeada em escrita minúscula. Lúmen ardia num ponto pequeno, perto da costa de Evrak. Sandor estava ao sul. Hingisi pulsava no canto inferior, em vermelho-sangue.\n\nEle estava em pé sobre o próprio mundo.\n\nÀ sua frente, sentadas em três tronos de pedra dispostos em semicírculo, três figuras.\n\nA primeira era um velho de barba branca, no hábito de um padre de Sparnex, com um livro fechado no colo. A segunda era uma mulher de armadura negra, com uma coroa torta sobre o cabelo curto, e um rosto parecido com o dele. A terceira era um vulto cinzento que tremulava como se estivesse sempre prestes a desaparecer.\n\n— Esta é a câmara dos conselhos, disse o velho. — Aqui você nos ouve antes de decidir.\n\n— Esta é a câmara das tentações, disse a mulher. — Aqui você se ouve.\n\n— Esta é a câmara do silêncio, disse o vulto. — Aqui não há nada para ouvir, e isso é o conselho.\n\nA lua moveu-se um pouco para o oeste.\n\n— Você tem três perguntas, disse o velho. — Uma para cada um. Depois disso, a câmara fecha.',
    get ch(){
      G.councilAsked = G.councilAsked || {};
      const a = G.councilAsked;
      const askedCount = (a.padre?1:0) + (a.rainha?1:0) + (a.vulto?1:0);
      if(askedCount >= 3) return [{l:'Encerrar as perguntas.',n:'council_end'}];
      const ch = [];
      if(!a.padre){
        ch.push({l:'Ao Padre: "Quem sou eu?"',n:'padre_q1',ef:{fe:2},flag:{councilAsked_padre:true}});
        ch.push({l:'Ao Padre: "O que Ignarion é?"',n:'padre_q2',ef:{fe:2,duv:1},flag:{councilAsked_padre:true}});
        ch.push({l:'Ao Padre: "Posso voltar?"',n:'padre_q3',ef:{duv:2},flag:{councilAsked_padre:true}});
      }
      if(!a.rainha){
        ch.push({l:'À Rainha: "Como vencer?"',n:'rainha_q1',ef:{cor:2},flag:{councilAsked_rainha:true}});
        ch.push({l:'À Rainha: "O que quero, de verdade?"',n:'rainha_q2',ef:{cor:2,fe:1},flag:{councilAsked_rainha:true}});
        ch.push({l:'À Rainha: "Quem é você?"',n:'rainha_q3',ef:{cor:2,duv:1},flag:{councilAsked_rainha:true}});
      }
      if(!a.vulto){
        ch.push({l:'Ao Vulto: qualquer pergunta.',n:'vulto_q1',ef:{duv:2},flag:{councilAsked_vulto:true}});
      }
      return ch;
    }},
  padre_q1:{title:'III.  QUEM SOU',art:'council',
    text:'O livro estava em branco.\n\n"Você é {NOME}, filho de {NOME}, filho de {NOME}. Antes de você houve outros com seu nome. Depois haverá outros. Você não é único. Mas é o que está aqui agora."\n\nA lua moveu-se um pouco para o oeste.',
    ch:[{l:'Voltar ao conselho.',n:'council_meet'}]},
  padre_q2:{title:'III.  IGNARION',art:'council',
    text:'"Ignarion é o que sobrou quando o arquipélago tentou esquecer uma dor antiga. As dores mal esquecidas viram dragões. Os dragões não se matam com lâminas. Isso não significa que você não deva tentar."\n\nA lua moveu-se um pouco para o oeste.',
    ch:[{l:'Voltar ao conselho.',n:'council_meet'}]},
  padre_q3:{title:'III.  O RETORNO',art:'council',
    text:'Ele fechou o livro lentamente.\n\n"Pode. Mas a porta que se abre para trás abre num lugar que já não é lá. Os que voltam encontram a casa vazia. A vazidão é pior que a descida."\n\nA lua moveu-se um pouco para o oeste.',
    ch:[{l:'Voltar ao conselho.',n:'council_meet'}]},
  rainha_q1:{title:'III.  COMO VENCER',art:'council',
    text:'Sorriu — o sorriso era o dele, mais velho.\n\n"Você não vence Ignarion. Você se torna ele. É a única vitória que existe nesta caverna."',
    ch:[{l:'Voltar ao conselho.',n:'council_meet'}]},
  rainha_q2:{title:'III.  O QUE QUERO',art:'council',
    text:'Inclinou-se.\n\n"Descansar. Parar de carregar isto. Que alguém maior diga: pode soltar, eu seguro agora. Todos querem. A diferença é quem admite."',
    ch:[{l:'Voltar ao conselho.',n:'council_meet'}]},
  rainha_q3:{title:'III.  QUEM É VOCÊ',art:'council',
    text:'"Sou o que você seria se tivesse aceitado a primeira oferta. Sou {NOME} do segundo afresco. Estou aqui há muito tempo. Não é tão ruim. Tudo fica quieto, depois de um tempo."',
    ch:[{l:'Voltar ao conselho.',n:'council_meet'}]},
  vulto_q1:{title:'III.  O SILÊNCIO DO VULTO',art:'council',
    text:'Não respondeu. Apenas tremulou.\n\nDepois de um silêncio, algo na cabeça de {NOME} se acomodou. A ausência de resposta era, ela mesma, uma resposta.\n\nEle saiu sabendo menos, e isso pareceu útil.',
    ch:[{l:'Voltar ao conselho.',n:'council_meet'}]},
  council_end:{title:'III.  A CÂMARA FECHA',art:'dream',
    text:'Quando {NOME} fez a terceira pergunta, o céu falso começou a enrolar-se. As nuvens recolheram-se como tecido sendo dobrado. A lua apagou.\n\nOs três conselheiros levantaram-se ao mesmo tempo, e sem se despedir caminharam para fora.\n\nO chão racho. As ilhas pintadas separaram-se. Lúmen afastou-se de Evrak. Sandor desprendeu-se de Slaxinia. O mapa fragmentou-se, e {NOME} viu, pelas frestas, a escuridão verdadeira abaixo. Não a do céu pintado — a crua, sem fundo.\n\nA laje sob seus pés cedeu.\n\nEle caiu.',
    ch:[{l:'Cair.',n:'mirror_hall'}]},
  mirror_hall:{title:'III.  O SALÃO',art:'mirrors',
    text:'Caiu por muito tempo, ou por nenhum tempo — naquela camada, as duas coisas eram a mesma. Quando tocou o chão, foi sem impacto. Estava em pé. Estava num salão.\n\nUm salão de espelhos.\n\nNão eram espelhos comuns. Eram superfícies de água parada presas em molduras de osso. Cada uma mostrava uma cena diferente. Numa, {NOME} viu-se ajoelhado diante de Ignarion. Em outra, erguendo uma espada. Em outra, correndo por um campo aberto, sem destino, e o campo era amarelo de sol e era a coisa mais bonita que ele já tinha visto.\n\nEm todas, ele era o protagonista. Em todas, o final era diferente.\n\nHavia um espelho menor, no canto. Aproximou-se.\n\nNele, ele se via agora. Caminhando pelo salão. Olhando para o espelho que mostrava ele caminhando pelo salão, olhando para o espelho que mostrava ele caminhando. Uma recursão. E em algum ponto profundo dessa recursão, num espelho do tamanho de uma unha, viu algo que não era ele.\n\nEra Ignarion. Pequeno. Sentado. Esperando.\n\nRecuou. Ouviu, atrás de si, uma respiração.',
    ch:[{l:'Virar-se devagar.',n:'c7_turn',ef:{fe:2,cor:1}},
        {l:'Não se virar.',n:'c7_noturn',ef:{cor:3}},
        {l:'Fechar os olhos e tapar os ouvidos.',n:'c7_close',ef:{duv:3}}]},
  c7_turn:{title:'III.  O MENINO',art:'mirrors',
    text:'Atrás dele havia uma criança. Um menino de seus dez anos. Tinha o rosto dele — não o adulto, mas o que ele teria tido se tivesse sido criança em algum momento que não conseguia lembrar.\n\nO menino não disse nada. Estendeu a mão. {NOME} apertou. O menino sorriu, e desapareceu — não em fumaça, simplesmente desapareceu, do jeito como certas verdades desaparecem quando finalmente compreendidas.\n\nAlgo nele se completou.',
    ch:[{l:'Continuar.',n:'mirror_shatter'}]},
  c7_noturn:{title:'III.  O REFLEXO',art:'mirrors',
    text:'A respiração aproximou-se. {NOME} manteve os olhos no reflexo.\n\nNo espelho, viu o que estava atrás: era ele mesmo, mais velho, mais magro, olhos brilhantes demais. Esse outro sorriu, e o sorriso apareceu no rosto do {NOME} de carne antes que ele decidisse sorrir.\n\nAlgo trocou de lugar.',
    ch:[{l:'Continuar.',n:'mirror_shatter'}]},
  c7_close:{title:'III.  O RECOLHIMENTO',art:'mirrors',
    text:'{NOME} encolheu-se no chão. A respiração continuou. Aproximou-se. Parou ao seu lado. Ficou ali por um tempo que poderia ter sido um segundo ou um século.\n\nDepois afastou-se.\n\nQuando ele abriu os olhos, estava sozinho. Mas os espelhos estavam todos virados para a parede.',
    ch:[{l:'Continuar.',n:'mirror_shatter'}]},
  mirror_shatter:{title:'III.  O SALÃO PARTE',art:'mirrors',
    text:'Os espelhos racharam, um a um, num ritmo lento. Cada rachadura era um suspiro. Quando o último estilhaçou, o salão escureceu. As molduras de osso desabaram em pó.\n\nNo chão, uma abertura: estreita, irregular, com bordas de rocha viva. Uma passagem aberta a unhada.\n\nEra por ali que ele tinha de descer.',
    ch:[{l:'Descer pela passagem.',n:'throat_enter'}]},

// ═══════════════════════════════════════════
//  CAPÍTULO IV — A GARGANTA DA PEDRA

  throat_enter:{title:'IV.  A GARGANTA',art:'throat',
    text:'Aqui não havia mais ruínas. Não havia mais carne. Não havia mais sonhos.\n\nHavia rocha.\n\nRocha crua, escura, cortante, sem polimento. A passagem era estreita demais para se andar em pé. {NOME} teve que rastejar — primeiro de joelhos, depois de barriga. As paredes raspavam os ombros. O ar ficou rarefeito. Cheirava a ferrugem. As vozes pararam. Os pulsos pararam. Só havia o som da própria respiração e o tecido da túnica rasgando contra a pedra.\n\nEra essa, percebeu, a verdadeira caverna. As outras três camadas tinham sido vestíbulos. Salas de espera. Agora ele estava dentro do osso do mundo.\n\nE o osso do mundo era estreito.',
    ch:[{l:'Continuar rastejando.',n:'throat_stuck'}]},
  throat_stuck:{title:'IV.  PRESO',art:'throat',
    text:'Por vezes parou, apertado entre duas faces de rocha. Tinha que expirar todo o ar dos pulmões para passar. Numa dessas passagens, ficou preso. A pedra contra o peito. A pedra contra as costas. O coração batendo entre as duas como um pássaro num punho fechado.\n\nE pensou — pela primeira vez desde o despertar, com clareza: posso morrer aqui. Vou morrer aqui. E ninguém vai saber.\n\nA ideia o acalmou. Expirou. Forçou-se mais um centímetro. Passou.',
    ch:[{l:'Continuar.',n:'knife_found'}]},
  knife_found:{title:'IV.  A FACA',art:'throat',
    text:'Mais à frente, a passagem alargou-se o suficiente para se ajoelhar. No meio do caminho, um objeto. Uma faca. Cabo de osso, lâmina escurecida, cravada no chão até a metade — alguém a havia fincado em desespero, ou em ritual, ou em ambos.\n\n{NOME} puxou. Saiu fácil.\n\nE ouviu, mais à frente, na escuridão, uma voz que reconheceu.\n\n— Você chegou, disse a voz. Não havia raiva nela, nem triunfo. Havia cansaço. — Esperei muito tempo. Mais do que você imagina.',
    ch:[{l:'Guardar a faca.',n:'c8_keep',ef:{fe:2,cor:1,relic:'Faca de Osso'}},
        {l:'Cravá-la no próprio braço.',n:'c8_self',ef:{cor:3,fe:-1}},
        {l:'Largá-la onde estava.',n:'c8_leave',ef:{duv:3}}]},
  c8_keep:{title:'IV.  A FACA GUARDADA',art:'throat',
    text:'A faca pesava pouco. Mas o peso era estranho — parecia pesar mais quando ele pensava nela do que quando esquecia. {NOME} a guardou. Não decidiu ainda o que faria com ela. Decidir agora seria desonesto. Continuar era honesto.\n\nA passagem desceu mais. A voz de Ignarion não falou de novo, mas estava ali, ao alcance — {NOME} a sentia como se sente a presença de alguém no quarto escuro, antes de qualquer toque. A respiração do dragão era a própria respiração da caverna, e tinha sido o tempo todo.\n\nE então, num último estreitamento, a passagem abriu-se de súbito, e {NOME} caiu — pela última vez — numa câmara final.',
    ch:[{l:'Descer.',n:'obsidian_enter'}]},
  c8_self:{title:'IV.  A FACA NA CARNE',art:'throat',
    text:'A dor foi boa. Acordou. Por um instante, todo o cansaço sumiu, e em seu lugar havia uma clareza fria. {NOME} sorriu. Sangue escorreu pelo braço, pingou no chão de pedra, fez um pequeno desenho que ele não tentou interpretar.\n\nA passagem desceu mais. A voz de Ignarion não falou de novo, mas estava ali, ao alcance — {NOME} a sentia como se sente a presença de alguém no quarto escuro, antes de qualquer toque. A respiração do dragão era a própria respiração da caverna, e tinha sido o tempo todo.\n\nE então, num último estreitamento, a passagem abriu-se de súbito, e {NOME} caiu — pela última vez — numa câmara final.',
    ch:[{l:'Descer.',n:'obsidian_enter'}]},
  c8_leave:{title:'IV.  AS MÃOS VAZIAS',art:'throat',
    text:'{NOME} olhou para a faca por um longo tempo. Depois a recolocou no buraco, com cuidado, como quem recoloca uma coisa que não lhe pertence. Continuou sem ela. As mãos vazias pareciam mais leves, mas também mais inúteis.\n\nA passagem desceu mais. A voz de Ignarion não falou de novo, mas estava ali, ao alcance — {NOME} a sentia como se sente a presença de alguém no quarto escuro, antes de qualquer toque. A respiração do dragão era a própria respiração da caverna, e tinha sido o tempo todo.\n\nE então, num último estreitamento, a passagem abriu-se de súbito, e {NOME} caiu — pela última vez — numa câmara final.',
    ch:[{l:'Descer.',n:'obsidian_enter'}]},

//  CAPÍTULO V — A OBSIDIANA
// ═══════════════════════════════════════════
  obsidian_enter:{title:'V.  A OBSIDIANA',art:'obsidian',
    text:'A câmara final não era grande. Era íntima.\n\nTinha o tamanho de um quarto de criança. As paredes eram de obsidiana. Refletiam fracamente a luz que vinha de um único ponto: o centro, onde Ignarion esperava.\n\nMas Ignarion não era um dragão.\n\nNão havia escamas. Não havia chifres. Havia, no chão de obsidiana, uma figura sentada de pernas cruzadas. Magra. Vestida com farrapos negros. Cabelos longos cobrindo o rosto. Ombros estreitos. Mãos pequenas descansadas sobre os joelhos.',
    ch:[{l:'Aproximar-se.',n:'ignarion_reveal'}]},
  ignarion_reveal:{title:'V.  O ROSTO',art:'ignarion',
    text:'A figura ergueu o rosto.\n\nEra o rosto de {NOME}.\n\nMais velho. Talvez dez, talvez vinte anos. Mais cansado. Os olhos eram poços fundos. Mas dentro dos poços não havia escuridão. Havia algo pior: compreensão.\n\n— Sente-se, disse Ignarion. A voz era a voz de {NOME} com a textura do tempo que ainda não tinha passado. — Esperei muito. Vamos conversar antes do fim.',
    ch:[{l:'Sentar-se.',n:'ignarion_talk'}]},
  ignarion_talk:{title:'V.  A CONVERSA',art:'ignarion',
    text:'{NOME} sentou-se. Não por obediência. Por exaustão.\n\nPor um tempo, nenhum dos dois falou. A obsidiana refletia os dois em mil versões pequenas, todas iguais, e {NOME} percebeu que não saberia dizer qual dos dois era o reflexo.\n\n— Eu não sou o que você pensava, disse Ignarion. — Não sou o mal do mundo. Sou a parte do mundo que o mundo não suportou. Quando o arquipélago acima começou a doer — as guerras de Pucra contra Sandor, as fomes das Ilhas Triangulares, os silêncios de Maroqia — alguma coisa precisou descer. Alguém precisou aceitar. Eu aceitei.\n\nInclinou a cabeça.\n\n— Mas estou cansado. Cem anos é muito. Eu queria descansar. Por isso o chamei.\n\n{NOME} sentiu a faca no cinto. Sentiu o objeto que carregava no peito. Sentiu o sangue ainda úmido no braço, se houvesse cravado. A marca na palma, se houvesse feito o pacto. A ausência da menina, se houvesse passado sem ela. Sentiu cada escolha como uma camada dentro do próprio corpo, e percebeu que tinha vindo equipado para exatamente este momento.\n\n— Você tem três opções, disse Ignarion. — Aceito qualquer uma. Mas escolha de verdade. Não por medo. Não por fadiga. Como quem escolhe pela última vez.',
    get ch(){
      const fe=G.fe,cor=G.corrupcao,duv=G.duvida;
      const choices=[];
      if(fe>cor&&fe>duv) choices.push({l:'Erguer-se e atacar.',n:'end_faith'});
      if(cor>fe&&cor>duv) choices.push({l:'Ajoelhar-se e oferecer-se.',n:'end_corruption'});
      if(duv>fe&&duv>cor) choices.push({l:'Levantar-se e dar as costas.',n:'end_doubt'});
      if(choices.length===0) choices.push({l:'Sentar ao lado de Ignarion.',n:'end_balanced'});
      return choices;
    }},

// ═══════════════════════════════════════════
//  FINAIS
// ═══════════════════════════════════════════
  end_faith:{title:'FINAL I  —  A REDENÇÃO',art:'end_faith',
    text:'{NOME} levantou-se. As pernas tremiam, mas a tremedeira não era de medo. Era de uma certeza que o corpo não comportava inteira. Ignarion observou-o sem se mover.\n\n— Você sabe que, se me matar, eu volto, disse o dragão de rosto humano. — Volto na próxima geração. Em outra carne. Com outro nome.\n\n— Sei, respondeu {NOME}. — Mas você vai descansar agora. E quando voltar, talvez encontre um arquipélago que tenha aprendido a não criar você de novo. Talvez não. Mas é justo dar a eles a chance.\n\nIgnarion sorriu — o primeiro sorriso da câmara. Era um sorriso triste e grato.\n\n— Use a faca, disse. — Não a sua arma. A faca.\n\n{NOME} puxou a lâmina de osso. A mão estava firme. Aproximou-se. Ignarion ofereceu-lhe o peito, sem proteção. Os olhos do dragão eram os seus próprios. Quando {NOME} cravou a faca, sentiu a dor no próprio peito — exata, simétrica, fraterna.\n\nIgnarion fechou os olhos. Os farrapos negros desfizeram-se em poeira. O outro {NOME} dissolveu-se devagar, sem drama, como neve que ninguém vê derreter.\n\nA câmara estremeceu. A obsidiana rachou. E pela primeira vez em cem anos, uma corrente de ar fresco — ar de cima, ar de superfície, ar com cheiro de mar — desceu pela garganta de pedra e tocou o rosto de {NOME}.\n\nA subida foi longa. Demorou dias. Quando {NOME} emergiu, numa fenda escondida nas montanhas de Evrak, o céu estava menos roxo. Não inteiro, ainda. Havia uma faixa azul no horizonte. Fina. Hesitante. Jovem.\n\nEra um começo.\n\n{NOME} desceu até Lúmen. A aldeia o reconheceu, e não reconheceu. Olharam-no como se olha para alguém que voltou de muito longe e trouxe o cheiro da viagem. Ele não falou do que viu. Não havia palavras. Sentou-se na praça, sob a árvore seca do centro, e esperou.\n\nNa primavera seguinte, a árvore botou uma folha. Uma única. Verde.\n\nE {NOME} chorou pela primeira vez desde a caverna.\n\n— EPÍLOGO —\n\nOs anos passaram. {NOME} envelheceu em Lúmen, e nunca contou a história inteira. As crianças, ao crescer, começaram a sonhar com cavernas que descem além das cavernas. Em todos os sonhos havia um homem velho sentado numa câmara de obsidiana, e o homem sorria, e dizia: "Estou bem. Estou descansando."\n\nE o arquipélago, devagar, foi se lembrando como dormir.',
    ch:[{l:'Recomeçar a jornada.',n:'ruins_wake',restart:true}]},
  end_corruption:{title:'FINAL II  —  A QUEDA',art:'end_corruption',
    text:'{NOME} ajoelhou-se. Não foi um movimento de derrota. Foi um movimento de chegada.\n\n— Entendi, disse. — Você não é o mal. Você é a herança. E eu sou o herdeiro.\n\nIgnarion abriu os braços. Os farrapos caíram dos ombros. Por baixo, a pele era pálida, marcada por veias escuras, mas inteira. Não era horror. Era outra forma de ser humano — uma forma que o arquipélago de cima havia decidido esquecer.\n\n— Venha, disse. — Sente-se onde eu sentei. Eu vou descer. Outro precisa descer agora.\n\n{NOME} trocou de lugar. Sentou-se no chão de obsidiana, no centro exato da câmara. Cruzou as pernas. As mãos pousaram nos joelhos.\n\nE sentiu, no momento em que as nádegas tocaram a pedra, o peso do arquipélago descendo sobre ele.\n\nEra enorme. Era cem anos de dor acumulada. Era a fome de Tronia, a memória cortada de Zinaka, o silêncio de Maroqia rainha-casulo, o vazio do escriba de pedra. Era tudo. Era demais.\n\nE {NOME} aguentou.\n\nNão porque era forte. Porque havia se preparado a descida inteira — cada escolha tinha sido um treinamento, cada renúncia, um músculo, cada pequena traição, uma armadura. Ele já não era o homem que despertara nas ruínas. Era algo mais largo. Mais antigo. Cabia ali.\n\nO outro {NOME} — o antigo Ignarion — levantou-se com leveza. Alongou os ombros como quem tira um casaco pesado. Caminhou até a saída. No batente, virou-se.\n\n— Obrigado, disse. — Você vai durar mais do que eu durei. É mais forte. Sinto.\n\nE subiu.\n\nSubiu, sim — atravessou as quatro camadas em ordem inversa, emergiu em Lúmen com o rosto de {NOME} e a vida de {NOME} à frente, e começou a viver. Casou-se. Teve filhos. Morreu velho, em paz, sob a árvore da praça.\n\nMas o {NOME} de baixo — o que ficou — também viveu. Viveu por dentro do arquipélago. Tornou-se a respiração subterrânea de cada ilha. Os habitantes acima começaram a notar coisas. A terra de Pucra ficou mais fértil. Os peixes voltaram a Iugono em cardumes densos. As doenças de Sparnex recuaram.\n\nEm troca, certas noites. Certos sonhos. Crianças de Lúmen sussurravam nomes que não conheciam. Os anciãos das Ilhas Triangulares sentiam, ao mergulhar a pena na tinta, vontade súbita de escrever coisas que não tinham pensado em escrever. O conselho de sombras de Sandor ouvia, em suas reuniões, uma voz extra. Uma voz nova. Sugeria leis brandas, justas, com um leve sabor de ferro.\n\nO arquipélago floresceu. Era uma primavera sob tutela.\n\n— EPÍLOGO —\n\nMil anos depois, os eruditos das Ilhas Triangulares escreverão sobre a Era Dourada. Falarão da prosperidade, da unidade, da paz. Não saberão explicar por que, durante essa era, ninguém jamais desceu às cavernas de Cloto. As entradas estavam abertas. Os mapas mostravam o caminho. Mas ninguém descia. Ninguém sequer pensava em descer.\n\nNão havia necessidade. O dragão estava em todos eles.',
    ch:[{l:'Recomeçar a jornada.',n:'ruins_wake',restart:true}]},
  end_doubt:{title:'FINAL III  —  O EXÍLIO',art:'end_doubt',
    text:'{NOME} levantou-se. Olhou para Ignarion. Abriu a boca. Fechou. Abriu de novo. Fechou.\n\nE deu as costas.\n\nNão houve gesto dramático. Não houve grito. Apenas: virou-se e começou a caminhar de volta pela garganta de pedra. Pela passagem estreita. Pelas câmaras de espelho. Pelas veias pulsantes. Pelas ruínas de baixo-relevo. Subiu. Subiu por dias, ou semanas, ou anos — naquela caverna, o tempo nunca tinha sido confiável.\n\nIgnarion não o seguiu. Não chamou. Não amaldiçoou.\n\nApenas — {NOME} sentiu, sem se virar — abaixou a cabeça. E continuou a esperar.\n\nQuando {NOME} emergiu, não emergiu em Lúmen. Emergiu numa praia que ele não conhecia, numa ilha que ele não soube nomear. O pedaço de mapa que tinha guardado no bolso, sem saber quando, não correspondia à paisagem. As constelações não eram as de Cloto.\n\nEstava em outro lugar. Ou no mesmo lugar, mas tantos anos depois que já não pertencia a ele.\n\n{NOME} andou. Andou muito.\n\nAtravessou terras que não tinham nome em sua língua. Aprendeu palavras novas. Comeu pães diferentes. Dormiu em estábulos, em areias, em cumes de colina. Por algum tempo, viveu numa cidade movimentada, fingindo ser comerciante, e quase se afeiçoou a uma mulher que lhe servia chá toda manhã. Mas, uma noite, viu-a de lado, à luz de uma vela, e o rosto dela por um instante pareceu o rosto da menina nas veias. Partiu antes do amanhecer.\n\nAnos depois, ouviu rumores. Havia um arquipélago longínquo, ao norte, chamado Cloto. O céu sobre ele era roxo. Um dragão dormia em suas profundezas. Diziam, em algumas versões, que o dragão era apenas um homem cansado, esperando alguém que nunca chegou.\n\n{NOME} ouvia essas histórias em silêncio. Não confirmava. Não desmentia. Sorvia o vinho da taverna e ia embora.\n\nEnvelheceu. Sozinho. Em algum momento parou de contar os anos.\n\nNuma noite muito fria, deitou-se sob uma árvore que não conhecia, num campo que não conhecia, num país que não conhecia. Olhou para o céu — as estrelas não eram as de Cloto. Pensou na menina das veias. Pensou em Maroqia. Pensou no escriba batendo o cinzel para sempre. Pensou em Ignarion — em si mesmo, talvez — esperando, ainda, na obsidiana.\n\nSentiu, pela primeira vez em muitas décadas, uma coisa parecida com paz. Não a paz da redenção. Não a paz da aceitação. A paz de quem finalmente concordou em não saber.\n\nFechou os olhos.\n\n— EPÍLOGO —\n\nEm Lúmen, ninguém se lembra de {NOME}. Os afrescos da caverna inferior ganharam um quarto painel, pintado por mãos invisíveis numa noite em que ninguém estava olhando. O painel mostra um homem velho deitado sob uma árvore desconhecida, com os olhos fechados e um pequeno sorriso. Atrás dele, ao longe, há a silhueta de um arquipélago. Não está em chamas, nem em flor. Está apenas lá. Esperando.\n\nE em alguma camada profunda da caverna, na câmara de obsidiana, Ignarion continua sentado. Não está mais cansado, nem menos cansado, do que estava há cem anos.\n\nEstá esperando o próximo.\n\nE o próximo virá. Sempre vem.',
    ch:[{l:'Recomeçar a jornada.',n:'ruins_wake',restart:true}]},
  end_balanced:{title:'FINAL IV  —  O EQUILÍBRIO',art:'obsidian',
    text:'A faca não se ergueu. Os joelhos não se dobraram. As costas não viraram.\n\n{NOME} ficou sentado. Dentro dele, fé e corrupção e dúvida pesavam o mesmo. Nenhum sentimento foi forte o suficiente para mover o corpo.\n\nIgnarion ergueu o rosto. A compreensão, dessa vez, tinha um quê de tristeza.\n\n— Você ainda não está pronto. Volte. Volte a respirar a fumaça do mundo. Volte a sentir. Volte a doer.\n\nA obsidiana sob {NOME} cedeu — não para baixo, mas para cima. Ele caiu para cima, atravessando as camadas: a garganta de pedra, o salão dos espelhos, a câmara dos conselhos, as veias mornas, a sala das colunas negras.\n\nAcordou em lajes de basalto frias. Areia na boca. Um nome queimando atrás dos dentes. Nenhuma memória de ter descido.\n\nMas dessa vez — diferente da primeira — algo o acompanhou: a certeza muda de que tudo aquilo já havia acontecido. Como um sonho que se esquece ao acordar e volta, sem aviso, no meio da tarde.\n\nA jornada recomeça. Mas agora ele sabe, no fundo, que recomeçou.',
    ch:[{l:'Recomeçar a jornada.',n:'ruins_wake',restart:true}]},
};

// ── ART HELPERS (used by placeholder & overlays) ─────────────
function wkH(x,y,w,h,gap,col,alpha){
  ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=col;ctx.lineWidth=.5;
  for(let i=x-h;i<x+w;i+=gap){
    ctx.beginPath();ctx.moveTo(i,y);ctx.lineTo(i+h,y+h);ctx.stroke();
  }
  ctx.restore();
}
function wkGrain(x,y,w,h,n,col,alpha){
  ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=col;
  for(let i=0;i<n;i++)ctx.fillRect(x+ri(0,w-1),y+ri(0,h-1),1,1);
  ctx.restore();
}

// ── ART — image-based placeholders ────────────────────────────
const ART_KEYS=['ruins','triptych','descent','scribe','flesh','maroqia',
  'veins','child','dream','council','mirrors','throat','obsidian',
  'ignarion','end_faith','end_corruption','end_doubt'];
const ART_IMG={};
ART_KEYS.forEach(k=>{const im=new Image();im.src=`img/art/${k}.png`;ART_IMG[k]=im;});

function drawArt(key,t){
  ctx.fillStyle='#08060400';ctx.fillRect(0,0,AW,AH);
  // Dark parchment base
  ctx.fillStyle='#0b0804';ctx.fillRect(0,0,AW,AH);
  const im=ART_IMG[key];
  if(im&&im.complete&&im.naturalWidth>0){
    const sc=Math.max(AW/im.naturalWidth,AH/im.naturalHeight);
    const dw=im.naturalWidth*sc,dh=im.naturalHeight*sc;
    ctx.drawImage(im,(AW-dw)/2,(AH-dh)/2,dw,dh);
    // Vignette over image
    const vg=ctx.createRadialGradient(AW/2,AH/2,AH*.18,AW/2,AH/2,AH*.72);
    vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.62)');
    ctx.fillStyle=vg;ctx.fillRect(0,0,AW,AH);
  } else {
    // Placeholder frame
    wkH(0,0,AW,AH,3,P.hatch,.28);
    wkGrain(0,0,AW,AH,80,P.wa2,.07);
    ctx.strokeStyle=P.wa1;ctx.lineWidth=1;
    ctx.strokeRect(18,18,AW-36,AH-36);
    ctx.strokeRect(20,20,AW-40,AH-40);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='11px monospace';ctx.fillStyle=P.wa2;
    ctx.fillText('[  '+key+'  ]',AW/2,AH/2);
    ctx.font='9px monospace';ctx.fillStyle=P.wa1;
    ctx.fillText('imagem pendente',AW/2,AH/2+16);
    ctx.textAlign='left';ctx.textBaseline='top';
  }
}


function drawText(scene){
  ctx.fillStyle=P.paper; ctx.fillRect(TX,0,CW-TX,AH);
  // Parchment grain
  ctx.fillStyle='rgba(200,140,60,.018)';
  for(let i=0;i<60;i++)ctx.fillRect(TX+ri(0,CW-TX-1),ri(0,AH-1),1,1);
  // Left border (gold rule)
  ctx.fillStyle=P.gold; ctx.fillRect(TX,0,2,AH);
  ctx.fillStyle=P.goldL; ctx.fillRect(TX,0,1,AH);
  ctx.fillStyle=P.goldD; ctx.fillRect(TX+3,0,1,AH);
  // Title
  ctx.font='bold 16px monospace'; ctx.textBaseline='top';
  glow(scene.title,TX+16,14,P.goldL,'#c08040',9);
  // Divider
  ctx.fillStyle=P.gold; ctx.fillRect(TX+16,36,TW-4,1);
  ctx.fillStyle=P.goldL; ctx.fillRect(TX+16,37,TW-4,1);
  ctx.fillStyle=P.goldD; ctx.fillRect(TX+16,38,TW-4,1);
  // Story text com auto-scroll
  ctx.font=FSIZE+'px monospace'; ctx.textBaseline='top';
  const TEXT_START_Y = 46;
  // Calcula altura disponível
  const _choices = typeof scene.ch==='function'?scene.ch():scene.ch;
  const choicesH = (_choices ? _choices.length*CHR + 32 : 30);
  const TEXT_AREA_H = AH - TEXT_START_Y - choicesH;
  const visibleLines = Math.floor(TEXT_AREA_H / LH);
  // Achar linha atual sendo digitada
  let curLineIdx = 0, accChars = 0;
  for(let i=0;i<tLines.length;i++){
    if(accChars + tLines[i].length + 1 > tChars){ curLineIdx = i; break; }
    accChars += tLines[i].length + 1;
    curLineIdx = i;
  }
  // Auto-scroll segue o cursor; modo manual respeita G.textScroll
  const maxScroll = Math.max(0, tLines.length - visibleLines);
  let autoScrollOffset = 0;
  if(curLineIdx >= visibleLines - 3){
    autoScrollOffset = curLineIdx - (visibleLines - 3);
  }
  if(G.typeDone){
    autoScrollOffset = maxScroll;
  }
  // Usa scroll manual quando setado, com clamp
  let scrollOffset = autoScrollOffset;
  if(typeof G.textScroll === 'number' && G.textScroll >= 0){
    scrollOffset = Math.min(maxScroll, Math.max(0, G.textScroll));
  }
  // Indicadores de scroll (▲▼) — mostram que há conteúdo fora da view
  if(scrollOffset > 0){
    ctx.fillStyle=P.wa3;ctx.font='12px monospace';ctx.textAlign='right';
    ctx.fillText('▲', TX+TW-12, TEXT_START_Y+2);
    ctx.textAlign='left';
  }
  if(scrollOffset < maxScroll){
    ctx.fillStyle=P.wa3;ctx.font='12px monospace';ctx.textAlign='right';
    ctx.fillText('▼', TX+TW-12, TEXT_START_Y+TEXT_AREA_H-14);
    ctx.textAlign='left';
  }
  let drawn=0;
  for(let i=0;i<tLines.length;i++){
    const line=tLines[i];
    const rem=Math.max(0,Math.min(line.length,tChars-drawn));
    const y = TEXT_START_Y + (i - scrollOffset)*LH;
    if(y >= TEXT_START_Y && y < TEXT_START_Y + TEXT_AREA_H && rem > 0){
      const vis=line.substring(0,Math.floor(rem));
      ctx.shadowColor='rgba(200,140,40,.45)'; ctx.shadowBlur=4;
      ctx.fillStyle=P.hTx;
      ctx.fillText(vis,TX+16,y);
      ctx.shadowBlur=0;
    }
    drawn+=line.length+1;
    if(drawn > tChars) break;
  }
  // Cursor piscando no fim da porção escrita
  if(!G.typeDone && Math.floor(Date.now()/400)%2===0){
    const cy = TEXT_START_Y + (curLineIdx - scrollOffset)*LH;
    if(cy >= TEXT_START_Y && cy < TEXT_START_Y + TEXT_AREA_H){
      const cl = tLines[curLineIdx] || '';
      const visLen = tChars - accChars;
      const cw = ctx.measureText(cl.substring(0, Math.max(0,visLen))).width;
      ctx.fillStyle=P.hBr; ctx.fillRect(TX+16+cw, cy+2, 8, LH-6);
    }
  }
  // Choices
  const choices=typeof scene.ch==='function'?scene.ch():scene.ch;
  if(G.typeDone&&choices){
    ctx.globalAlpha = (typeof tChoiceFade==='number') ? tChoiceFade : 1;
    const textH=tLines.length*LH+46;
    const chStart=Math.min(AH-choices.length*CHR-26,textH+22);
    ctx.fillStyle=P.gold; ctx.fillRect(TX+16,chStart-14,TW-4,1);
    ctx.fillStyle=P.goldL; ctx.font='bold 10px monospace';
    ctx.fillText('▼  ESCOLHA',TX+16,chStart-11);
    choices.forEach((c,i)=>{
      const cy=chStart+i*CHR;
      const hov=G.hover===i;
      // Box bg
      if(hov){ctx.shadowColor='rgba(100,220,60,.5)'; ctx.shadowBlur=14;}
      ctx.fillStyle=hov?'#162e16':'#0a1408';
      ctx.fillRect(TX+10,cy,CW-TX-14,CHR-5);
      ctx.shadowBlur=0;
      // Left accent bar
      ctx.fillStyle=hov?'#a8ff60':'#4a7028';
      ctx.fillRect(TX+10,cy,4,CHR-5);
      // Border
      ctx.strokeStyle=hov?'#80d040':'#3a5020';
      ctx.lineWidth=1; ctx.strokeRect(TX+10.5,cy+.5,CW-TX-15,CHR-6);
      // Number badge
      const bx=TX+19,by=cy+10;
      ctx.fillStyle=hov?'#50a030':'#1e3410';
      ctx.fillRect(bx,by,22,22);
      ctx.strokeStyle=hov?'#80d040':'#4a7028'; ctx.lineWidth=1;
      ctx.strokeRect(bx+.5,by+.5,22,22);
      ctx.font='bold 14px monospace'; ctx.textBaseline='top'; ctx.textAlign='center';
      ctx.fillStyle=hov?'#000':'#a8d870';
      ctx.fillText(i+1,bx+11,by+4);
      ctx.textAlign='left';
      // Label
      ctx.font=(hov?'bold ':'')+'14px monospace'; ctx.textBaseline='middle';
      if(hov){ctx.shadowColor='#a8ff60';ctx.shadowBlur=7;}
      ctx.fillStyle=hov?'#e8ffb0':'#b8e088';
      ctx.fillText(c.l,TX+50,cy+(CHR-5)/2);
      ctx.shadowBlur=0;
      // Arrow
      if(hov){
        ctx.fillStyle='#a8ff60'; ctx.font='bold 14px monospace'; ctx.textAlign='right';
        ctx.shadowColor='#60ff20'; ctx.shadowBlur=5;
        ctx.fillText('▶',CW-16,cy+(CHR-5)/2);
        ctx.shadowBlur=0;
        ctx.textAlign='left';
      }
    });
    ctx.fillStyle=P.hDm; ctx.font='10px monospace'; ctx.textBaseline='top';
    ctx.fillText('[1] [2] [3]  ou  clique',TX+16,AH-15);
    ctx.globalAlpha = 1;
  } else if(!G.typeDone){
    // Aviso pulsante: deixa CLARO que dá pra pular
    const pulse = 0.55 + 0.45 * Math.sin(Date.now()*0.006);
    ctx.globalAlpha = pulse;
    ctx.shadowColor = '#80d040'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#a8ff60'; ctx.font='bold 11px monospace'; ctx.textBaseline='top';
    ctx.fillText('▶  CLIQUE  ou  [ESPAÇO / ENTER]  para continuar', TX+16, AH-16);
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  }
}

let bootT0=null;
function drawBoot(t){
  if(bootT0===null)bootT0=t;
  const el=t-bootT0;
  ctx.fillStyle='#000';ctx.fillRect(0,0,CW,CH);
  // CRT scanlines
  for(let y=0;y<CH;y+=2){ctx.fillStyle='rgba(0,0,0,.18)';ctx.fillRect(0,y,CW,1);}
  const lh=17,px=110,py=22;
  ctx.font='13px monospace';ctx.textBaseline='top';ctx.textAlign='left';ctx.shadowBlur=0;
  let lastVisIdx=-1;
  BOOT_LINES.forEach(([time,col,txt],i)=>{
    if(el<time)return;
    const y=py+i*lh;
    if(col==='__bar__'){
      const prog=Math.min(1,(el-time)/1.08);
      const bw=CW-px*2-80;
      ctx.fillStyle='#08140a';ctx.fillRect(px,y,bw,13);
      ctx.fillStyle='#1a6a20';ctx.fillRect(px,y,Math.floor(bw*prog),13);
      ctx.fillStyle='rgba(80,200,80,.22)';ctx.fillRect(px,y,Math.floor(bw*prog),5);
      ctx.fillStyle='#78aa78';ctx.font='11px monospace';
      ctx.fillText(Math.floor(prog*100)+'%',px+bw+6,y+1);
      if(prog>=1){ctx.shadowColor='#78aa78';ctx.shadowBlur=6;ctx.fillText('  OK',px+bw+40,y+1);ctx.shadowBlur=0;}
      ctx.font='13px monospace';
      return;
    }
    if(!txt)return;
    if(col==='#ffe060'){ctx.shadowColor='#c89830';ctx.shadowBlur=18;}
    else if(col==='#50c050'){
      const pulse=0.65+0.35*Math.sin(el*3.8);
      ctx.shadowColor='#30c040';ctx.shadowBlur=14*pulse;ctx.globalAlpha=0.75+0.25*pulse;
    }
    else if(col==='#ff7060'){ctx.shadowColor='#ff3030';ctx.shadowBlur=8;}
    else if(col==='#78aa78'){ctx.shadowColor=col;ctx.shadowBlur=3;}
    ctx.fillStyle=col;ctx.fillText(txt,px,y);
    ctx.globalAlpha=1;ctx.shadowBlur=0;
    if(col)lastVisIdx=i;
  });
  // Blinking block cursor after last visible line (while not done)
  const last=BOOT_LINES[BOOT_LINES.length-1];
  if(lastVisIdx>=0&&el<last[0]){
    const [,lc,lt]=BOOT_LINES[lastVisIdx];
    if(lc&&lc!=='__bar__'&&lt){
      if(Math.floor(el*2.8)%2===0){
        ctx.fillStyle='#c0c0c0';
        ctx.fillRect(px+ctx.measureText(lt).width+2,py+lastVisIdx*lh+1,8,12);
      }
    }
  }
  // Dim skip hint bottom
  if(el>0.8){
    ctx.fillStyle='#242424';ctx.font='11px monospace';ctx.textAlign='center';
    ctx.fillText('[ ENTER ] pular',CW/2,CH-15);
    ctx.textAlign='left';
  }
  // Auto-advance after prompt has been visible 3.5s
  if(el>=6.0){bootT0=null;G.scene='title';Aud.playTitle();}
}
